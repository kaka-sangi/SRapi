          $ref: "#/components/schemas/Id"
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/AnnouncementStatus"
        severity:
          $ref: "#/components/schemas/AnnouncementSeverity"
        audience:
          $ref: "#/components/schemas/AnnouncementAudience"
        segments:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementSegment"
          description: Optional audience-targeting segments that refine the audience.
