  /api/v1/admin/ops/error-logs:
    get:
      tags:
        - AdminOps
      operationId: listAdminOpsErrorLogs
      summary: List operator-facing upstream error logs.
      description: |
        Returns a paginated feed of upstream failures captured by the gateway
        hot path (server-side errors and 5xx transient failures). Includes
        operator-supplied resolution status and notes.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
        operator: read
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: user_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: account_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: provider_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: model
          in: query
          schema:
            type: string
        - name: error_class
          in: query
          schema:
            type: string
        - name: error_phase
          in: query
          description: Filter by gateway error phase, for example routing or upstream.
          schema:
            type: string
        - name: error_owner
          in: query
          description: Filter by responsibility bucket, for example provider or scheduler.
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: source_endpoint
          in: query
          description: Exact gateway source endpoint, for example /v1/responses.
          schema:
            type: string
        - name: resolution
          in: query
          description: Filter by operator-supplied resolution status.
          schema:
            type: string
            enum: [open, investigating, resolved, muted]
        - name: status_min
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: status_max
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Case-insensitive search across request ids, model, endpoint, class, phase, message, and body excerpt.
          schema:
            type: string
      responses:
        "200":
          description: Operator-facing error log feed.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsErrorLogListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/ops/error-logs/fingerprints:
    get:
      tags:
        - AdminOps
      operationId: listAdminOpsErrorLogFingerprints
      summary: List grouped upstream error fingerprints.
      description: |
        Returns a bounded real-time aggregation over recent ops_error_logs rows
        so operators can triage recurring gateway failures by stable,
        low-sensitivity dimensions. The fingerprint key never includes request
        ids, API key ids, user ids, account ids, body excerpts, prompts, or
        credentials.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
        operator: read
      parameters:
        - name: user_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: account_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: provider_id
          in: query
          schema:
            $ref: "#/components/schemas/Id"
        - name: model
          in: query
          schema:
            type: string
        - name: error_class
          in: query
          schema:
            type: string
        - name: error_phase
          in: query
          description: Filter by gateway error phase, for example routing or upstream.
          schema:
            type: string
        - name: error_owner
          in: query
          description: Filter by responsibility bucket, for example provider or scheduler.
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: source_endpoint
          in: query
          description: Exact gateway source endpoint, for example /v1/responses.
          schema:
            type: string
        - name: resolution
          in: query
          description: Filter by operator-supplied resolution status.
          schema:
            type: string
            enum: [open, investigating, resolved, muted]
        - name: status_min
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: status_max
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: start
          in: query
          description: Inclusive start of the aggregation window. Defaults to 24 hours before end.
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          description: Inclusive end of the aggregation window. Defaults to now.
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Case-insensitive search across request ids, model, endpoint, class, phase, message, and body excerpt before grouping.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum fingerprint groups to return. Defaults to 20 and caps at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Grouped upstream error fingerprints.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsErrorFingerprintListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

