    get:
      tags:
        - AdminBackupSnapshots
      operationId: downloadAdminBackupSnapshot
      summary: Stream the on-disk dump file for a backup snapshot.
      description: |
        Returns the pg_dump custom-format file as
        application/octet-stream with a Content-Disposition: attachment
        header. Refuses snapshots whose status is not "success" (running,
        failed, or superseded by retention) — those have nothing to stream.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "200":
          description: Backup dump file body.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="srapi-YYYYMMDDHHmmss.dump"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

