      type: string
      enum:
        - info
        - warning
        - critical

    AnnouncementAudience:
      type: string
      enum:
        - all
        - users
        - admins

    AnnouncementSegment:
      type: object
      description: >-
        One AND-group of audience conditions. An announcement is delivered when
        it has no segments (audience-only) or any segment matches the recipient.
        Within a segment every non-empty condition must match.
      properties:
        roles:
          type: array
          items:
            type: string
          description: Match users holding any of these roles (e.g. owner, admin, user).
        user_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
          description: Match these specific user ids.
        email_domains:
          type: array
          items:
            type: string
          description: Match users whose email domain is in this list (case-insensitive).

    AnnouncementReader:
      type: object
      required:
        - user_id
        - read_at
      properties:
        user_id:
          $ref: "#/components/schemas/Id"
        read_at:
          $ref: "#/components/schemas/Timestamp"

    AnnouncementReadStatus:
      type: object
      required:
        - announcement_id
        - total
        - readers
      properties:
        announcement_id:
          $ref: "#/components/schemas/Id"
        total:
          type: integer
          description: Number of recent readers returned (capped).
        readers:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementReader"

    AnnouncementReadStatusResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/AnnouncementReadStatus"
        request_id:
          $ref: "#/components/schemas/RequestId"

