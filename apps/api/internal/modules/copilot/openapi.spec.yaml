  /v1/responses/{response_id}/input_items:
    get:
      tags:
        - Gateway
      operationId: listResponseInputItems
      summary: List input items for an OpenAI Responses-compatible response.
      description: >
        Responses input_items subresource. SRapi uses the required `model`
        query parameter for API key model policy and Provider Account
        scheduling. The request requires `responses_input_items` capability;
        ordinary `responses` generation support is not enough. SRapi then calls
        the selected upstream `/responses/{response_id}/input_items` and
        replays the upstream JSON list. The `model` query parameter is not
        forwarded upstream.
      security:
        - gatewayBearerAuth: []
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
        - name: model
          in: query
          required: true
          schema:
            type: string
          description: Canonical model or model alias used for SRapi policy and scheduling.
        - name: after
          in: query
          schema:
            type: string
        - name: include
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Raw Responses input_items list from the selected upstream provider.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesInputItemsList"
        "400":
          $ref: "#/components/responses/GatewayBadRequest"
        "401":
          $ref: "#/components/responses/GatewayUnauthorized"
        "403":
          $ref: "#/components/responses/GatewayForbidden"
        "422":
          $ref: "#/components/responses/GatewayValidationError"
        "503":
          $ref: "#/components/responses/GatewayUnavailable"
        default:
          $ref: "#/components/responses/GatewayError"

  /v1/responses/compact:
    post:
      tags:
        - Gateway
      operationId: createResponseCompact
      summary: Compact an OpenAI Responses-compatible conversation context.
      description: >
        OpenAI Responses compact subresource. The request body reuses
        ResponsesRequest and executes through the standard Gateway auth,
        model policy, Scheduler, Provider Adapter, usage, and decision evidence
        chain. Same-protocol Codex/OpenAI compact responses are replayed as raw
        upstream JSON to preserve the `response.compaction` shape. Optional
        `Idempotency-Key` replay protection applies because compact is
        non-streaming by contract, even when a client sends `stream: true`.
      security:
        - gatewayBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GatewayIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
      responses:
        "200":
          description: Responses compact result, or SSE stream when stream is true.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesCompactResponse"
            text/event-stream:
              schema:
                type: string
                description: Responses-compatible compact SSE events.
        "400":
          $ref: "#/components/responses/GatewayBadRequest"
        "401":
          $ref: "#/components/responses/GatewayUnauthorized"
        "403":
          $ref: "#/components/responses/GatewayForbidden"
        "409":
          $ref: "#/components/responses/GatewayIdempotencyConflict"
        "422":
          $ref: "#/components/responses/GatewayValidationError"
        "503":
          $ref: "#/components/responses/GatewayUnavailable"
        default:
          $ref: "#/components/responses/GatewayError"

  /v1/responses/ws:
    get:
      tags:
        - Gateway
      operationId: connectResponsesWebSocket
      summary: Connect to the Responses WebSocket gateway.
      description: >
        Upgrades to a WebSocket transport for Responses-compatible requests.
        Clients send JSON text frames shaped as either a raw ResponsesRequest or
        a `response.create` event containing a ResponsesRequest under
        `response`. Each request is executed through the standard Responses
        Gateway runtime, Scheduler, Provider Adapter, usage, and decision
        evidence chain.
      security:
        - gatewayBearerAuth: []
      parameters:
        - name: model
          in: query
          required: false
          schema:
            type: string
          description: Optional model fallback injected when a response.create payload omits model.
        - name: session_affinity_key
          in: query
          required: false
          schema:
            type: string
          description: Optional stable affinity key used by Scheduler sticky routing.
        - name: sticky_strength
          in: query
          required: false
          schema:
            type: string
            enum:
              - soft
              - hard
          description: Optional sticky routing strength for this WebSocket session.
        - name: sticky_account_id
          in: query
          required: false
          schema:
            type: integer
          description: Optional explicit sticky account preference for this WebSocket session.
      responses:
        "101":
          description: WebSocket upgrade accepted. Subsequent messages are JSON text frames.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
        "400":
          $ref: "#/components/responses/GatewayBadRequest"
        "401":
          $ref: "#/components/responses/GatewayUnauthorized"
        "403":
          $ref: "#/components/responses/GatewayForbidden"
        "422":
          $ref: "#/components/responses/GatewayValidationError"
        "503":
          $ref: "#/components/responses/GatewayUnavailable"
        default:
          $ref: "#/components/responses/GatewayError"

  /v1/realtime:
    get:
      tags:
        - Gateway
      operationId: connectRealtimeWebSocket
      summary: Connect to the OpenAI-compatible Realtime WebSocket gateway.
      description: >
        Upgrades to an OpenAI-compatible Realtime WebSocket transport. The
        model is supplied as the required `model` query parameter and the
        WebSocket frames are relayed bidirectionally through the selected
        Provider Account using Reverse Proxy Runtime credentials. SRapi keeps
        Gateway API key authentication, model policy, Scheduler decisions,
        realtime slot limits, and usage evidence on this route.
      security:
        - gatewayBearerAuth: []
      parameters:
        - name: model
          in: query
          required: true
          schema:
            type: string
          description: Model name requested by the downstream realtime client.
        - name: session_affinity_key
          in: query
          required: false
          schema:
            type: string
          description: Optional stable affinity key used by Scheduler sticky routing.
        - name: sticky_strength
          in: query
          required: false
          schema:
