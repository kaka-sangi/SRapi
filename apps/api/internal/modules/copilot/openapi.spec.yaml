      summary: One-shot probe through a proxy.
      description: |
        Issues an HTTPS GET routed through the named proxy at target_url
        (or a sensible default) and reports the outcome — used by the
        per-row "Test" action so an operator can verify connectivity
        without bouncing real traffic through the proxy. Always returns
        200 — the success/error fields live in the body.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestProxyRequest"
      responses:
        "200":
          description: Probe outcome.
          headers:
