        payment:
          $ref: "#/components/schemas/AdminSettingsPayment"
        email:
          $ref: "#/components/schemas/AdminSettingsEmail"
        backup:
          $ref: "#/components/schemas/AdminSettingsBackup"
        copilot:
          $ref: "#/components/schemas/AdminSettingsCopilot"

    AdminSettingsCopilot:
      type: object
      description: >-
        Admin AI Copilot configuration. The copilot drives an agentic
        tool-calling loop over the admin API; configure which LLM powers it and
        how autonomously it may act.
      required:
        - enabled
        - source
        - provider_account_id
        - model
        - dedicated_protocol
        - dedicated_base_url
        - dedicated_api_key_configured
        - owner_only
        - auto_run_reads
        - web_search_enabled
        - web_search_provider
        - web_search_base_url
        - web_search_api_key_configured
      properties:
        enabled:
          type: boolean
          description: Master switch for the copilot chat endpoint.
        source:
          type: string
          enum:
            - account
            - dedicated
          description: >-
            Where the copilot's LLM credentials come from. "account" reuses an
            existing provider account; "dedicated" uses a standalone key.
        provider_account_id:
          type: integer
          description: Provider account id used when source is "account" (0 = unset).
        model:
          type: string
          description: Default upstream model the copilot calls (e.g. claude-3-5-sonnet, gpt-4o).
        models:
          type: array
          items:
            type: string
          default: []
          description: >-
            Selectable models offered in the chat composer's picker. Optional;
            when empty the picker is auto-derived from the account's discovered
            models plus the default.
        dedicated_protocol:
          type: string
          description: >-
            Wire protocol for dedicated mode (openai-compatible,
            anthropic-compatible, gemini-compatible).
        dedicated_base_url:
          type: string
          description: Upstream base URL for dedicated mode.
        dedicated_api_key:
          type: string
          writeOnly: true
          description: >-
            API key for dedicated mode. Write-only; supplied to set or rotate
            the key and never returned. Omit to keep the stored key.
        dedicated_api_key_configured:
          type: boolean
          description: True when a dedicated API key is stored.
        owner_only:
          type: boolean
          description: Restrict the copilot to owner-role admins.
        auto_run_reads:
          type: boolean
          description: Auto-execute read-only (GET) tool calls without confirmation.
        web_search_enabled:
          type: boolean
          description: Enable the copilot's public-web search tool (works with any model).
        web_search_provider:
          type: string
          description: Search backend for the web_search tool (tavily or brave).
        web_search_base_url:
          type: string
          description: Optional override base URL for the search provider.
        web_search_api_key:
          type: string
          writeOnly: true
          description: >-
            API key for the search provider. Write-only; supplied to set or
            rotate the key and never returned. Omit to keep the stored key.
        web_search_api_key_configured:
          type: boolean
          description: True when a search-provider API key is stored.

