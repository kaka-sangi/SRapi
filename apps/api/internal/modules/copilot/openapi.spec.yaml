  /api/v1/admin/copilot/chat:
    post:
      tags:
        - AdminCopilot
      operationId: createAdminCopilotChat
      summary: Drive one admin AI copilot turn (SSE stream of events).
      description: >-
        Runs one agentic turn of the admin copilot. The full conversation
        history is round-tripped by the client; the response is a
        Server-Sent-Events stream of assistant text, tool calls, tool results,
        and pending-action prompts. Mutating tool calls suspend the stream until
        the client re-sends the history with an approval.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCopilotChatRequest"
      responses:
        "200":
          description: SSE stream of copilot events.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Newline-delimited SSE frames; event is one of assistant_delta,
                  tool_call, tool_result, pending_action, done, error.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/StandardError"

