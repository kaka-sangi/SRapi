components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: srapi_session
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    gatewayBearerAuth:
      type: http
      scheme: bearer

  headers:
    RequestIdHeader:
      description: Request correlation id.
      schema:
        $ref: "#/components/schemas/RequestId"

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
      description: Idempotency key for financial write operations.
    GatewayIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: >-
        Optional opt-in idempotency key. A retried non-streaming request that
        repeats the same key and body replays the original response instead of
        re-executing (and re-billing). Streaming requests are not replayed.
    Status:
      name: status
      in: query
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 200
    StartTime:
      name: start
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive start time for read-model queries.
    EndTime:
      name: end
      in: query
      schema:
        type: string
        format: date-time
      description: Exclusive end time for read-model queries.
    Bucket:
      name: bucket
      in: query
      schema:
        type: string
        enum:
          - hour
          - day
        default: hour
      description: Time bucket used by trend endpoints.
    GeminiModel:
      name: model
      in: path
      required: true
      description: Gemini model id from the path. SRapi runtime accepts slash-qualified ids when the HTTP router passes them through.
      schema:
        type: string
        minLength: 1

  responses:
    StandardError:
      description: Standard SRapi error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: |
        Generic 400 (the request was malformed or the resource state did
        not allow the operation). Lives next to ValidationError so the
        Ops error-log feed (and any other handler that prefers a typed
        bad-request alias) can $ref a real component instead of a dangling
        path — previously this component was referenced by
        /admin/ops/error-logs but never defined, which broke
        oapi-codegen / @hey-api/openapi-ts on every codegen run.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              value:
                error:
                  code: VALIDATION_FAILED
                  message: validation failed
                  details: {}
                  trace_id: trace_01HY0000000000000000000000
                request_id: req_01HY0000000000000000000000
    Unauthorized:
      description: Authentication is missing or invalid.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The caller is not allowed to access the resource.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayError:
      description: OpenAI-compatible gateway error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayBadRequest:
      description: Invalid gateway request.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnauthorized:
      description: Missing or invalid gateway API key.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayForbidden:
      description: Gateway API key or user policy forbids this operation.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayIdempotencyConflict:
      description: A request with this Idempotency-Key is already being processed or already completed without a replayable response.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayValidationError:
      description: Request cannot be converted without semantic loss.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnavailable:
      description: No schedulable account is available.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GeminiGatewayError:
      description: Google-style Gemini gateway error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayBadRequest:
      description: Invalid Gemini gateway request.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayUnauthorized:
      description: Missing or invalid gateway API key.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayForbidden:
      description: Gateway API key or user policy forbids this operation.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayValidationError:
      description: Request cannot be converted without semantic loss.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayUnavailable:
      description: No schedulable account is available.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"

  schemas:
    Id:
      type: string
      minLength: 1
      maxLength: 64
      example: "10001"

    RequestId:
      type: string
      minLength: 8
      maxLength: 128
      pattern: "^req_[A-Za-z0-9_\\-]+$"
      example: req_01HY0000000000000000000000

    TraceId:
      type: string
      minLength: 8
      maxLength: 128
      example: trace_01HY0000000000000000000000

    Timestamp:
      type: string
      format: date-time
      example: "2026-05-21T00:00:00Z"

    JsonObject:
      type: object
      additionalProperties: true

    Pagination:
      type: object
      required:
        - page
        - page_size
        - total
        - has_next
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        has_next:
          type: boolean

    ErrorCode:
      type: string
      enum:
        - INVALID_REQUEST
        - UNAUTHORIZED
        - FORBIDDEN
        - RESOURCE_NOT_FOUND
        - RESOURCE_CONFLICT
        - VALIDATION_FAILED
        - RATE_LIMIT_EXCEEDED
        - USER_BALANCE_INSUFFICIENT
        - SUBSCRIPTION_EXPIRED
        - API_KEY_DISABLED
        - MODEL_NOT_ALLOWED
        - MODEL_NOT_FOUND
        - NO_AVAILABLE_ACCOUNT
        - SCHEDULER_REJECTED
        - PROVIDER_RATE_LIMITED
        - PROVIDER_AUTH_FAILED
        - PROVIDER_QUOTA_EXCEEDED
        - INTERNAL_ERROR

    ErrorObject:
      type: object
      required:
        - code
        - message
        - trace_id
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          $ref: "#/components/schemas/JsonObject"
        trace_id:
          $ref: "#/components/schemas/TraceId"

    ErrorResponse:
      type: object
      required:
        - error
        - request_id
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"
        request_id:
          $ref: "#/components/schemas/RequestId"

    GatewayErrorObject:
      type: object
      required:
        - message
        - type
      properties:
        message:
          type: string
        type:
          type: string
          enum:
            - invalid_request_error
            - authentication_error
            - permission_error
            - rate_limit_error
            - upstream_error
            - service_unavailable_error
            - internal_error
        param:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
          example: invalid_request

    GatewayErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/GatewayErrorObject"

    GeminiErrorObject:
      type: object
      required:
        - code
        - message
        - status
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
        status:
          type: string
          example: UNAVAILABLE
        details:
          type: array
          items:
            $ref: "#/components/schemas/JsonObject"

    GeminiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/GeminiErrorObject"

    HealthDependencyStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
        - not_configured

    HealthData:
      type: object
      required:
        - status
        - version
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
        dependencies:
          type: object
          required:
            - database
            - redis
          properties:
            database:
              $ref: "#/components/schemas/HealthDependencyStatus"
            redis:
              $ref: "#/components/schemas/HealthDependencyStatus"

    HealthResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/HealthData"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserRole:
      type: string
      pattern: "^[a-z][a-z0-9_-]{0,63}$"
      description: Role name. Built-in roles are owner, admin, operator, and user; custom roles are managed through the admin roles API.
      example: payment_reader

    Role:
      type: object
      required:
        - id
        - name
        - description
        - permissions
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          $ref: "#/components/schemas/UserRole"
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    PermissionDefinition:
      type: object
      required:
        - permission
        - resource
        - action
        - description
      properties:
        permission:
          type: string
          pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"
        resource:
          type: string
        action:
          type: string
          enum:
            - read
            - write
        description:
          type: string

    PermissionCatalogResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDefinition"
        request_id:
          $ref: "#/components/schemas/RequestId"

    CreateRoleRequest:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          $ref: "#/components/schemas/UserRole"
        description:
          type: string
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"

    UpdateRoleRequest:
      type: object
      required:
        - permissions
      properties:
        description:
          type: string
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"

    RoleResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/Role"
        request_id:
          $ref: "#/components/schemas/RequestId"

    RoleListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserStatus:
      type: string
      enum:
        - active
        - disabled
        - pending

    AuthIdentityProvider:
      type: string
      enum:
        - email
        - oidc
        - github
        - google
        - linuxdo
        - wechat
        - dingtalk

    PendingOAuthIntent:
      type: string
      enum:
        - login
        - bind_current_user

    OAuthPendingNextStep:
      type: string
      enum:
        - email_completion_required
        - bind_existing_login_required
        - create_account_required
        - ready_for_login
        - bind_current_user_required

    OAuthPendingProfile:
      type: object
      required:
        - resolved_email
        - display_name
        - email_verified
        - avatar_url
      properties:
        resolved_email:
          type: string
          description: Normalized email claim retained from the provider when present and syntactically safe.
        display_name:
          type: string
          description: Display-safe provider profile name.
        email_verified:
          type: boolean
        avatar_url:
          type: string
          description: Display-safe provider profile image URL.

    PendingOAuthAction:
      type: object
      required:
        - token
        - expires_at
      properties:
        token:
          type: string
          minLength: 16
          description: Short-lived signed action token bound to the current pending OAuth cookie. It is not a session token and cannot be reused with another pending cookie.
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    OAuthPendingSession:
      type: object
      required:
        - intent
        - provider
        - provider_key
        - subject_hint
        - redirect
        - profile
        - next_step
        - existing_account_bindable
        - expires_at
      properties:
        intent:
          $ref: "#/components/schemas/PendingOAuthIntent"
        provider:
          $ref: "#/components/schemas/AuthIdentityProvider"
        provider_key:
          type: string
          description: Stable provider instance key used for this pending flow.
        subject_hint:
          type: string
          description: Display-safe provider subject hint. Raw provider subjects and hashes are never returned.
        redirect:
          type: string
          description: Bound local console continuation path.
        profile:
          $ref: "#/components/schemas/OAuthPendingProfile"
        next_step:
          $ref: "#/components/schemas/OAuthPendingNextStep"
        existing_account_bindable:
          type: boolean
          description: True when the retained provider email matches an active local account that can continue through the bind-existing-login flow.
        create_account_action:
          $ref: "#/components/schemas/PendingOAuthAction"
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    OAuthPendingSessionResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/OAuthPendingSession"
        request_id:
          $ref: "#/components/schemas/RequestId"

    CurrentUserAuthIdentity:
      type: object
      required:
        - user_id
        - provider
        - provider_key
        - external
        - email_verified
        - can_unbind
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
          nullable: true
          description: Persistent identity id for external identities. Local email identity is derived and has no persistent id.
        user_id:
          $ref: "#/components/schemas/Id"
        provider:
          $ref: "#/components/schemas/AuthIdentityProvider"
        provider_key:
          type: string
          description: Stable provider instance key, such as `local` or an OIDC issuer.
        subject_hint:
          type: string
          description: Display-safe subject hint. The raw upstream subject is never returned.
        display_name:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        avatar_url:
          type: string
          description: Upstream profile avatar URL suggested by a verified external identity, when retained for display.
        external:
          type: boolean
        verified_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        can_unbind:
          type: boolean
        unbind_blocked_by:
          type: string
          description: Machine-readable reason when unbinding this identity is blocked.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CurrentUserAuthIdentityListResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CurrentUserAuthIdentity"
        request_id:
          $ref: "#/components/schemas/RequestId"

    OAuthProviderConfig:
      type: object
      required:
        - provider
        - provider_key
        - display_name
        - client_id
        - authorize_url
        - redirect_uri
        - scopes
      properties:
        provider:
          $ref: "#/components/schemas/AuthIdentityProvider"
        provider_key:
          type: string
          description: Stable provider instance key. Defaults to provider name for single-instance providers.
        display_name:
          type: string
          description: Non-secret label shown in console settings.
        client_id:
          type: string
          description: Public OAuth client id. Client secrets are not exposed in admin settings.
        authorize_url:
          type: string
          format: uri
          description: HTTPS provider authorization endpoint without query or fragment.
        token_url:
          type: string
          format: uri
          description: Optional provider token endpoint for callback completion. HTTPS is required except localhost development. v1 supports public clients with token_auth_method=none.
        userinfo_url:
          type: string
          format: uri
          description: Optional provider UserInfo/profile endpoint for callback completion. HTTPS is required except localhost development.
        token_auth_method:
          type: string
          description: Token endpoint client authentication method. v1 accepts none so client secrets stay outside Admin Settings.
          enum:
            - none
          default: none
        redirect_uri:
          type: string
          format: uri
          description: Registered callback URI. HTTP is accepted only for localhost development.
        scopes:
          type: array
          description: Provider scopes sent as a space-delimited authorization request parameter.
          items:
            type: string

    User:
      type: object
      required:
        - id
        - email
        - name
        - status
        - roles
        - balance
        - currency
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        email:
          type: string
          format: email
        name:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        balance:
          type: string
          description: Decimal string balance.
        currency:
          type: string
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        last_login_at:
          type: string
          format: date-time
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        avatar_url:
          type: string
          description: Relative URL for the user's SRapi-hosted avatar image, when configured.
        avatar_mime:
          type: string
          description: Normalized avatar MIME type.
          enum:
            - image/png
        avatar_byte_size:
          type: integer
          minimum: 1
        avatar_sha256:
          type: string
          minLength: 64
          maxLength: 64
        avatar_updated_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"

    UserAvatar:
      type: object
      required:
        - user_id
        - url
        - content_type
        - byte_size
        - sha256
        - width
        - height
        - updated_at
      properties:
        user_id:
          $ref: "#/components/schemas/Id"
        url:
          type: string
          description: Relative URL that serves the normalized avatar image.
        content_type:
          type: string
          enum:
            - image/png
        byte_size:
          type: integer
          minimum: 1
        sha256:
          type: string
          minLength: 64
          maxLength: 64
        width:
          type: integer
          minimum: 1
          maximum: 1024
        height:
          type: integer
          minimum: 1
          maximum: 1024
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    UserAvatarResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/UserAvatar"
        request_id:
          $ref: "#/components/schemas/RequestId"

    CreateAdminUserRequest:
      type: object
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
          default:
            - user
        status:
          $ref: "#/components/schemas/UserStatus"
        balance:
          type: string
          default: "0.00000000"
        currency:
          type: string
          default: USD
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    UpdateAdminUserRequest:
      type: object
      minProperties: 1
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    UpdateUserBalanceRequest:
      type: object
      required:
        - amount
        - operation
      properties:
        amount:
          type: string
          description: Decimal string amount.
        operation:
          type: string
          enum:
            - set
            - increment
            - decrement
        currency:
          type: string
        note:
          type: string

    UserBalance:
      type: object
      required:
        - user_id
        - balance
        - currency
      properties:
        user_id:
          $ref: "#/components/schemas/Id"
        balance:
          type: string
          description: Decimal string balance.
        currency:
          type: string

    UserBalanceResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/UserBalance"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UpdateCurrentUserProfileRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Current user's display name.

    UpdateUserRpmLimitRequest:
      type: object
      required:
        - rpm_limit
      properties:
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    BatchUpdateUsersRequest:
      type: object
      required:
        - user_ids
      minProperties: 2
      properties:
        user_ids:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Id"
        status:
          $ref: "#/components/schemas/UserStatus"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"

    BatchUpdateUsersResult:
      type: object
      required:
        - updated_count
        - updated_ids
        - errors
      properties:
        updated_count:
          type: integer
          minimum: 0
        updated_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
        errors:
          type: array
          items:
            type: string

    BatchUpdateUsersResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/BatchUpdateUsersResult"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    PendingOAuthBindCurrentUserRequest:
      type: object
      description: Optional preferences applied while binding a pending external identity to the current console user. Omitting the body is equivalent to all preferences disabled.
      properties:
        adopt_display_name:
          type: boolean
          default: false
          description: When true, adopt the provider-returned display name as the account display name if the provider supplied a present, valid name. Provider avatar URLs are never adopted automatically because SRapi avatars use a controlled upload/storage model.

    PendingOAuthBindLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Existing console account email to authenticate before binding the pending external identity.
        password:
          type: string
          format: password
          minLength: 8
        adopt_display_name:
          type: boolean
          default: false
          description: When true, adopt the provider-returned display name onto the authenticated account after a successful bind, if the provider supplied a present, valid name. Provider avatar URLs are never adopted automatically because SRapi avatars use a controlled upload/storage model.

    PendingOAuthBindLoginTwoFactorRequest:
      type: object
      required:
        - challenge_id
        - code
      properties:
        challenge_id:
          type: string
          minLength: 16
          description: Pending OAuth bind-login two-factor challenge returned by `bindPendingOAuthLogin`.
        code:
          type: string
          minLength: 6
          maxLength: 32
          description: Six-digit TOTP code or one recovery code.

    PendingOAuthEmailCompletionRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          description: Email address the user wants to prove for an OAuth pending session that lacks a provider email.

    ConfirmPendingOAuthEmailCompletionRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          minLength: 16
          description: High-entropy pending OAuth email-completion token delivered by email. It must be submitted with the same pending OAuth cookie.

    PendingOAuthEmailCompletionAccepted:
      type: object
      required:
        - accepted
        - expires_at
      properties:
        accepted:
          type: boolean
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    PendingOAuthEmailCompletionAcceptedResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/PendingOAuthEmailCompletionAccepted"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PendingOAuthCreateAccountRequest:
      type: object
      required:
        - email
        - password
        - action_token
      properties:
        email:
          type: string
          format: email
          description: New console account email. For v1 this must match the verified email retained in the pending OAuth session.
        name:
          type: string
          minLength: 1
          description: Optional local display name. Defaults to the provider display name or email.
        password:
          type: string
          format: password
          minLength: 8
        action_token:
          type: string
          minLength: 16
          description: Pending OAuth create-account action token returned by `getPendingOAuthSession`.

    RegisterRequest:
      type: object
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8
        invite_code:
          type: string
          minLength: 1
          description: Optional affiliate invite code to bind to the new account.
        attributes:
          type: array
          description: Current-user attribute values required at registration when enabled definitions are marked required.
          items:
            $ref: "#/components/schemas/UserAttributeValueInput"

    PasswordlessRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        invite_code:
          type: string
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/UserAttributeValueInput"

    PasswordlessLoginRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          minLength: 1

    SiteConfig:
      type: object
      required:
        - site_name
        - logo_url
        - version_label
        - custom_menus
        - user_agreement
        - privacy_policy
      properties:
        site_name:
          type: string
        logo_url:
          type: string
        version_label:
          type: string
        custom_menus:
          type: array
          items:
            type: object
            additionalProperties: true
        user_agreement:
          type: string
        privacy_policy:
          type: string

    SiteConfigResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/SiteConfig"
        request_id:
          $ref: "#/components/schemas/RequestId"

    SetupStatus:
      type: object
      required:
        - needs_setup
      properties:
        needs_setup:
          type: boolean
          description: True until an owner/admin account exists; the console shows the first-run setup wizard while true.

    SetupStatusResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/SetupStatus"
        request_id:
          $ref: "#/components/schemas/RequestId"

    CompleteSetupRequest:
      type: object
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 200

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ConfirmPasswordResetRequest:
      type: object
      required:
        - token
