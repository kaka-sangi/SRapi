      properties:
        token:
          type: string
          minLength: 1
        new_password:
          type: string
          format: password
          minLength: 8

    PasswordResetAccepted:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean

    PasswordResetAcceptedResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
