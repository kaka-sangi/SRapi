        redeem_code_id:
          $ref: "#/components/schemas/Id"
        type:
          $ref: "#/components/schemas/RedeemCodeType"
        amount:
          type: string
        currency:
          type: string
        balance_before:
          type: string
        balance_after:
          type: string
        billing_ledger_id:
