        operator: read
      parameters:
        - name: window
          in: query
          required: false
          schema:
            type: string
            enum: [1m, 5m, 30m, 1h]
            default: 5m
          description: Recent traffic window.
      responses:
        "200":
          description: Realtime traffic summary.
          headers:
            X-Request-ID:
