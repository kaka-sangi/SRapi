          type: integer
          minimum: 1
          description: Window in days over which recent_uptime_success_rate is computed (absent when no recent runs).
        recent_uptime_sample_count:
          type: integer
          minimum: 0
          description: How many runs in the window contributed to recent_uptime_success_rate (capped per server policy).
        recent_uptime_success_rate:
          type: number
          minimum: 0
          maximum: 1
          description: Ratio of OK runs over recent_uptime_sample_count (absent when no recent runs).
