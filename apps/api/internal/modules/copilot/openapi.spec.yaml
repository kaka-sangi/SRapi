        count:
          type: integer
          minimum: 0
        open_count:
          type: integer
          minimum: 0
        investigating_count:
          type: integer
          minimum: 0
        resolved_count:
          type: integer
          minimum: 0
        muted_count:
          type: integer
          minimum: 0
        first_occurred_at:
          type: string
          format: date-time
        last_occurred_at:
          type: string
          format: date-time
        example_error_log_id:
          $ref: "#/components/schemas/Id"
        example_request_id:
