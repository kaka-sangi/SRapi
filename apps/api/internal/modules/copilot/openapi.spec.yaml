    BackupSnapshotKind:
      type: string
      enum:
        - scheduled
        - manual
      description: scheduled = worker-driven daily run; manual = operator-triggered.

    BackupSnapshotStatus:
      type: string
      enum:
        - running
        - success
        - failed
        - superseded
      description: |
        running = pg_dump in flight; success = file written and checksummed;
        failed = pg_dump/IO error; superseded = retention deleted the file.

    BackupSnapshot:
      type: object
      required:
        - id
        - kind
        - status
        - started_at
        - size_bytes
        - sha256
        - file_path
        - error_message
        - triggered_by_user_id
      properties:
        id:
          $ref: "#/components/schemas/Id"
        kind:
          $ref: "#/components/schemas/BackupSnapshotKind"
        status:
          $ref: "#/components/schemas/BackupSnapshotStatus"
        started_at:
          $ref: "#/components/schemas/Timestamp"
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the run finished (success or failed); null while running.
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: On-disk size of the dump file. 0 for failed/running rows.
        sha256:
          type: string
          maxLength: 64
          description: Hex-encoded SHA-256 of the dump file. Empty for failed/superseded rows.
        file_path:
          type: string
          description: Path of the dump on the API host's disk. Empty when retention has wiped it.
        error_message:
          type: string
          description: Stderr / system error captured on failed runs. Empty otherwise.
        triggered_by_user_id:
          type: integer
          description: Admin user id that pressed "Snapshot now". 0 for scheduled runs.

    BackupSnapshotResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/BackupSnapshot"
        request_id:
          $ref: "#/components/schemas/RequestId"

    BackupSnapshotPagination:
      type: object
      required:
        - total
        - offset
        - limit
      properties:
        total:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 0

    BackupSnapshotListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BackupSnapshot"
        pagination:
          $ref: "#/components/schemas/BackupSnapshotPagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

