  /api/v1/admin/user-subscriptions/batch-assign:
    post:
      tags:
        - AdminSubscriptions
      operationId: batchAssignAdminUserSubscriptions
      summary: Bulk-assign a subscription plan to N users.
      description: |
        Assigns subscription plans to up to 1000 users in a single call.
        Verbatim port of sub2api's `SubscriptionService.BulkAssignSubscription`
        (subscription_service.go) → `SubscriptionHandler.BulkAssign`
        (subscription_handler.go).

        Per-row outcome is one of:
        - `created` — fresh subscription row inserted
        - `reused`  — an existing subscription on the same
          `(user_id, source_type, source_id)` was returned idempotently
          (matches sub2api's `reused_count`)
        - `failed`  — per-row validation/store error (Error is populated)

        Per-row failures surface in `errors[]` without aborting the batch.
        Duplicate `(user_id, plan_id)` tuples within the same batch flag
        "duplicate id in batch" so a typo can't silently double-assign.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchAssignAdminUserSubscriptionsRequest"
      responses:
        "200":
          description: Batch assign result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssignAdminUserSubscriptionsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

