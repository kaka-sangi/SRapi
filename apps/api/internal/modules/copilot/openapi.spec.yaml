      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentUserProfileRequest"
      responses:
        "200":
          description: Current user profile updated.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"
    delete:
      tags:
        - CurrentUser
      operationId: deleteCurrentUser
      summary: Delete the current console user.
      description: Self-service account deletion. Server-side gated by Users.UserSelfDeleteEnabled and protected by CSRF.
