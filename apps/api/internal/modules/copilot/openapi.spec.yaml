          default: 0
        weight:
          type: number
          minimum: 0
          default: 1
        risk_level:
          type: string
          nullable: true
        group_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
          default: []
        metadata:
          allOf:
            - $ref: "#/components/schemas/JsonObject"
          description: >
            Free-form per-account configuration. Recognized convention keys
            (no schema migration; read at scheduling time):
            `base_url` (override the upstream base URL);
            `supported_models` (string array — exact-match inclusion whitelist of
            upstream model names this account may serve; absent = serve all);
            `excluded_models` (string array of `*` wildcard patterns — exclude any
            catalog or upstream model name matching a pattern; takes precedence
            over `supported_models` and hides the model from `/v1/models` when
            every serving account excludes it);
            `model_mapping` (object mapping a canonical catalog model name to a
            per-account upstream model name override).
        token_expires_at:
          type: string
          format: date-time
          allOf:
            - $ref: "#/components/schemas/Timestamp"
          nullable: true
          description: >
            Wall-clock expiry of the OAuth access token, snapshotted from the
            credential after the last successful refresh. Null when the
            account has never been refreshed or the credential carries no
            expires_at. OAuth runtime classes only.
        last_refreshed_at:
          type: string
          format: date-time
          allOf:
            - $ref: "#/components/schemas/Timestamp"
          nullable: true
          description: Time of the most recent successful OAuth refresh.
        needs_reauth_at:
          type: string
          format: date-time
          allOf:
            - $ref: "#/components/schemas/Timestamp"
          nullable: true
          description: >
            Set when refresh has become hopeless (permanent OAuth error such
            as invalid_grant, OR refresh_attempts >= 5). The proactive
            refresh worker skips accounts with this set so the upstream is
            not hammered; an operator must re-bind the account to clear it.
        refresh_attempts:
          type: integer
          default: 0
          description: Consecutive refresh-failure count; reset to 0 on a success.
        refresh_last_error:
          type: string
          description: Most recent refresh error message (truncated to 500 chars).
        created_at:
          $ref: "#/components/schemas/Timestamp"

