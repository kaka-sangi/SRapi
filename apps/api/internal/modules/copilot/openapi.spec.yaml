          type: string
          description: Public key prefix for lookup, never sufficient for authentication.
          example: sk_live_abcd1234
        status:
          $ref: "#/components/schemas/ApiKeyStatus"
        scopes:
          type: array
          items:
            type: string
        allowed_models:
          type: array
          items:
            type: string
        group_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        tpm_limit:
          type: integer
          nullable: true
          minimum: 0
        concurrency_limit:
          type: integer
          nullable: true
          minimum: 0
        request_limit_5h:
          type: integer
          nullable: true
          minimum: 0
          description: Max requests allowed per 5-hour window for this key.
        request_limit_1d:
          type: integer
          nullable: true
          minimum: 0
          description: Max requests allowed per 1-day window for this key.
        request_limit_7d:
          type: integer
          nullable: true
          minimum: 0
          description: Max requests allowed per 7-day window for this key.
        cost_quota:
          type: string
          nullable: true
          description: Lifetime USD spend quota for this key. Empty means uncapped.
          example: "10.00000000"
        cost_used:
          type: string
          description: Lifetime billable USD spend recorded for this key.
          example: "1.25000000"
        cost_limit_5h:
          type: string
          nullable: true
          description: Max billable USD spend allowed per 5-hour window.
          example: "2.00000000"
        cost_used_5h:
          type: string
          description: Billable USD spend recorded in the current 5-hour window.
          example: "0.50000000"
        cost_limit_1d:
          type: string
          nullable: true
          description: Max billable USD spend allowed per 1-day window.
          example: "5.00000000"
        cost_used_1d:
          type: string
          description: Billable USD spend recorded in the current 1-day window.
          example: "1.00000000"
        cost_limit_7d:
          type: string
          nullable: true
          description: Max billable USD spend allowed per 7-day window.
          example: "20.00000000"
        cost_used_7d:
          type: string
          description: Billable USD spend recorded in the current 7-day window.
          example: "4.50000000"
        allowed_ips:
          type: array
          items:
            type: string
          description: >-
            Client IPs or CIDRs permitted to use this key. Empty means all IPs
            are allowed. Enforced against the request client IP; requires a
            trusted reverse proxy that overwrites X-Forwarded-For.
        denied_ips:
          type: array
          items:
            type: string
          description: Client IPs or CIDRs blocked from using this key. Takes precedence over allowed_ips.
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        user_id:
          $ref: "#/components/schemas/Id"
        user_email:
          type: string
          description: Owner email; populated only on admin (cross-user) responses.

