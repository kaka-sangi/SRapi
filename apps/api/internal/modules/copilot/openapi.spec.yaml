        default:
          $ref: "#/components/responses/StandardError"
    post:
      tags:
        - AdminBackupSnapshots
      operationId: triggerAdminBackupSnapshot
      summary: Trigger an on-demand database backup snapshot.
      description: |
        Runs the backup worker once, synchronously, tagged kind=manual with
        the calling admin user as triggered_by_user_id. Bypasses the 24-hour
        scheduled-run cool-down so an operator who pressed "Snapshot now"
        gets a real run on the same request. Backups still respect the
        Backup.Enabled admin setting — when disabled this returns a 400.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      responses:
        "200":
          description: Snapshot created.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
