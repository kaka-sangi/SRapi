  /api/v1/admin/affiliates/batch-rebate-rate:
    post:
      tags:
        - AdminAffiliates
      operationId: batchSetAdminAffiliateRebateRate
      summary: Bulk-set per-user affiliate rebate-rate override.
      description: |
        Sets (or clears) the per-user affiliate rebate-rate override on up to
        1000 users in a single call. Verbatim port of sub2api's
        `AffiliateHandler.BatchSetRate` (affiliate_handler.go) →
        `AffiliateRepository.BatchSetUserRebateRate` (affiliate_repo.go).

        sub2api persists this to a `user_affiliates` table; srapi has no such
        schema yet, so the override is held in an in-memory overlay on the
        affiliate service. The future rebate-computation hot path will consult
        the overlay before falling back to the `AffiliateRule` rate.

        Per-row failures (invalid id, rate out of [0,1] range, duplicate id in
        batch) surface in `errors[]` without aborting the batch.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSetAdminAffiliateRebateRateRequest"
      responses:
        "200":
          description: Batch rebate-rate result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSetAdminAffiliateRebateRateResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

