      tags:
        - CurrentUser
      operationId: uploadCurrentUserAvatar
      summary: Upload current console user avatar.
      description: Uploads a PNG or JPEG avatar image. SRapi validates the decoded image, rejects oversized input, and stores a normalized PNG for controlled serving.
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: PNG or JPEG avatar image. The upload limit is 1 MiB and dimensions must not exceed 1024x1024.
      responses:
        "200":
          description: Avatar uploaded.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAvatarResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"
    delete:
      tags:
        - CurrentUser
      operationId: deleteCurrentUserAvatar
      summary: Delete current console user avatar.
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "200":
          description: Avatar deleted.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
