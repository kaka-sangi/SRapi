      operationId: listAdminBackupSnapshots
      summary: List database backup snapshots, newest first.
      description: |
        Returns the recorded backup history written by the daily backup
        worker: one row per attempted snapshot, with status, size, sha256,
        and (for manual runs) the admin user that triggered it. Use the
        `status` filter to narrow to running/success/failed/superseded.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BackupSnapshotStatus"
      responses:
        "200":
          description: Backup snapshot list.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshotListResponse"
        "401":
