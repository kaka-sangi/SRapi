        user_agreement:
          type: string
        privacy_policy:
          type: string

    AdminSettingsFeatures:
      type: object
      required:
        - enabled_channels
        - channel_monitoring_enabled
        - invitation_rebate_enabled
        - payments_enabled
      properties:
        enabled_channels:
          type: array
          items:
            type: string
        channel_monitoring_enabled:
          type: boolean
        invitation_rebate_enabled:
          type: boolean
        payments_enabled:
          type: boolean

    AdminSettingsSecurity:
      type: object
      required:
        - admin_api_key
        - registration_enabled
        - registration_email_suffix_allowlist
        - oauth_enabled
        - oauth_providers
        - oauth_provider_configs
      properties:
        admin_api_key:
          $ref: "#/components/schemas/SecretConfigured"
        registration_enabled:
          type: boolean
        registration_email_suffix_allowlist:
          type: array
          description: Normalized allowed email suffixes for public registration. Empty means all valid email domains are allowed.
          items:
            type: string
            pattern: "^@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$"
        oauth_enabled:
          type: boolean
        oauth_providers:
          type: array
          items:
            type: string
        oauth_provider_configs:
          type: array
          description: Non-secret OAuth/OIDC provider authorization settings. Secrets for token exchange are configured outside this response.
          items:
            $ref: "#/components/schemas/OAuthProviderConfig"

    AdminSettingsUsers:
      type: object
      required:
        - default_balance
        - default_group
        - user_self_delete_enabled
        - rpm_limit_default
      properties:
        default_balance:
          type: string
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        default_group:
          type: string
        user_self_delete_enabled:
          type: boolean
        rpm_limit_default:
          type: integer
          minimum: 0

    AdminSettingsGateway:
      type: object
      required:
        - overload_cooldown_seconds
        - rate_limit_cooldown_seconds
        - stream_timeout_seconds
        - request_shaper_enabled
      properties:
        overload_cooldown_seconds:
          type: integer
          minimum: 0
        rate_limit_cooldown_seconds:
          type: integer
          minimum: 0
        stream_timeout_seconds:
          type: integer
          minimum: 1
        request_shaper_enabled:
          type: boolean
        scheduler_strategy_rollout_enabled:
          type: boolean
          default: false
          description: Enables deterministic real-traffic Scheduler shadow strategy rollout.
        scheduler_strategy_shadow_strategy:
          $ref: "#/components/schemas/SchedulerStrategyName"
        scheduler_strategy_rollout_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 0
        scheduler_strategy_rollout_models:
          type: array
          items:
            type: string
          default: []
          description: Optional canonical model or alias scope. Empty means all models.
        scheduler_strategy_rollout_api_key_hashes:
          type: array
          items:
            type: string
          default: []
          description: Optional SHA-256 API key prefix hash scope. Empty means all API keys.
        retry_count:
          type: integer
          minimum: 1
          maximum: 20
          default: 3
          description: Maximum cross-candidate gateway attempts before failing a request. Bounds how many distinct credentials the failover loop may try.
        max_retry_credentials:
          type: integer
          minimum: 0
          default: 0
          description: Maximum distinct credentials the failover loop may exclude and retry across. 0 means unlimited (bounded only by retry_count and available candidates).
        max_retry_interval_ms:
          type: integer
          minimum: 0
          default: 2000
          description: Default ceiling for same-candidate retry backoff delay in milliseconds. Per-account metadata overrides still apply.
        passthrough_upstream_headers:
          type: boolean
          default: false
          description: >-
            When enabled, allowlisted upstream response headers are forwarded to
            the client on both the streaming and buffered gateway response paths.
            Hop-by-hop headers and headers SRapi already sets are never forwarded.
            Default off so behavior is unchanged unless explicitly enabled.
        passthrough_header_allowlist:
          type: array
          items:
            type: string
          default: []
          description: >-
            Case-insensitive allowlist of upstream response header names to
            forward when passthrough_upstream_headers is enabled (e.g.
            retry-after, x-request-id, x-ratelimit-remaining). A trailing "*"
            wildcard matches by prefix (e.g. x-ratelimit-*).

    AdminSettingsPayment:
      type: object
      required:
        - enabled
        - providers
        - subscription_plans_enabled
      properties:
        enabled:
          type: boolean
        providers:
          type: array
          items:
            type: string
        subscription_plans_enabled:
          type: boolean

    AdminSettingsEmail:
