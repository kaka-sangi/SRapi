      type: string
      enum:
        - balance
        - subscription

    RedeemCode:
      type: object
      required:
        - id
        - code
        - type
        - status
        - value
        - currency
        - max_redemptions
        - redeemed_count
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        code:
          type: string
          minLength: 4
          maxLength: 80
        type:
          $ref: "#/components/schemas/RedeemCodeType"
        status:
          $ref: "#/components/schemas/RedeemCodeStatus"
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
          description: Balance amount for balance codes, or subscription plan id for subscription codes.
        currency:
          type: string
          minLength: 3
          maxLength: 8
        max_redemptions:
          type: integer
          minimum: 1
        redeemed_count:
          type: integer
          minimum: 0
        expires_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
        note:
          type: string
          description: Free-text audit comment last applied to this code (set by bulk-disable).
        disabled_reason:
          type: string
          description: Why this code is in disabled status, if applicable. Empty for active/used codes.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

