  /api/v1/admin/redeem-codes/batch-enable:
    post:
      tags:
        - AdminPromotions
      operationId: batchEnableAdminRedeemCodes
      summary: Batch re-enable disabled redeem codes.
      description: |
        Inverse of batch-disable — flips DISABLED rows back to ACTIVE. Codes
        in any other status (active, redeemed, expired) are reported in
        failed_ids and not touched, so the bulk action never reanimates a
        code whose lifecycle is over.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDisableRedeemCodesRequest"
      responses:
        "200":
          description: Redeem codes re-enabled — per-id outcome in the result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOperationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/redeem-codes/batch-extend:
    post:
      tags:
        - AdminPromotions
      operationId: batchExtendAdminRedeemCodes
      summary: Batch set a new expiration on redeem codes.
      description: |
        Sets ExpiresAt on each listed code so a campaign can be extended (or
        shortened) without touching codes one-by-one. Already-redeemed and
        fully-consumed codes surface in failed_ids — their lifecycle is over
        and extending the expiry would have no effect.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchExtendRedeemCodesRequest"
      responses:
        "200":
          description: Redeem codes extended — per-id outcome in the result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOperationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/redeem-codes/batch-delete:
    post:
      tags:
        - AdminPromotions
      operationId: batchDeleteAdminRedeemCodes
      summary: Batch hard-delete redeem codes.
      description: |
        Deletes the named codes outright (vs batch-disable, which preserves
        the row with status=disabled for audit). Use when a generation went
        wrong (wrong currency, wrong campaign). Already-deleted or unknown
        ids surface in failed_ids without failing the call. Use the smaller
        batch-disable when you want to keep history.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDisableRedeemCodesRequest"
      responses:
        "200":
          description: Redeem codes deleted — per-id outcome in the result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOperationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/redeem-codes/batch-update:
    post:
      tags:
        - AdminPromotions
      operationId: batchUpdateAdminRedeemCodes
      summary: Bulk partial-update redeem codes.
      description: |
        Verbatim port of sub2api's RedeemService.BatchUpdate
        (`admin_service_redeem.go`). Each item supplies the id + any subset
        of mutable fields (amount, max_redemptions, expires_at, note). Per-id
        failures surface in `errors[]` without aborting the call. NotFound is
        idempotent. Core-field updates on already-redeemed codes are rejected
        (matches sub2api's TouchesUsedSensitiveFields gate). Capped at 1000
        items per call.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateRedeemCodesRequest"
      responses:
        "200":
          description: Batch result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateRedeemCodesResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

