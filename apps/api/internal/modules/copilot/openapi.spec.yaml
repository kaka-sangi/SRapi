    BindProviderAccountProxyRequest:
      type: object
      required:
        - proxy_id
      properties:
        proxy_id:
          type: string
          nullable: true
          description: Registered active proxy definition id. Raw proxy URLs are rejected; create and enable a proxy definition first. Set null or an empty string to clear proxy binding.

    ProxyDefinitionType:
      type: string
      description: Proxy transport type. Use socks5h when DNS resolution must happen through the proxy.
      enum:
        - http
        - https
        - socks5
        - socks5h

    ProxyDefinitionStatus:
      type: string
      enum:
        - active
        - disabled

    ProxyFallbackMode:
      type: string
      description: Runtime behavior when an active proxy is past expires_at.
      enum:
        - none
        - direct
        - proxy

    ProxyDefinition:
      type: object
      required:
        - id
        - name
        - type
        - status
        - url_configured
        - created_at
        - updated_at
        - probe_success_count
        - probe_failure_count
        - last_probe_latency_ms
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProxyDefinitionType"
        status:
          $ref: "#/components/schemas/ProxyDefinitionStatus"
        url_configured:
          type: boolean
          description: True when an encrypted proxy URL is stored. Raw URLs are never returned.
        metadata:
          $ref: "#/components/schemas/JsonObject"
        country_code:
          type: string
          maxLength: 2
          nullable: true
          description: ISO-3166-1 alpha-2 country code, operator-supplied.
        country_name:
          type: string
          nullable: true
          description: Display name for the country, snapshotted at write time.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional operator-defined expiry. Expired active proxies follow fallback_mode.
        fallback_mode:
          $ref: "#/components/schemas/ProxyFallbackMode"
        backup_proxy_id:
          type: string
          nullable: true
          description: Proxy definition id used when fallback_mode is proxy.
        last_probed_at:
          type: string
          format: date-time
          nullable: true
          description: Last time the proxy probe worker tested this proxy.
        probe_success_count:
          type: integer
          minimum: 0
          description: Successful probes since the last counter reset (rolling ~7-day window — counters reset weekly, NOT a strict trailing-7d window).
        probe_failure_count:
          type: integer
          minimum: 0
          description: Failed probes since the last counter reset.
        last_probe_latency_ms:
          type: integer
          minimum: 0
          description: Latency of the most recent successful probe in milliseconds. 0 if no successful probe yet.
        probe_success_pct_7d:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Rolling availability percentage. Null when never probed since last reset.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreateProxyDefinitionRequest:
      type: object
      required:
        - name
        - type
        - url
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/ProxyDefinitionType"
        url:
          type: string
          format: uri
          writeOnly: true
          description: Proxy URL with credentials if needed. Stored encrypted and never returned.
        status:
          $ref: "#/components/schemas/ProxyDefinitionStatus"
        metadata:
          $ref: "#/components/schemas/JsonObject"
        country_code:
          type: string
          maxLength: 2
          nullable: true
          description: ISO-3166-1 alpha-2 country code, operator-supplied.
        country_name:
          type: string
          nullable: true
          description: Localized display name for the country, snapshotted at write time.
        expires_at:
          type: string
          format: date-time
          description: Optional operator-defined expiry. Past values force fallback immediately.
