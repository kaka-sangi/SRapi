# Console users, roles, permissions, avatars, and user attributes
UserRole:
  type: string
  pattern: "^[a-z][a-z0-9_-]{0,63}$"
  description: Role name. Built-in roles are owner, admin, operator, and user; custom roles are managed through the admin roles API.
  example: payment_reader

Role:
  type: object
  required:
    - id
    - name
    - description
    - permissions
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    name:
      $ref: "#/UserRole"
    description:
      type: string
    permissions:
      type: array
      items:
        type: string
        pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

PermissionDefinition:
  type: object
  required:
    - permission
    - resource
    - action
    - description
  properties:
    permission:
      type: string
      pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"
    resource:
      type: string
    action:
      type: string
      enum:
        - read
        - write
    description:
      type: string

PermissionCatalogResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PermissionDefinition"
    request_id:
      $ref: "common.yaml#/RequestId"

CreateRoleRequest:
  type: object
  required:
    - name
    - permissions
  properties:
    name:
      $ref: "#/UserRole"
    description:
      type: string
    permissions:
      type: array
      uniqueItems: true
      items:
        type: string
        pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"

UpdateRoleRequest:
  type: object
  required:
    - permissions
  properties:
    description:
      type: string
    permissions:
      type: array
      uniqueItems: true
      items:
        type: string
        pattern: "^[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"

RoleResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/Role"
    request_id:
      $ref: "common.yaml#/RequestId"

RoleListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/Role"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

UserStatus:
  type: string
  enum:
    - active
    - disabled
    - pending

User:
  type: object
  required:
    - id
    - email
    - name
    - status
    - roles
    - balance
    - currency
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    email:
      type: string
      format: email
    name:
      type: string
    status:
      $ref: "#/UserStatus"
    roles:
      type: array
      items:
        $ref: "#/UserRole"
    balance:
      type: string
      description: Decimal string balance.
    currency:
      type: string
    rpm_limit:
      type: integer
      nullable: true
      minimum: 0
    last_login_at:
      type: string
      format: date-time
      nullable: true
    email_verified_at:
      type: string
      format: date-time
      nullable: true
    avatar_url:
      type: string
      description: Relative URL for the user's SRapi-hosted avatar image, when configured.
    avatar_mime:
      type: string
      description: Normalized avatar MIME type.
      enum:
        - image/png
    avatar_byte_size:
      type: integer
      minimum: 1
    avatar_sha256:
      type: string
      minLength: 64
      maxLength: 64
    avatar_updated_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      $ref: "common.yaml#/Timestamp"

UserAvatar:
  type: object
  required:
    - user_id
    - url
    - content_type
    - byte_size
    - sha256
    - width
    - height
    - updated_at
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    url:
      type: string
      description: Relative URL that serves the normalized avatar image.
    content_type:
      type: string
      enum:
        - image/png
    byte_size:
      type: integer
      minimum: 1
    sha256:
      type: string
      minLength: 64
      maxLength: 64
    width:
      type: integer
      minimum: 1
      maximum: 1024
    height:
      type: integer
      minimum: 1
      maximum: 1024
    updated_at:
      $ref: "common.yaml#/Timestamp"

UserAvatarResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/UserAvatar"
    request_id:
      $ref: "common.yaml#/RequestId"

CreateAdminUserRequest:
  type: object
  required:
    - email
    - name
    - password
  properties:
    email:
      type: string
      format: email
    name:
      type: string
      minLength: 1
    password:
      type: string
      format: password
      minLength: 8
    roles:
      type: array
      items:
        $ref: "#/UserRole"
      default:
        - user
    status:
      $ref: "#/UserStatus"
    balance:
      type: string
      default: "0.00000000"
    currency:
      type: string
      default: USD
    rpm_limit:
      type: integer
      nullable: true
      minimum: 0

UpdateAdminUserRequest:
  type: object
  minProperties: 1
  properties:
    email:
      type: string
      format: email
    name:
      type: string
      minLength: 1
    password:
      type: string
      format: password
      minLength: 8
    roles:
      type: array
      items:
        $ref: "#/UserRole"
    status:
      $ref: "#/UserStatus"
    rpm_limit:
      type: integer
      nullable: true
      minimum: 0

UpdateUserBalanceRequest:
  type: object
  required:
    - amount
    - operation
  properties:
    amount:
      type: string
      description: Decimal string amount.
    operation:
      type: string
      enum:
        - set
        - increment
        - decrement
    currency:
      type: string
    note:
      type: string

UserBalance:
  type: object
  required:
    - user_id
    - balance
    - currency
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    balance:
      type: string
      description: Decimal string balance.
    currency:
      type: string

UserBalanceResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/UserBalance"
    request_id:
      $ref: "common.yaml#/RequestId"

UpdateUserRpmLimitRequest:
  type: object
  required:
    - rpm_limit
  properties:
    rpm_limit:
      type: integer
      nullable: true
      minimum: 0

BatchUpdateUsersRequest:
  type: object
  required:
    - user_ids
  minProperties: 2
  properties:
    user_ids:
      type: array
      minItems: 1
      items:
        $ref: "common.yaml#/Id"
    status:
      $ref: "#/UserStatus"
    rpm_limit:
      type: integer
      nullable: true
      minimum: 0
    roles:
      type: array
      items:
        $ref: "#/UserRole"

BatchUpdateUsersResult:
  type: object
  required:
    - updated_count
    - updated_ids
    - errors
  properties:
    updated_count:
      type: integer
      minimum: 0
    updated_ids:
      type: array
      items:
        $ref: "common.yaml#/Id"
    errors:
      type: array
      items:
        type: string

BatchUpdateUsersResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchUpdateUsersResult"
    request_id:
      $ref: "common.yaml#/RequestId"

UserListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/User"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

UserResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/User"
    request_id:
      $ref: "common.yaml#/RequestId"

CreateUserSubscriptionRequest:
  type: object
  required:
    - user_id
    - plan_id
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    plan_id:
      $ref: "common.yaml#/Id"
    status:
      $ref: "billing.yaml#/UserSubscriptionStatus"
    starts_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
    source_type:
      type: string
    source_id:
      type: string

UserAttributeDefinition:
  type: object
  required:
    - id
    - key
    - name
    - data_type
    - options
    - required
    - display_order
    - enabled
    - created_at
    - updated_at
  properties:
    id:
      type: integer
      format: int64
    key:
      type: string
    name:
      type: string
    data_type:
      type: string
      enum:
        - string
        - number
        - boolean
        - select
    options:
      type: array
      items:
        type: string
    required:
      type: boolean
    display_order:
      type: integer
      format: int64
    enabled:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
CreateUserAttributeDefinitionRequest:
  type: object
  required:
    - key
    - name
    - data_type
  properties:
    key:
      type: string
    name:
      type: string
    data_type:
      type: string
      enum:
        - string
        - number
        - boolean
        - select
    options:
      type: array
      items:
        type: string
    required:
      type: boolean
    display_order:
      type: integer
      format: int64
    enabled:
      type: boolean
UpdateUserAttributeDefinitionRequest:
  type: object
  properties:
    name:
      type: string
    data_type:
      type: string
      enum:
        - string
        - number
        - boolean
        - select
    options:
      type: array
      items:
        type: string
    required:
      type: boolean
    display_order:
      type: integer
      format: int64
    enabled:
      type: boolean
UserAttributeValue:
  type: object
  required:
    - definition_id
    - key
    - name
    - data_type
    - options
    - required
    - value
  properties:
    definition_id:
      type: integer
      format: int64
    key:
      type: string
    name:
      type: string
    data_type:
      type: string
    options:
      type: array
      items:
        type: string
    required:
      type: boolean
    value:
      type: string
    updated_at:
      type: string
      format: date-time

UserAttributeValueWithUserID:
  allOf:
    - $ref: "#/UserAttributeValue"
    - type: object
      required:
        - user_id
      properties:
        user_id:
          $ref: "common.yaml#/Id"

BatchUserAttributeValuesResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/UserAttributeValueWithUserID"
    request_id:
      $ref: "common.yaml#/RequestId"

SetUserAttributeValueRequest:
  type: object
  properties:
    value:
      type: string
UserAttributeValueInput:
  type: object
  required:
    - definition_id
    - value
  properties:
    definition_id:
      type: integer
      format: int64
    value:
      type: string
UpdateCurrentUserAttributesRequest:
  type: object
  required:
    - values
  properties:
    values:
      type: array
      items:
        $ref: "#/UserAttributeValueInput"
UserAttributeDefinitionResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/UserAttributeDefinition"
    request_id:
      $ref: "common.yaml#/RequestId"
UserAttributeDefinitionListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/UserAttributeDefinition"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"
UserAttributeValueListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/UserAttributeValue"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"
SetUserAttributeValueResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: object
      required:
        - definition_id
        - value
      properties:
        definition_id:
          type: integer
          format: int64
        value:
          type: string
        updated_at:
          type: string
          format: date-time
    request_id:
      $ref: "common.yaml#/RequestId"
