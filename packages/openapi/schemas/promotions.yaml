# Redeem codes, promo codes, and batch code operations
RedeemCodeStatus:
  type: string
  enum:
    - active
    - redeemed
    - disabled
    - expired

RedeemCodeType:
  type: string
  enum:
    - balance
    - subscription

RedeemCode:
  type: object
  required:
    - id
    - code
    - type
    - status
    - value
    - currency
    - max_redemptions
    - redeemed_count
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    code:
      type: string
      minLength: 4
      maxLength: 80
    type:
      $ref: "#/RedeemCodeType"
    status:
      $ref: "#/RedeemCodeStatus"
    value:
      type: string
      pattern: "^[0-9]+(\\.[0-9]+)?$"
      description: Balance amount for balance codes, or subscription plan id for subscription codes.
    currency:
      type: string
      minLength: 3
      maxLength: 8
    max_redemptions:
      type: integer
      minimum: 1
    redeemed_count:
      type: integer
      minimum: 0
    expires_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true
    note:
      type: string
      description: Free-text audit comment last applied to this code (set by bulk-disable).
    disabled_reason:
      type: string
      description: Why this code is in disabled status, if applicable. Empty for active/used codes.
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreateRedeemCodeRequest:
  type: object
  required:
    - code
    - type
    - value
  properties:
    code:
      type: string
      minLength: 4
      maxLength: 80
    type:
      $ref: "#/RedeemCodeType"
    value:
      type: string
      pattern: "^[0-9]+(\\.[0-9]+)?$"
      description: Balance amount for balance codes, or subscription plan id for subscription codes.
    currency:
      type: string
      minLength: 3
      maxLength: 8
      default: USD
    max_redemptions:
      type: integer
      minimum: 1
      default: 1
    expires_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true

RedeemCodeRedemptionRequest:
  type: object
  required:
    - code
  properties:
    code:
      type: string
      minLength: 4
      maxLength: 80

RedeemCodeRedemption:
  type: object
  required:
    - id
    - user_id
    - redeem_code_id
    - type
    - amount
    - currency
    - balance_before
    - balance_after
    - redeemed_at
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    user_id:
      $ref: "common.yaml#/Id"
    redeem_code_id:
      $ref: "common.yaml#/Id"
    type:
      $ref: "#/RedeemCodeType"
    amount:
      type: string
    currency:
      type: string
    balance_before:
      type: string
    balance_after:
      type: string
    billing_ledger_id:
      $ref: "common.yaml#/Id"
      nullable: true
    user_subscription_id:
      $ref: "common.yaml#/Id"
      nullable: true
    redeemed_at:
      $ref: "common.yaml#/Timestamp"
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

RedeemCodeRedemptionResult:
  type: object
  required:
    - redemption
    - redeem_code
    - already_redeemed
  properties:
    redemption:
      $ref: "#/RedeemCodeRedemption"
    redeem_code:
      $ref: "#/RedeemCode"
    already_redeemed:
      type: boolean

RedeemCodeRedemptionResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/RedeemCodeRedemptionResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchGenerateRedeemCodesRequest:
  type: object
  required:
    - count
    - type
    - value
  properties:
    prefix:
      type: string
      maxLength: 20
      default: SR
    count:
      type: integer
      minimum: 1
      maximum: 1000
    type:
      $ref: "#/RedeemCodeType"
    value:
      type: string
      pattern: "^[0-9]+(\\.[0-9]+)?$"
      description: Balance amount for balance codes, or subscription plan id for subscription codes.
    currency:
      type: string
      minLength: 3
      maxLength: 8
      default: USD
    max_redemptions:
      type: integer
      minimum: 1
      default: 1
    expires_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true

BatchDisableRedeemCodesRequest:
  type: object
  required:
    - ids
  properties:
    ids:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "common.yaml#/Id"
    note:
      type: string
      maxLength: 500
      nullable: true
      description: Free-text audit comment recorded against every code disabled by this call.

BatchUpdateRedeemCodeItem:
  type: object
  required:
    - id
  properties:
    id:
      $ref: "common.yaml#/Id"
    amount:
      type: string
      nullable: true
      description: New redemption amount (decimal string > 0; balance codes only). Null leaves unchanged.
    max_redemptions:
      type: integer
      nullable: true
      minimum: 1
      description: New max-redemption cap. Null leaves unchanged.
    expires_at:
      type: string
      format: date-time
      nullable: true
      description: New expiry (RFC3339). Null in the JSON body clears the expiry (NullableTimeUpdate semantics from sub2api).
    note:
      type: string
      nullable: true
      description: New operator note (free text). Null leaves unchanged.

BatchUpdateRedeemCodesRequest:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/BatchUpdateRedeemCodeItem"

BatchUpdateRedeemCodeErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchUpdateRedeemCodesResult:
  type: object
  required:
    - updated_count
    - errors
  properties:
    updated_count:
      type: integer
    errors:
      type: array
      description: Per-id failures (invalid id, invalid value, already-redeemed gate, store error). NotFound is idempotent.
      items:
        $ref: "#/BatchUpdateRedeemCodeErrorRow"

BatchUpdateRedeemCodesResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchUpdateRedeemCodesResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchExtendRedeemCodesRequest:
  type: object
  required:
    - ids
    - expires_at
  properties:
    ids:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "common.yaml#/Id"
    expires_at:
      $ref: "common.yaml#/Timestamp"

RedeemCodeResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/RedeemCode"
    request_id:
      $ref: "common.yaml#/RequestId"

RedeemCodeListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/RedeemCode"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

RedeemCodeStats:
  type: object
  required:
    - total
    - active
    - redeemed
    - disabled
    - expired
  properties:
    total:
      type: integer
      minimum: 0
    active:
      type: integer
      minimum: 0
    redeemed:
      type: integer
      minimum: 0
    disabled:
      type: integer
      minimum: 0
    expired:
      type: integer
      minimum: 0

RedeemCodeStatsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/RedeemCodeStats"
    request_id:
      $ref: "common.yaml#/RequestId"

PromoCodeStatus:
  type: string
  enum:
    - active
    - disabled
    - expired

PromoDiscountType:
  type: string
  enum:
    - amount
    - percent

PromoCode:
  type: object
  required:
    - id
    - code
    - status
    - discount_type
    - discount_value
    - currency
    - max_uses
    - per_user_limit
    - min_order_amount
    - used_count
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    code:
      type: string
      minLength: 4
      maxLength: 80
    status:
      $ref: "#/PromoCodeStatus"
    discount_type:
      $ref: "#/PromoDiscountType"
    discount_value:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    currency:
      type: string
      minLength: 3
      maxLength: 8
    max_uses:
      type: integer
      minimum: 1
    per_user_limit:
      type: integer
      minimum: 0
      description: Maximum active uses per user. Zero means no per-user limit.
    min_order_amount:
      type: string
      pattern: "^[0-9]+(\\.[0-9]+)?$"
      description: Minimum original order amount required before the discount applies. Blank means no minimum.
    used_count:
      type: integer
      minimum: 0
    starts_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true
    expires_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreatePromoCodeRequest:
  type: object
  required:
    - code
    - discount_type
    - discount_value
  properties:
    code:
      type: string
      minLength: 4
      maxLength: 80
    discount_type:
      $ref: "#/PromoDiscountType"
    discount_value:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    currency:
      type: string
      minLength: 3
      maxLength: 8
      default: USD
    max_uses:
      type: integer
      minimum: 1
      default: 1
    per_user_limit:
      type: integer
      minimum: 0
      default: 0
      description: Maximum active uses per user. Zero means no per-user limit.
    min_order_amount:
      type: string
      pattern: "^[0-9]+(\\.[0-9]+)?$"
      description: Minimum original order amount required before the discount applies. Omit for no minimum.
    status:
      $ref: "#/PromoCodeStatus"
    starts_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true
    expires_at:
      $ref: "common.yaml#/Timestamp"
      nullable: true

UpdatePromoCodeRequest:
  allOf:
    - $ref: "#/CreatePromoCodeRequest"

PromoCodeResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/PromoCode"
    request_id:
      $ref: "common.yaml#/RequestId"

PromoCodeListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PromoCode"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PromoCodeUsage:
  type: object
  required:
    - id
    - user_id
    - promo_code_id
    - payment_order_id
    - order_no
    - original_amount
    - discount_amount
    - final_amount
    - currency
    - discount_type
    - applied_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    user_id:
      $ref: "common.yaml#/Id"
    promo_code_id:
      $ref: "common.yaml#/Id"
    payment_order_id:
      $ref: "common.yaml#/Id"
    order_no:
      type: string
    original_amount:
      type: string
    discount_amount:
      type: string
    final_amount:
      type: string
    currency:
      type: string
    discount_type:
      $ref: "#/PromoDiscountType"
    applied_at:
      $ref: "common.yaml#/Timestamp"

PromoCodeUsageListResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PromoCodeUsage"
    request_id:
      $ref: "common.yaml#/RequestId"
