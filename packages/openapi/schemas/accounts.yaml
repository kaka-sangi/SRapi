BatchUpdateAccountsRequest:
  type: object
  required:
    - account_ids
    - status
  properties:
    account_ids:
      type: array
      minItems: 1
      items:
        $ref: "common.yaml#/Id"
    status:
      $ref: "#/ProviderAccountStatus"
    priority:
      type: integer
      minimum: 0
      description: |
        Optional — when present, the scheduler-tier priority is set across
        every selected account. Higher = preferred. Omit to leave priority
        unchanged. Useful for re-tiering an entire group of accounts at
        once after a quality re-evaluation.
    weight:
      type: number
      format: float
      minimum: 0
      description: |
        Optional — when present, the load-balancer weight is set across
        every selected account. Omit to leave weight unchanged. Useful
        for re-balancing traffic across a tenant's accounts in one
        operation.
    risk_level:
      type: string
      description: |
        Optional — when present, the risk-level label is set across every
        selected account. Omit to leave risk_level unchanged. The label
        feeds the content-safety gate; bulk-setting is dangerous on a
        heterogeneous selection (e.g. mixing personal + pooled accounts)
        — pair with an admin confirm step in the UI.

BulkUpdateProviderAccountsRequest:
  type: object
  description: |
    sub2api `BulkUpdateAccountsRequest` superset. Either `account_ids`
    or `filters` is required (server-side filter resolution lets the
    UI offer "Edit Filtered" without round-tripping IDs through the
    client). Every editable field is optional — only fields present
    in the payload are written, so a caller can change just
    `priority` for the selection without touching `status`. Mirrors
    Service.BulkUpdateAccounts; per-row failures collect in `errors`.
  properties:
    account_ids:
      type: array
      minItems: 1
      items:
        $ref: "common.yaml#/Id"
      description: |
        Explicit selection. Mutually exclusive with `filters` — supply
        one or the other. When both are present, `account_ids` wins
        (matches sub2api).
    filters:
      $ref: "#/BulkUpdateProviderAccountsFilters"
    add_group_id:
      $ref: "common.yaml#/Id"
      description: |
        Optional account group id to add every resolved account to.
        This can be the only mutation in the request, so "bulk edit
        filtered" can assign group membership without the client
        round-tripping every matched account id. The operation is
        idempotent for accounts that are already members.
    name:
      type: string
      description: |
        Optional — rename every selected account. Almost never useful
        for >1 account; included for sub2api parity.
    status:
      $ref: "#/ProviderAccountStatus"
    priority:
      type: integer
      minimum: 0
      description: Optional scheduler-tier priority. Higher = preferred.
    weight:
      type: number
      format: float
      minimum: 0
      description: Optional load-balancer weight.
    risk_level:
      type: string
      description: Optional risk-level label for the content-safety gate.
    max_concurrency:
      type: integer
      minimum: 0
      description: |
        Optional per-account concurrency cap (0 clears the cap).
        Stored in account metadata under `max_concurrency` — same key
        the scheduler reads at admission, identical to
        `/admin/accounts/batch-concurrency`.
    proxy_id:
      type: string
      nullable: true
      description: |
        Optional active proxy definition id. Raw proxy URLs are rejected; create and enable a proxy definition first.
        Empty string clears the binding.
        Encode `null` as JSON null to leave unchanged.
    upstream_client:
      type: string
      nullable: true
      description: |
        Optional upstream-client override. Empty string clears.
        Encode `null` (the default when omitted) to leave unchanged.
    runtime_class:
      type: string
      description: |
        Optional auth-mechanism override (api_key / oauth_refresh /
        etc.). Caller must ensure the runtime class is allowed by
        the provider — the handler does NOT re-validate here.

BulkUpdateProviderAccountsFilters:
  type: object
  description: |
    Server-side filter set for `BulkUpdateProviderAccountsRequest` —
    mirrors the GET /accounts list-query knobs. The handler resolves
    these to IDs using the same list path the admin table uses, so
    what the caller sees IS what the bulk-edit hits. An empty filter
    set deliberately matches nothing (refuses to operate on every
    account by accident).
  properties:
    provider_id:
      type: string
      description: Restrict to a single provider.
    status:
      type: string
      description: Restrict to a single status (active/disabled/...).
    group_id:
      type: string
      description: Restrict to members of one account group.
    runtime_class:
      type: string
      description: Restrict to one runtime class (api_key/oauth_refresh/...).
    search:
      type: string
      description: |
        Case-insensitive substring match against the account name.
        Mirrors sub2api `filters.search`.

