AccountOAuthDeviceCodeResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AccountOAuthDeviceCode"
    request_id:
      $ref: "common.yaml#/RequestId"

AccountOAuthDevicePollRequest:
  type: object
  required:
    - session_id
  properties:
    session_id:
      type: string

DiscoverAccountModelsRequest:
  type: object
  properties:
    persist:
      type: boolean
      default: false
      description: Persist discovered model IDs to account metadata.
    limit:
      type: integer
      minimum: 1
      maximum: 1000
      default: 200
      description: Maximum number of discovered model IDs to return.

AccountModelDiscovery:
  type: object
  required:
    - provider_id
    - account_id
    - source
    - endpoint
    - model_ids
    - persisted
    - checked_at
  properties:
    provider_id:
      $ref: "common.yaml#/Id"
    account_id:
      $ref: "common.yaml#/Id"
    source:
      type: string
      enum:
        - openai-compatible
        - anthropic-compatible
        - gemini-compatible
        - reverse-proxy-antigravity
    endpoint:
      type: string
      format: uri
    model_ids:
      type: array
      items:
        type: string
      default: []
    persisted:
      type: boolean
    checked_at:
      $ref: "common.yaml#/Timestamp"

AccountModelDiscoveryResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AccountModelDiscovery"
    request_id:
      $ref: "common.yaml#/RequestId"

AccountGroupRateLimit:
  type: object
  required:
    - account_group_id
    - rpm_limit
    - tpm_limit
    - max_concurrency
    - enabled
    - created_at
    - updated_at
  properties:
    account_group_id:
      type: integer
      format: int64
    rpm_limit:
      type: integer
      format: int64
      minimum: 0
    tpm_limit:
      type: integer
      format: int64
      minimum: 0
    max_concurrency:
      type: integer
      format: int64
      minimum: 0
    enabled:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
AccountAvailabilityRollup:
  type: object
  required:
    - date
    - provider_id
    - total_samples
    - healthy_samples
    - availability_ratio
    - avg_success_rate
    - computed_at
  properties:
    date:
      type: string
    provider_id:
      type: integer
      format: int64
    total_samples:
      type: integer
      format: int64
    healthy_samples:
      type: integer
      format: int64
    availability_ratio:
      type: number
      format: float
    avg_success_rate:
      type: number
      format: float
    computed_at:
      type: string
      format: date-time
AccountAvailabilitySummary:
  type: object
  required:
    - account_id
    - account_name
    - provider_id
    - status
    - overall_uptime
    - window_days
  properties:
    account_id:
      type: integer
      format: int64
    account_name:
      type: string
    provider_id:
      type: integer
      format: int64
    status:
      type: string
    overall_uptime:
      type: number
      format: float
    window_days:
      type: integer
      format: int64
    last_checked_at:
      type: string
      format: date-time
      nullable: true
AccountsAvailabilitySummaryResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/AccountAvailabilitySummary"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"
AccountAvailabilityResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: object
      required:
        - account_id
        - window_days
        - overall_uptime
        - daily_availability
      properties:
        account_id:
          type: integer
          format: int64
        window_days:
          type: integer
          format: int64
        overall_uptime:
          type: number
          format: float
        daily_availability:
          type: array
          items:
            $ref: "#/AccountAvailabilityRollup"
    request_id:
      $ref: "common.yaml#/RequestId"
AccountQuotaSignal:
  type: object
  required:
    - quota_type
    - remaining
    - used
    - quota_limit
    - remaining_ratio
  properties:
    quota_type:
      type: string
    remaining:
      type: string
    used:
      type: string
    quota_limit:
      type: string
    remaining_ratio:
      type: number
      format: float
    reset_at:
      type: string
      format: date-time
AccountQuotaReport:
  type: object
  required:
    - provider
    - supported
    - source
    - plan
    - credits_remaining
    - credits_used
    - credits_limit
    - currency
    - status_code
    - fetched_at
    - quota_signals
  properties:
    provider:
      type: string
    supported:
      type: boolean
    source:
      type: string
    plan:
      type: string
    credits_remaining:
      type: string
    credits_used:
      type: string
    credits_limit:
      type: string
    currency:
      type: string
    status_code:
      type: integer
      format: int64
    fetched_at:
      type: string
      format: date-time
    quota_signals:
      type: array
      items:
        $ref: "#/AccountQuotaSignal"
AccountQuotaReportResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AccountQuotaReport"
    request_id:
      $ref: "common.yaml#/RequestId"
