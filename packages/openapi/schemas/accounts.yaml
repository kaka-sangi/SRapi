# Provider accounts, account groups, batch operations, and OAuth credentials
ProviderOAuthConfig:
  type: object
  required:
    - provider_id
    - provider_name
    - config
  properties:
    provider_id:
      $ref: "common.yaml#/Id"
    provider_name:
      type: string
    config:
      $ref: "#/AccountOAuthProviderConfig"

ProviderOAuthConfigResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/ProviderOAuthConfig"
    request_id:
      $ref: "common.yaml#/RequestId"

AdminAccountManualPauseRequest:
  type: object
  required:
    - until
  properties:
    until:
      $ref: "common.yaml#/Timestamp"
      description: >-
        RFC3339 wall-clock instant at which the pause auto-expires. Must
        be strictly in the future; the server clamps the comparison to
        its own clock so client-side drift cannot bypass the check.
    reason:
      type: string
      maxLength: 200
      description: >-
        Optional operator-supplied free-form context surfaced to other
        operators (e.g. "investigating slow upstream", "rotating proxy").
        Trimmed and truncated server-side.

AdminAccountTestRequest:
  type: object
  properties:
    mode:
      type: string
      enum:
        - default
        - live
        - responses_compact
      default: default
      description: Use `live` for a real upstream round-trip; default only validates local configuration.
    model:
      type: string
      description: Optional registered canonical model name or alias for live/compact probes.
    model_id:
      type: string
      description: Backward-compatible alias for `model`.
    prompt:
      type: string
      maxLength: 4000
      description: Optional user prompt for live/compact probes. When omitted, SRapi uses a minimal OK probe.

RuntimeClass:
  type: string
  enum:
    - api_key
    - oauth_refresh
    - oauth_device_code
    - web_session_cookie
    - cli_client_token
    - custom_reverse_proxy
    - service_account_json

PlatformFamily:
  type: string
  description: Upstream protocol/platform family a provider preset belongs to.
  enum:
    - openai_compatible
    - anthropic_compatible
    - gemini_compatible
    - bedrock_anthropic
    - xai_compatible
    - reverse_proxy_antigravity
    - rerank_compatible

ProviderAccountStatus:
  type: string
  enum:
    - active
    - disabled
    - needs_reauth
    - suspended
    - dead
    - archived

AccountGroupStatus:
  type: string
  enum:
    - active
    - disabled

AccountGroup:
  type: object
  required:
    - id
    - name
    - description
    - provider_scope
    - model_scope
    - strategy_hint
    - status
    - rate_multiplier
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    name:
      type: string
      minLength: 1
    description:
      type: string
    provider_scope:
      $ref: "common.yaml#/JsonObject"
    model_scope:
      $ref: "common.yaml#/JsonObject"
    strategy_hint:
      type: string
      example: balanced
    status:
      $ref: "#/AccountGroupStatus"
    rate_multiplier:
      type: string
      description: |
        Decimal multiplier applied to per-request usage charges for
        accounts in this group (discount: < 1.0; markup: > 1.0). Default
        "1.00000000". See modules/accounts/service.go for normalisation.
      example: "1.00000000"
    created_at:
      $ref: "common.yaml#/Timestamp"

CreateAccountGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
    description:
      type: string
      default: ""
    provider_scope:
      $ref: "common.yaml#/JsonObject"
    model_scope:
      $ref: "common.yaml#/JsonObject"
    strategy_hint:
      type: string
      example: balanced
    status:
      $ref: "#/AccountGroupStatus"
    rate_multiplier:
      type: string
      description: Optional rate multiplier. Defaults to "1.00000000" when omitted.
      example: "1.00000000"

UpdateAccountGroupRequest:
  type: object
  minProperties: 1
  properties:
    name:
      type: string
      minLength: 1
    description:
      type: string
    provider_scope:
      $ref: "common.yaml#/JsonObject"
    model_scope:
      $ref: "common.yaml#/JsonObject"
    strategy_hint:
      type: string
    status:
      $ref: "#/AccountGroupStatus"
    rate_multiplier:
      type: string
      description: Optional decimal multiplier; pass to update the per-group rate.
      example: "0.80000000"

AccountGroupResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AccountGroup"
    request_id:
      $ref: "common.yaml#/RequestId"

AccountGroupListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/AccountGroup"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

AccountGroupMember:
  type: object
  required:
    - id
    - account_id
    - account_group_id
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    account_id:
      $ref: "common.yaml#/Id"
    account_group_id:
      $ref: "common.yaml#/Id"
    created_at:
      $ref: "common.yaml#/Timestamp"

AccountGroupMemberResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AccountGroupMember"
    request_id:
      $ref: "common.yaml#/RequestId"

AccountGroupMemberListResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/AccountGroupMember"
    request_id:
      $ref: "common.yaml#/RequestId"

ProviderAccount:
  type: object
  required:
    - id
    - provider_id
    - name
    - runtime_class
    - status
    - priority
    - weight
    - group_ids
    - concurrency
    - schedulable
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    provider_id:
      $ref: "common.yaml#/Id"
    platform:
      type: string
      description: Provider family denormalized for fast filtering (anthropic, openai, gemini, antigravity).
    account_type:
      type: string
      description: Simplified auth type (apikey, oauth, setup-token, upstream, bedrock, service_account).
    name:
      type: string
    runtime_class:
      $ref: "#/RuntimeClass"
    upstream_client:
      type: string
      nullable: true
      example: claude_code_cli
    proxy_id:
      type: string
      nullable: true
      description: Registered proxy definition id when this account is bound to one.
    status:
      $ref: "#/ProviderAccountStatus"
    priority:
      type: integer
      default: 0
    weight:
      type: number
      minimum: 0
      default: 1
    risk_level:
      type: string
      nullable: true
    group_ids:
      type: array
      items:
        $ref: "common.yaml#/Id"
      default: []
    notes:
      type: string
      description: Operator-supplied freetext visible on the admin panel.
    concurrency:
      type: integer
      default: 3
      description: Max concurrent upstream requests for this account.
    rate_multiplier:
      type: number
      default: 1.0
      description: Per-account billing multiplier.
    load_factor:
      type: integer
      nullable: true
      description: Load distribution weight in the scheduler.
    schedulable:
      type: boolean
      default: true
      description: Direct scheduling flag; false skips without status change.
    error_message:
      type: string
      description: Last error details for operator troubleshooting.
    last_used_at:
      type: string
      format: date-time
      nullable: true
      description: When this account last served a request.
    expires_at:
      type: string
      format: date-time
      nullable: true
      description: Account-level expiry (NOT OAuth token expiry).
    auto_pause_on_expired:
      type: boolean
      default: true
      description: Pause scheduling when expires_at is reached.
    metadata:
      allOf:
        - $ref: "common.yaml#/JsonObject"
      description: >
        Operational state metadata. Convention keys:
        `base_url`, `supported_models`, `excluded_models`, `model_mapping`.
    extra:
      allOf:
        - $ref: "common.yaml#/JsonObject"
      description: >
        Per-account config separate from operational metadata.
    token_expires_at:
      type: string
      format: date-time
      allOf:
        - $ref: "common.yaml#/Timestamp"
      nullable: true
      description: >
        Wall-clock expiry of the OAuth access token, snapshotted from the
        credential after the last successful refresh. Null when the
        account has never been refreshed or the credential carries no
        expires_at. OAuth runtime classes only.
    last_refreshed_at:
      type: string
      format: date-time
      allOf:
        - $ref: "common.yaml#/Timestamp"
      nullable: true
      description: Time of the most recent successful OAuth refresh.
    needs_reauth_at:
      type: string
      format: date-time
      allOf:
        - $ref: "common.yaml#/Timestamp"
      nullable: true
      description: >
        Set when refresh has become hopeless (permanent OAuth error such
        as invalid_grant, OR refresh_attempts >= 5). The proactive
        refresh worker skips accounts with this set so the upstream is
        not hammered; an operator must re-bind the account to clear it.
    refresh_attempts:
      type: integer
      default: 0
      description: Consecutive refresh-failure count; reset to 0 on a success.
    refresh_last_error:
      type: string
      description: Most recent refresh error message (truncated to 500 chars).
    created_at:
      $ref: "common.yaml#/Timestamp"

CreateProviderAccountRequest:
  type: object
  required:
    - provider_id
    - name
    - runtime_class
    - credential
  properties:
    provider_id:
      $ref: "common.yaml#/Id"
    name:
      type: string
      minLength: 1
    runtime_class:
      $ref: "#/RuntimeClass"
    upstream_client:
      type: string
      nullable: true
    credential:
      type: object
      description: Write-only credential payload. It must be encrypted before persistence.
      writeOnly: true
      additionalProperties: true
    proxy_id:
      type: string
      nullable: true
      description: Registered active proxy definition id. Raw proxy URLs are rejected; create and enable a proxy definition first.
    status:
      $ref: "#/ProviderAccountStatus"
    priority:
      type: integer
      default: 0
    weight:
      type: number
      minimum: 0
      default: 1
    risk_level:
      type: string
      enum:
        - normal
        - medium
        - high
      default: normal
    metadata:
      $ref: "common.yaml#/JsonObject"
    extra:
      $ref: "common.yaml#/JsonObject"
    notes:
      type: string
      description: Operator-supplied freetext.
    concurrency:
      type: integer
      default: 3
      description: Max concurrent upstream requests.
    rate_multiplier:
      type: number
      default: 1.0
    load_factor:
      type: integer
      nullable: true
    group_ids:
      type: array
      items:
        type: integer
      description: Bind to these account groups at creation time.
    expires_at:
      type: string
      format: date-time
      nullable: true
      description: Account-level expiry timestamp.
    auto_pause_on_expired:
      type: boolean
      default: true

BatchCreateProviderAccountsRequest:
  type: object
  required:
    - defaults
    - items
  properties:
    defaults:
      type: object
      description: |
        Applied to every item unless the item overrides it. Same shape as
        CreateProviderAccountRequest minus name + credential, which must
        be supplied per row.
      required:
        - provider_id
        - runtime_class
      properties:
        provider_id:
          $ref: "common.yaml#/Id"
        runtime_class:
          $ref: "#/RuntimeClass"
        upstream_client:
          type: string
          nullable: true
        group_id:
          type: integer
          nullable: true
          description: When set, every successfully created account is added to this group.
        proxy_id:
          type: string
          nullable: true
          description: Registered active proxy definition id. Raw proxy URLs are rejected; create and enable a proxy definition first.
        priority:
          type: integer
          default: 0
        weight:
          type: number
          minimum: 0
          default: 1
        risk_level:
          type: string
          enum:
            - normal
            - medium
            - high
          default: normal
        metadata:
          $ref: "common.yaml#/JsonObject"
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        type: object
        required:
          - name
          - credential
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 255
          credential:
            type: object
            additionalProperties: true
            writeOnly: true
            description: OAuth/api-key credential map; same shape as the single-create endpoint's credential field.
          group_id:
            type: integer
            nullable: true
            description: Per-row override of defaults.group_id.
          priority:
            type: integer
            nullable: true
          weight:
            type: number
            minimum: 0
            nullable: true

BatchCreateProviderAccountsResultRow:
  type: object
  required:
    - index
    - name
  properties:
    index:
      type: integer
      description: Zero-based index in the request `items` array.
    name:
      type: string
    account_id:
      type: string
      allOf:
        - $ref: "common.yaml#/Id"
      nullable: true
    error:
      type: string
      nullable: true
      description: Empty when account_id is set; non-empty when account_id is null (validation, dedup, store failure).

BatchCreateProviderAccountsResult:
  type: object
  required:
    - results
    - succeeded
    - failed
  properties:
    results:
      type: array
      items:
        $ref: "#/BatchCreateProviderAccountsResultRow"
    succeeded:
      type: integer
    failed:
      type: integer

BatchCreateProviderAccountsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchCreateProviderAccountsResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchDeleteProviderAccountsRequest:
  type: object
  required:
    - account_ids
  properties:
    account_ids:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "common.yaml#/Id"

BatchDeleteProviderAccountsErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchDeleteProviderAccountsResult:
  type: object
  required:
    - deleted_count
    - deleted_ids
    - errors
  properties:
    deleted_count:
      type: integer
    deleted_ids:
      type: array
      items:
        $ref: "common.yaml#/Id"
    errors:
      type: array
      description: Per-id failures (e.g. duplicate id within the batch, decryption error). NotFound is NOT a failure here — idempotent semantics.
      items:
        $ref: "#/BatchDeleteProviderAccountsErrorRow"

BatchDeleteProviderAccountsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchDeleteProviderAccountsResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchAccountGroupMembersRequest:
  type: object
  required:
    - account_ids
  properties:
    account_ids:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "common.yaml#/Id"

BatchAccountGroupMembersErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchAccountGroupMembersResult:
  type: object
  required:
    - applied_count
    - applied_ids
    - errors
  properties:
    applied_count:
      type: integer
    applied_ids:
      type: array
      items:
        $ref: "common.yaml#/Id"
    errors:
      type: array
      description: Per-id failures (account not found, duplicate within batch, store conflict). Idempotent successes (already-member on add, not-member on remove) appear in applied_ids, NOT errors.
      items:
        $ref: "#/BatchAccountGroupMembersErrorRow"

BatchAccountGroupMembersResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchAccountGroupMembersResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchUpdateAccountConcurrencyItem:
  type: object
  required:
    - account_id
    - max_concurrency
  properties:
    account_id:
      $ref: "common.yaml#/Id"
    max_concurrency:
      type: integer
      minimum: 0
      description: New per-account ceiling on concurrent in-flight requests. 0 clears the cap (the scheduler treats absent + zero identically).

BatchUpdateAccountConcurrencyRequest:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/BatchUpdateAccountConcurrencyItem"

BatchUpdateAccountConcurrencyErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchUpdateAccountConcurrencyResult:
  type: object
  required:
    - updated_count
    - errors
  properties:
    updated_count:
      type: integer
    errors:
      type: array
      description: Per-id failures (invalid id, duplicate in batch, store error). NotFound is NOT a failure — idempotent semantics.
      items:
        $ref: "#/BatchUpdateAccountConcurrencyErrorRow"

BatchUpdateAccountConcurrencyResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchUpdateAccountConcurrencyResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchRefreshAdminAccountsRequest:
  type: object
  required:
    - account_ids
  properties:
    account_ids:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "common.yaml#/Id"

BatchRefreshAdminAccountsErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchRefreshAdminAccountsRow:
  type: object
  required:
    - account_id
    - outcome_class
  properties:
    account_id:
      $ref: "common.yaml#/Id"
    outcome_class:
      type: string
      description: Categorical refresh outcome (success / permanent_error / transient_error / threshold_exceeded). Empty string when NotFound was idempotently skipped.
    attempts:
      type: integer
      description: Post-call refresh_attempts (the cumulative consecutive-failure count; 0 on success).
    needs_reauth_flipped:
      type: boolean
      description: True when this call moved needs_reauth_at from nil to non-nil.

BatchRefreshAdminAccountsResult:
  type: object
  required:
    - refreshed_count
    - rows
    - errors
  properties:
    refreshed_count:
      type: integer
      description: Number of rows that completed successfully (outcome_class=success or NotFound idempotent skip).
    rows:
      type: array
      description: Per-id refresh outcome — preserves request order; carries the structured class + attempts even for failure rows.
      items:
        $ref: "#/BatchRefreshAdminAccountsRow"
    errors:
      type: array
      description: Per-id failures (invalid id, duplicate in batch, non-OAuth runtime class, refresher error). NotFound is NOT a failure — idempotent semantics.
      items:
        $ref: "#/BatchRefreshAdminAccountsErrorRow"

BatchRefreshAdminAccountsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchRefreshAdminAccountsResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchUpdateAdminAccountCredentialItem:
  type: object
  required:
    - account_id
    - credential
  properties:
    account_id:
      $ref: "common.yaml#/Id"
    credential:
      allOf:
        - $ref: "common.yaml#/JsonObject"
      description: Partial credential patch. Only fields present here overwrite the stored credential; absent fields are preserved. An empty object is rejected per-row to keep operator typos visible.

BatchUpdateAdminAccountCredentialsRequest:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/BatchUpdateAdminAccountCredentialItem"

BatchUpdateAdminAccountCredentialErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchUpdateAdminAccountCredentialsResult:
  type: object
  required:
    - updated_count
    - errors
  properties:
    updated_count:
      type: integer
    errors:
      type: array
      description: Per-id failures (invalid id, empty patch, store/encryption error, duplicate in batch). NotFound is NOT a failure — idempotent semantics.
      items:
        $ref: "#/BatchUpdateAdminAccountCredentialErrorRow"

BatchUpdateAdminAccountCredentialsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchUpdateAdminAccountCredentialsResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchSetAdminAffiliateRebateRateItem:
  type: object
  required:
    - user_id
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    rate_percent:
      type: number
      format: double
      minimum: 0
      maximum: 1
      nullable: true
      description: Override rate as a 0..1 fraction (e.g. 0.15 = 15%). Required unless clear=true.
    clear:
      type: boolean
      description: When true, removes the override and falls back to the rule-derived rate. rate_percent is ignored when clear=true.

BatchSetAdminAffiliateRebateRateRequest:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/BatchSetAdminAffiliateRebateRateItem"

BatchSetAdminAffiliateRebateRateErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchSetAdminAffiliateRebateRateResult:
  type: object
  required:
    - updated_count
    - errors
  properties:
    updated_count:
      type: integer
    errors:
      type: array
      description: Per-id failures (invalid id, rate out of range, duplicate in batch).
      items:
        $ref: "#/BatchSetAdminAffiliateRebateRateErrorRow"

BatchSetAdminAffiliateRebateRateResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BatchSetAdminAffiliateRebateRateResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BatchAssignAdminUserSubscriptionItem:
  type: object
  required:
    - user_id
    - plan_id
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    plan_id:
      $ref: "common.yaml#/Id"
    expires_at:
      type: string
      format: date-time
      nullable: true
      description: Optional explicit expiry override. When absent the subscription expires at start + plan.validity_days.
    source_type:
      type: string
      description: Optional idempotency source tag — when both source_type and source_id are set, a matching existing subscription is returned idempotently (mirrors sub2api reused).
    source_id:
      type: string

BatchAssignAdminUserSubscriptionsRequest:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/BatchAssignAdminUserSubscriptionItem"

BatchAssignAdminUserSubscriptionsErrorRow:
  type: object
  required:
    - id
    - message
  properties:
    id:
      $ref: "common.yaml#/Id"
    message:
      type: string

BatchAssignAdminUserSubscriptionsRow:
  type: object
  required:
    - user_id
    - plan_id
    - outcome
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    plan_id:
      $ref: "common.yaml#/Id"
    outcome:
      type: string
      enum:
        - created
        - reused
        - failed
        - skipped
    subscription_id:
      $ref: "common.yaml#/Id"

BatchAssignAdminUserSubscriptionsResult:
  type: object
  required:
    - created_count
    - reused_count
    - rows
    - errors
  properties:
    created_count:
      type: integer
    reused_count:
      type: integer
    rows:
      type: array
      description: Per-row outcome in request order — carries created/reused/failed plus the subscription id on success.
      items:
        $ref: "#/BatchAssignAdminUserSubscriptionsRow"
    errors:
      type: array
