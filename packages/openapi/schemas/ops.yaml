# Operational observability: SLOs, alert rules, silences, notification channels, scheduled tests, channel monitors, domain events, and realtime slots
OpsOverview:
  type: object
  required:
    - window
    - request_count
    - success_count
    - error_count
    - error_rate
    - latency_p50_ms
    - latency_p95_ms
    - latency_p99_ms
    - average_latency_ms
    - rpm
    - tpm
    - active_users
    - generated_at
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    request_count:
      type: integer
      minimum: 0
    success_count:
      type: integer
      minimum: 0
    error_count:
      type: integer
      minimum: 0
    error_rate:
      type: number
      minimum: 0
      maximum: 1
    latency_p50_ms:
      type: integer
      minimum: 0
    latency_p95_ms:
      type: integer
      minimum: 0
    latency_p99_ms:
      type: integer
      minimum: 0
    average_latency_ms:
      type: integer
      minimum: 0
    rpm:
      type: integer
      minimum: 0
    tpm:
      type: integer
      minimum: 0
    active_users:
      type: integer
      minimum: 0
    generated_at:
      $ref: "common.yaml#/Timestamp"

OpsOverviewResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsOverview"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsRealtimeRateSummary:
  type: object
  required:
    - current
    - peak
    - average
  properties:
    current:
      type: integer
      minimum: 0
      description: Rate observed in the final minute of the window.
    peak:
      type: integer
      minimum: 0
      description: Highest one-minute bucket observed in the window.
    average:
      type: integer
      minimum: 0
      description: Full-window average rate per minute.

OpsRealtimeTraffic:
  type: object
  required:
    - window
    - requests_per_min
    - tokens_per_min
    - total_requests
    - error_count
    - error_rate
    - usage_log_count
    - ops_error_log_count
    - generated_at
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    requests_per_min:
      $ref: "#/OpsRealtimeRateSummary"
    tokens_per_min:
      $ref: "#/OpsRealtimeRateSummary"
    total_requests:
      type: integer
      minimum: 0
      description: Deduplicated request attempts in the selected window.
    error_count:
      type: integer
      minimum: 0
      description: Failed request attempts, including error-only ops logs.
    error_rate:
      type: number
      minimum: 0
      maximum: 1
    usage_log_count:
      type: integer
      minimum: 0
      description: Usage rows scanned for the selected window.
    ops_error_log_count:
      type: integer
      minimum: 0
      description: Ops error rows scanned for the selected window.
    generated_at:
      $ref: "common.yaml#/Timestamp"

OpsRealtimeTrafficResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsRealtimeTraffic"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsThroughputTrendPoint:
  type: object
  required:
    - bucket_start
    - request_count
    - token_count
    - rpm
    - tpm
    - cost
  properties:
    bucket_start:
      $ref: "common.yaml#/Timestamp"
    request_count:
      type: integer
      minimum: 0
    token_count:
      type: integer
      minimum: 0
    rpm:
      type: integer
      minimum: 0
    tpm:
      type: integer
      minimum: 0
    cost:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"

OpsThroughputTrend:
  type: object
  required:
    - window
    - bucket
    - points
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    bucket:
      type: string
      enum:
        - hour
        - day
    points:
      type: array
      items:
        $ref: "#/OpsThroughputTrendPoint"

OpsThroughputTrendResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsThroughputTrend"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorTrendPoint:
  type: object
  required:
    - bucket_start
    - request_count
    - error_count
    - error_rate
  properties:
    bucket_start:
      $ref: "common.yaml#/Timestamp"
    request_count:
      type: integer
      minimum: 0
    error_count:
      type: integer
      minimum: 0
    error_rate:
      type: number
      minimum: 0
      maximum: 1

OpsErrorTrend:
  type: object
  required:
    - window
    - bucket
    - points
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    bucket:
      type: string
      enum:
        - hour
        - day
    points:
      type: array
      items:
        $ref: "#/OpsErrorTrendPoint"

OpsErrorTrendResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsErrorTrend"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorDistributionItem:
  type: object
  required:
    - error_class
    - owner
    - count
    - share
  properties:
    error_class:
      type: string
    owner:
      type: string
    count:
      type: integer
      minimum: 0
    share:
      type: number
      minimum: 0
      maximum: 1

OpsErrorDistribution:
  type: object
  required:
    - window
    - items
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    items:
      type: array
      items:
        $ref: "#/OpsErrorDistributionItem"

OpsErrorDistributionResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsErrorDistribution"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsLatencyBucket:
  type: object
  required:
    - label
    - lower_ms
    - count
    - share
  properties:
    label:
      type: string
    lower_ms:
      type: integer
      minimum: 0
    upper_ms:
      type: integer
      minimum: 0
      nullable: true
    count:
      type: integer
      minimum: 0
    share:
      type: number
      minimum: 0
      maximum: 1

OpsLatencyHistogram:
  type: object
  required:
    - window
    - buckets
  properties:
    window:
      $ref: "common.yaml#/TimeWindow"
    buckets:
      type: array
      items:
        $ref: "#/OpsLatencyBucket"

OpsLatencyHistogramResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsLatencyHistogram"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorLog:
  type: object
  description: |
    Operator-facing record of a single upstream failure observed by the
    gateway hot path. Body excerpts are sanitised and credential-like
    keys are redacted to "[REDACTED]" before persistence.
  additionalProperties: true
  properties:
    id:
      type: string
    occurred_at:
      type: string
      format: date-time
    request_id:
      type: string
    trace_id:
      type: string
    user_id:
      $ref: "common.yaml#/Id"
    api_key_id:
      $ref: "common.yaml#/Id"
    api_key_prefix:
      type: string
    account_id:
      $ref: "common.yaml#/Id"
    provider_id:
      $ref: "common.yaml#/Id"
    platform:
      type: string
    source_endpoint:
      type: string
    source_protocol:
      type: string
      description: Alias for platform, kept for error-log UI parity.
    target_protocol:
      type: string
    model:
      type: string
    status_code:
      type: integer
    upstream_request_id:
      type: string
    stream_completion_state:
      type: string
      enum: [completed, interrupted, idle_timeout, client_disconnect, failed, unknown]
      description: |
        Low-cardinality terminal state for gateway streaming requests.
        Empty when the request was not streamed or the state was not
        observed; never contains provider-native frames or response bodies.
    attempt_no:
      type: integer
      minimum: 1
    latency_ms:
      type: integer
      minimum: 0
    input_tokens:
      type: integer
      minimum: 0
    output_tokens:
      type: integer
      minimum: 0
    usage_estimated:
      type: boolean
    error_class:
      type: string
    error_phase:
      type: string
    error_owner:
      type: string
    error_source:
      type: string
    error_message:
      type: string
    error_body_excerpt:
      type: string
    upstream_errors:
      type: array
      items:
        $ref: "audit.yaml#/UpstreamErrorEvent"
    resolution:
      type: string
      enum: [open, investigating, resolved, muted]
    resolution_note:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    resolved_at:
      type: string
      format: date-time
    resolved_by_user_id:
      $ref: "common.yaml#/Id"

OpsErrorLogListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/OpsErrorLog"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorLogResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsErrorLog"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorFingerprint:
  type: object
  description: |
    Real-time grouping of ops_error_logs rows by stable, low-sensitivity
    failure dimensions. It is intended for operator triage and is not a
    durable long-term rollup.
  required:
    - fingerprint
    - count
    - open_count
    - investigating_count
    - resolved_count
    - muted_count
    - first_occurred_at
    - last_occurred_at
    - source_endpoint
    - target_protocol
    - model
    - status_class
    - error_class
    - error_phase
    - error_owner
    - error_source
    - message_pattern
  properties:
    fingerprint:
      type: string
      description: Stable hash over low-sensitivity grouping dimensions.
    count:
      type: integer
      minimum: 0
    open_count:
      type: integer
      minimum: 0
    investigating_count:
      type: integer
      minimum: 0
    resolved_count:
      type: integer
      minimum: 0
    muted_count:
      type: integer
      minimum: 0
    first_occurred_at:
      type: string
      format: date-time
    last_occurred_at:
      type: string
      format: date-time
    example_error_log_id:
      $ref: "common.yaml#/Id"
    example_request_id:
      type: string
    example_error_message:
      type: string
    source_endpoint:
      type: string
    target_protocol:
      type: string
    model:
      type: string
    status_code:
      type: integer
      minimum: 100
      maximum: 599
    status_class:
      type: string
      enum: [1xx, 2xx, 3xx, 4xx, 5xx, unknown]
    error_class:
      type: string
    error_phase:
      type: string
    error_owner:
      type: string
    error_source:
      type: string
    message_pattern:
      type: string
      description: Normalized error message with request ids, URLs, hashes, and numbers replaced.

OpsErrorFingerprintListMeta:
  type: object
  required:
    - total
    - scanned
    - truncated
  properties:
    total:
      type: integer
      minimum: 0
      description: Number of discovered fingerprint groups before the response limit is applied. When truncated is true, this only covers scanned rows.
    scanned:
      type: integer
      minimum: 0
      description: Number of ops_error_logs rows scanned for this real-time summary.
    truncated:
      type: boolean
      description: True when matching rows exceeded the bounded live scan cap.
    window_start:
      type: string
      format: date-time
    window_end:
      type: string
      format: date-time

OpsErrorFingerprintListResponse:
  type: object
  required:
    - data
    - meta
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/OpsErrorFingerprint"
    meta:
      $ref: "#/OpsErrorFingerprintListMeta"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsErrorLogResolutionUpdate:
  type: object
  required:
    - resolution
  properties:
    resolution:
      type: string
      enum: [open, investigating, resolved, muted]
    note:
      type: string
      maxLength: 2048

OpsConcurrency:
  type: object
  required:
    - active_gateway_requests
    - active_realtime_slots
    - active_by_api_key
  properties:
    active_gateway_requests:
      type: integer
      minimum: 0
    active_realtime_slots:
      type: integer
      minimum: 0
    active_by_api_key:
      type: object
      additionalProperties:
        type: integer
        minimum: 0

OpsConcurrencyResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsConcurrency"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsSystemLogLevel:
  type: string
  enum:
    - debug
    - info
    - warn
    - error

OpsSystemLog:
  type: object
  required:
    - id
    - level
    - message
    - source
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    level:
      $ref: "#/OpsSystemLogLevel"
    message:
      type: string
    source:
      type: string
    request_id:
      type: string
    trace_id:
      type: string
    metadata:
      $ref: "common.yaml#/JsonObject"
    created_at:
      $ref: "common.yaml#/Timestamp"

OpsSystemLogListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/OpsSystemLog"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsSystemLogHealth:
  type: object
  required:
    - storage_mode
    - writable
    - degraded
    - stale
    - total_count
    - level_counts
    - error_evidence_recorder
    - checked_at
  properties:
    storage_mode:
      type: string
      enum:
        - durable
        - unavailable
    writable:
      type: boolean
    degraded:
      type: boolean
    stale:
      type: boolean
    total_count:
      type: integer
      minimum: 0
    level_counts:
      type: object
      additionalProperties:
        type: integer
        minimum: 0
    last_log_at:
      $ref: "common.yaml#/Timestamp"
    last_error_at:
      $ref: "common.yaml#/Timestamp"
    last_error_source:
      type: string
    last_error_message:
      type: string
    error_evidence_recorder:
      $ref: "#/OpsErrorEvidenceRecorderHealth"
    checked_at:
      $ref: "common.yaml#/Timestamp"

OpsErrorEvidenceRecorderHealth:
  type: object
  required:
    - enabled
    - started
    - draining
    - degraded
    - queue_depth
    - queue_capacity
    - enqueued_count
    - processed_count
    - recorded_count
    - dropped_count
    - write_failed_count
  properties:
    enabled:
      type: boolean
    started:
      type: boolean
    draining:
      type: boolean
    degraded:
      type: boolean
    queue_depth:
      type: integer
      minimum: 0
    queue_capacity:
      type: integer
      minimum: 0
    enqueued_count:
      type: integer
      format: int64
      minimum: 0
    processed_count:
      type: integer
      format: int64
      minimum: 0
    recorded_count:
      type: integer
      format: int64
      minimum: 0
    dropped_count:
      type: integer
      format: int64
      minimum: 0
    write_failed_count:
      type: integer
      format: int64
      minimum: 0

OpsSystemLogHealthResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsSystemLogHealth"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsSystemLogCleanupRequest:
  type: object
  properties:
    level:
      $ref: "#/OpsSystemLogLevel"
    source:
      type: string
    q:
      type: string
    request_id:
      type: string
    trace_id:
      type: string
    start:
      $ref: "common.yaml#/Timestamp"
    end:
      $ref: "common.yaml#/Timestamp"
    dry_run:
      type: boolean
      default: false
    max_delete:
      type: integer
      minimum: 1
      maximum: 10000
      default: 1000

OpsSystemLogCleanupResult:
  type: object
  required:
    - matched
    - deleted
    - dry_run
    - max_delete
    - limited
  properties:
    matched:
      type: integer
      minimum: 0
    deleted:
      type: integer
      minimum: 0
    dry_run:
      type: boolean
    max_delete:
      type: integer
      minimum: 1
      maximum: 10000
    limited:
      type: boolean

OpsSystemLogCleanupResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsSystemLogCleanupResult"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsSettings:
  type: object
  required:
    - auto_refresh_enabled
    - refresh_interval_seconds
  properties:
    auto_refresh_enabled:
      type: boolean
    refresh_interval_seconds:
      type: integer
      minimum: 5
      maximum: 3600

OpsSettingsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/OpsSettings"
    request_id:
      $ref: "common.yaml#/RequestId"

DomainEventOutbox:
  type: object
  required:
    - id
    - event_id
    - event_type
    - event_version
    - producer_module
    - aggregate_type
    - aggregate_id
    - correlation_id
    - causation_id
    - idempotency_key
    - payload
    - metadata
    - status
    - attempt_count
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    event_id:
      type: string
    event_type:
      type: string
    event_version:
      type: string
    producer_module:
      type: string
    aggregate_type:
      type: string
    aggregate_id:
      type: string
    correlation_id:
      type: string
    causation_id:
      type: string
    idempotency_key:
      type: string
    payload:
      $ref: "common.yaml#/JsonObject"
    metadata:
      $ref: "common.yaml#/JsonObject"
    status:
      type: string
      enum:
        - pending
        - published
        - failed
    attempt_count:
      type: integer
      minimum: 0
    next_retry_at:
      type: string
      format: date-time
      nullable: true
    last_error:
      type: string
      nullable: true
    published_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      $ref: "common.yaml#/Timestamp"

DomainEventOutboxListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/DomainEventOutbox"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

RealtimeSlotKind:
  type: string
  enum:
    - responses_websocket
    - realtime_websocket

RealtimeActiveSlot:
  type: object
  required:
    - id
    - kind
    - request_id
    - user_id
    - api_key_id
    - source_endpoint
    - session_affinity_source
    - session_affinity_key_hash
    - sticky_strength
    - acquired_at
  properties:
    id:
      type: string
      description: Ephemeral in-process slot id.
    kind:
      $ref: "#/RealtimeSlotKind"
    request_id:
      $ref: "common.yaml#/RequestId"
    user_id:
      $ref: "common.yaml#/Id"
    api_key_id:
      $ref: "common.yaml#/Id"
    source_endpoint:
      type: string
      enum:
        - /v1/responses/ws
        - /v1/realtime
    session_affinity_source:
      type: string
      description: Sanitized source label for sticky routing hints.
    session_affinity_key_hash:
      type: string
      description: SHA-256 hash of the affinity key, or empty when no key was supplied.
      pattern: "^(|sha256:[a-f0-9]{64})$"
    sticky_account_id:
      $ref: "common.yaml#/Id"
    sticky_strength:
      type: string
    acquired_at:
      $ref: "common.yaml#/Timestamp"

RealtimeActiveSlotCounters:
  type: object
  required:
    - active_slots
    - acquired_total
    - released_total
    - rejected_total
    - active_by_endpoint
    - active_by_kind
    - active_by_api_key_id
  properties:
    active_slots:
      type: integer
      minimum: 0
    acquired_total:
      type: integer
      minimum: 0
    released_total:
      type: integer
      minimum: 0
    rejected_total:
      type: integer
      minimum: 0
    active_by_endpoint:
      type: object
      additionalProperties:
        type: integer
        minimum: 0
    active_by_kind:
      type: object
      additionalProperties:
        type: integer
        minimum: 0
    active_by_api_key_id:
      type: object
      additionalProperties:
        type: integer
        minimum: 0

RealtimeActiveSlotListResponse:
  type: object
  required:
    - data
    - counters
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/RealtimeActiveSlot"
    counters:
      $ref: "#/RealtimeActiveSlotCounters"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

OpsSLOStatus:
  type: string
  enum:
    - active
    - disabled

OpsSLIType:
  type: string
  enum:
    - availability
    - latency
    - freshness
    - quality

OpsAlertSeverity:
  type: string
  enum:
    - critical
    - warning
    - ticket

OpsAlertStatus:
  type: string
  enum:
    - firing
    - acknowledged
    - resolved
    - suppressed

OpsNotificationChannelType:
  type: string
  enum:
    - email

OpsNotificationChannelStatus:
  type: string
  enum:
    - active
    - disabled

OpsNotificationDeliveryStatus:
  type: string
  enum:
    - pending
    - delivered
    - failed

OpsSLOFilter:
  type: object
  required:
    - source_endpoint
    - model
    - error_owner_exclude
  properties:
    source_endpoint:
      type: string
    model:
      type: string
    provider_id:
      $ref: "common.yaml#/Id"
      nullable: true
    error_owner_exclude:
      type: array
      items:
        type: string
        enum:
          - client
          - business
          - scheduler
          - reverse_proxy
          - provider
          - internal
      default: []

OpsBurnRateThreshold:
  type: object
  required:
    - severity
    - short_window_seconds
    - long_window_seconds
    - burn_rate
    - min_request_count
  properties:
    severity:
      $ref: "#/OpsAlertSeverity"
    short_window_seconds:
      type: integer
      minimum: 1
    long_window_seconds:
      type: integer
      minimum: 1
    burn_rate:
      type: number
      minimum: 0
      exclusiveMinimum: true
    min_request_count:
      type: integer
      minimum: 0

OpsAlertPolicy:
  type: object
  required:
    - name
    - thresholds
  properties:
    name:
      type: string
      example: multi_window_burn_rate
    thresholds:
      type: array
      items:
        $ref: "#/OpsBurnRateThreshold"
      default: []

OpsSLODefinition:
  type: object
  required:
    - id
    - name
    - sli_type
    - objective
    - window_days
