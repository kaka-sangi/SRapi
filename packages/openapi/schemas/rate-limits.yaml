ErrorPassthroughRule:
  type: object
  required:
    - id
    - name
    - enabled
    - priority
    - action
    - status_codes
    - classes
    - keywords
    - created_at
    - updated_at
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    enabled:
      type: boolean
    priority:
      type: integer
      format: int64
    action:
      type: string
      enum:
        - expose
        - mask
    status_codes:
      type: array
      items:
        type: integer
        format: int64
    classes:
      type: array
      items:
        type: string
    keywords:
      type: array
      items:
        type: string
    response_status:
      type: integer
      format: int64
      nullable: true
      description: Optional downstream HTTP status returned when this rule matches. Use 0 in update requests to clear the override.
    response_code:
      type: integer
      format: int64
      nullable: true
      description: Alias of response_status for compatibility with sub2api-style imports.
    custom_message:
      type: string
      description: Optional downstream error message returned when this rule matches. Empty string clears the override.
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
CreateErrorPassthroughRuleRequest:
  type: object
  required:
    - name
    - action
  properties:
    name:
      type: string
    enabled:
      type: boolean
    priority:
      type: integer
      format: int64
    action:
      type: string
      enum:
        - expose
        - mask
    status_codes:
      type: array
      items:
        type: integer
        format: int64
    classes:
      type: array
      items:
        type: string
    keywords:
      type: array
      items:
        type: string
    response_status:
      type: integer
      format: int64
      nullable: true
    response_code:
      type: integer
      format: int64
      nullable: true
      description: Alias of response_status for compatibility with sub2api-style imports.
    custom_message:
      type: string
UpdateErrorPassthroughRuleRequest:
  type: object
  properties:
    name:
      type: string
    enabled:
      type: boolean
    priority:
      type: integer
      format: int64
    action:
      type: string
      enum:
        - expose
        - mask
    status_codes:
      type: array
      items:
        type: integer
        format: int64
    classes:
      type: array
      items:
        type: string
    keywords:
      type: array
      items:
        type: string
    response_status:
      type: integer
      format: int64
      nullable: true
      description: Set to a 100-599 status, or 0 to clear the override.
    response_code:
      type: integer
      format: int64
      nullable: true
      description: Alias of response_status for compatibility with sub2api-style imports.
    custom_message:
      type: string
      description: Set to a non-empty message, or empty string to clear the override.
ErrorPassthroughRuleResponse:
  type: object
  required:
    - data
    - request_id
  properties:
