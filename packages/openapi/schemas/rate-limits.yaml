SnapshotModelRateLimit:
  type: object
  required:
    - model_id
    - model_name
    - rpm_limit
    - tpm_limit
    - max_concurrency
    - enabled
  properties:
    model_id:
      type: integer
      format: int64
    model_name:
      type: string
    rpm_limit:
      type: integer
      format: int64
    tpm_limit:
      type: integer
      format: int64
    max_concurrency:
      type: integer
      format: int64
    enabled:
      type: boolean
SnapshotGroupRateLimit:
  type: object
  required:
    - account_group_id
    - account_group_name
    - rpm_limit
    - tpm_limit
    - max_concurrency
    - enabled
  properties:
    account_group_id:
      type: integer
      format: int64
    account_group_name:
      type: string
    rpm_limit:
      type: integer
      format: int64
    tpm_limit:
      type: integer
      format: int64
    max_concurrency:
      type: integer
      format: int64
    enabled:
      type: boolean
ConfigSnapshotResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: object
      required:
        - snapshot_version
        - generated_at
      properties:
        snapshot_version:
          type: string
        generated_at:
          type: string
          format: date-time
        providers:
          type: array
          items:
            $ref: "models.yaml#/Provider"
        models:
          type: array
          items:
            $ref: "models.yaml#/Model"
        account_groups:
          type: array
          items:
            $ref: "accounts.yaml#/AccountGroup"
        subscription_plans:
          type: array
          items:
            $ref: "billing.yaml#/SubscriptionPlan"
        pricing_rules:
          type: array
          items:
            $ref: "billing.yaml#/PricingRule"
        payload_rules:
          type: array
          items:
            $ref: "#/CreatePayloadRuleRequest"
        proxies:
          type: array
          items:
            $ref: "proxies.yaml#/SnapshotProxyDefinition"
        scheduled_test_plans:
          type: array
          items:
            $ref: "ops.yaml#/ImportScheduledTestPlan"
        model_rate_limits:
          type: array
          items:
            $ref: "#/SnapshotModelRateLimit"
        group_rate_limits:
          type: array
          items:
            $ref: "#/SnapshotGroupRateLimit"
        error_passthrough_rules:
          type: array
          items:
            $ref: "#/ErrorPassthroughRule"
        tls_profiles:
          type: array
          items:
            $ref: "#/TLSProfile"
        user_attribute_definitions:
          type: array
          items:
            $ref: "users.yaml#/UserAttributeDefinition"
        settings:
          $ref: "admin.yaml#/AdminSettings"
    request_id:
      $ref: "common.yaml#/RequestId"
