      items:
        $ref: "#/ImportGroupRateLimit"
ImportSectionResult:
  type: object
  required:
    - created
    - updated
  properties:
    created:
      type: integer
      format: int64
    updated:
      type: integer
      format: int64
ImportRemapResult:
  type: object
  required:
    - created
    - updated
    - skipped
  properties:
    created:
      type: integer
      format: int64
    updated:
      type: integer
      format: int64
    skipped:
      type: integer
      format: int64
ConfigImportResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: object
      required:
        - dry_run
        - tls_profiles
        - user_attribute_definitions
        - error_passthrough_rules
        - payload_rules
        - proxies
        - scheduled_test_plans
        - model_rate_limits
        - group_rate_limits
      properties:
        dry_run:
          type: boolean
        tls_profiles:
          $ref: "#/ImportSectionResult"
        user_attribute_definitions:
          $ref: "#/ImportSectionResult"
        error_passthrough_rules:
          $ref: "#/ImportSectionResult"
        payload_rules:
          $ref: "#/ImportSectionResult"
        proxies:
          $ref: "#/ImportRemapResult"
        scheduled_test_plans:
          $ref: "#/ImportRemapResult"
        model_rate_limits:
          $ref: "#/ImportRemapResult"
        group_rate_limits:
          $ref: "#/ImportRemapResult"
    request_id:
      $ref: "common.yaml#/RequestId"
