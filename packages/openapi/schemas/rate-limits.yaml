# Model/group rate limits, TLS profiles, payload rules, error passthrough, and configuration import/export
UserPlatformQuota:
  type: object
  required:
    - user_id
    - platform
    - currency
    - enabled
    - created_at
    - updated_at
  properties:
    user_id:
      type: integer
      format: int64
    platform:
      type: string
    daily_limit:
      type: string
      nullable: true
    weekly_limit:
      type: string
      nullable: true
    monthly_limit:
      type: string
      nullable: true
    currency:
      type: string
    enabled:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
UpsertUserPlatformQuotaRequest:
  type: object
  required:
    - platform
  properties:
    platform:
      type: string
    daily_limit:
      type: string
      nullable: true
    weekly_limit:
      type: string
      nullable: true
    monthly_limit:
      type: string
      nullable: true
    currency:
      type: string
    enabled:
      type: boolean
UserPlatformQuotaResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/UserPlatformQuota"
    request_id:
      $ref: "common.yaml#/RequestId"
UserPlatformQuotaListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/UserPlatformQuota"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"
