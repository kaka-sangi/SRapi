# Subscription plans, pricing rules, payments, and billing ledger
PaymentProviderStatus:
  type: string
  enum:
    - active
    - disabled
    - archived

PaymentOrderStatus:
  type: string
  enum:
    - pending
    - paid
    - fulfilled
    - partially_refunded
    - refunding
    - refunded
    - refund_failed
    - expired
    - canceled
    - failed

PaymentProductType:
  type: string
  enum:
    - balance_credit
    - subscription_plan

PaymentMethod:
  type: object
  required:
    - method
    - provider
    - provider_instance_id
    - name
    - metadata
  properties:
    method:
      type: string
    provider:
      type: string
    provider_instance_id:
      $ref: "common.yaml#/Id"
    name:
      type: string
    metadata:
      $ref: "common.yaml#/JsonObject"

PaymentMethodListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PaymentMethod"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentProviderInstance:
  type: object
  required:
    - id
    - provider
    - name
    - status
    - config_version
    - supported_methods
    - limits
    - sort_order
    - fee_rate
    - weight
    - metadata
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    provider:
      type: string
    name:
      type: string
    status:
      $ref: "#/PaymentProviderStatus"
    config_version:
      type: integer
      minimum: 1
    supported_methods:
      type: array
      items:
        type: string
    limits:
      $ref: "common.yaml#/JsonObject"
    sort_order:
      type: integer
    fee_rate:
      type: string
      example: "0.03000000"
      description: Decimal payment-channel fee rate added to the payable amount.
    weight:
      type: integer
      minimum: 1
      description: Relative round-robin selection weight.
    metadata:
      $ref: "common.yaml#/JsonObject"
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreatePaymentProviderInstanceRequest:
  type: object
  required:
    - provider
    - name
    - config
  properties:
    provider:
      type: string
      minLength: 1
    name:
      type: string
      minLength: 1
    status:
      $ref: "#/PaymentProviderStatus"
    config:
      $ref: "common.yaml#/JsonObject"
    supported_methods:
      type: array
      items:
        type: string
    limits:
      $ref: "common.yaml#/JsonObject"
    sort_order:
      type: integer
    fee_rate:
      type: string
      example: "0.03000000"
    weight:
      type: integer
      minimum: 1
    metadata:
      $ref: "common.yaml#/JsonObject"

UpdatePaymentProviderInstanceRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
    status:
      $ref: "#/PaymentProviderStatus"
    config:
      $ref: "common.yaml#/JsonObject"
    supported_methods:
      type: array
      items:
        type: string
    limits:
      $ref: "common.yaml#/JsonObject"
    sort_order:
      type: integer
    fee_rate:
      type: string
      example: "0.03000000"
    weight:
      type: integer
      minimum: 1
    metadata:
      $ref: "common.yaml#/JsonObject"

PaymentProviderInstanceResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/PaymentProviderInstance"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentProviderInstanceListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PaymentProviderInstance"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentOrder:
  type: object
  required:
    - id
    - user_id
    - order_no
    - provider_instance_id
    - original_amount
    - discount_amount
    - fee_amount
    - payable_amount
    - amount
    - currency
    - status
    - product_type
    - product_id
    - provider_snapshot
    - metadata
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    user_id:
      $ref: "common.yaml#/Id"
    order_no:
      type: string
    provider_instance_id:
      $ref: "common.yaml#/Id"
    original_amount:
      type: string
      example: "10.00000000"
    discount_amount:
      type: string
      example: "1.00000000"
    fee_amount:
      type: string
      example: "0.30000000"
    payable_amount:
      type: string
      example: "10.30000000"
    promo_code_id:
      $ref: "common.yaml#/Id"
      nullable: true
    amount:
      type: string
      example: "10.00000000"
    currency:
      type: string
      example: USD
    status:
      $ref: "#/PaymentOrderStatus"
    product_type:
      $ref: "#/PaymentProductType"
    product_id:
      type: string
    provider_transaction_id:
      type: string
      nullable: true
    provider_snapshot:
      $ref: "common.yaml#/JsonObject"
    expires_at:
      type: string
      format: date-time
      nullable: true
    paid_at:
      type: string
      format: date-time
      nullable: true
    closed_at:
      type: string
      format: date-time
      nullable: true
    metadata:
      $ref: "common.yaml#/JsonObject"
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreatePaymentOrderRequest:
  type: object
  required:
    - method
    - amount
    - product_type
  properties:
    method:
      type: string
      minLength: 1
    amount:
      type: string
      example: "10.00"
    currency:
      type: string
      example: USD
    product_type:
      $ref: "#/PaymentProductType"
    product_id:
      type: string
    promo_code:
      type: string
      minLength: 1
    expires_at:
      type: string
      format: date-time
    payer_openid:
      type: string
      minLength: 1
      description: WeChat JSAPI payer OpenID. Prefer this typed field over metadata.
    payer_client_ip:
      type: string
      minLength: 1
      description: Payer client IP for WeChat H5/native scene info. Defaults from request headers when omitted.
    metadata:
      $ref: "common.yaml#/JsonObject"

PaymentOrderResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/PaymentOrder"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentOrderListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PaymentOrder"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentAuditLog:
  type: object
  required:
    - id
    - order_id
    - provider_instance_id
    - event_type
    - idempotency_key
    - payload
    - signature_valid
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    order_id:
      $ref: "common.yaml#/Id"
    provider_instance_id:
      $ref: "common.yaml#/Id"
    event_type:
      type: string
    idempotency_key:
      type: string
    payload:
      $ref: "common.yaml#/JsonObject"
    signature_valid:
      type: boolean
    created_at:
      $ref: "common.yaml#/Timestamp"

PaymentAuditLogListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PaymentAuditLog"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PaymentWebhookRequest:
  type: object
  additionalProperties: true

PaymentWebhookResult:
  type: object
  required:
    - order
    - handled
  properties:
    order:
      $ref: "#/PaymentOrder"
    handled:
      type: boolean

PaymentWebhookResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/PaymentWebhookResult"
    request_id:
      $ref: "common.yaml#/RequestId"

RefundPaymentOrderRequest:
  type: object
  properties:
    amount:
      type: string
      description: Decimal refund amount. Empty or omitted means full refund.
    reason:
      type: string
      maxLength: 500

AdminPaymentDashboardResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/AdminPaymentDashboard"
    request_id:
      $ref: "common.yaml#/RequestId"

AdminPaymentDashboard:
  type: object
  required:
    - day_range
    - currency
    - totals
    - payment_methods
    - top_users
  properties:
    day_range:
      type: integer
      minimum: 1
      description: Day window the snapshot covers, echoed from the request.
    currency:
      type: string
      description: Currency code most represented in the result set (or "USD" when no paid orders exist).
    totals:
      $ref: "#/AdminPaymentDashboardTotals"
    payment_methods:
      type: array
      items:
        $ref: "#/AdminPaymentMethodBreakdown"
    top_users:
      type: array
      items:
        $ref: "#/AdminPaymentTopUser"

AdminPaymentDashboardTotals:
  type: object
  required:
    - order_count
    - paid_count
    - paid_amount
  properties:
    order_count:
      type: integer
      minimum: 0
      description: All orders created in the window, any status.
    paid_count:
      type: integer
      minimum: 0
      description: Orders with paid_at inside the window and a paid-ish status.
    paid_amount:
      type: string
      description: Sum of payable_amount across paid orders, in the report currency.

AdminPaymentMethodBreakdown:
  type: object
  required:
    - provider
    - count
    - amount
  properties:
    provider:
      type: string
      description: Payment provider type (e.g. alipay, wxpay, stripe).
    count:
      type: integer
      minimum: 0
    amount:
      type: string
      description: Sum of payable_amount for orders settled via this provider.

AdminPaymentTopUser:
  type: object
  required:
    - user_id
    - amount
    - order_count
  properties:
    user_id:
      $ref: "common.yaml#/Id"
    amount:
      type: string
    order_count:
      type: integer
      minimum: 0

SubscriptionPlanStatus:
  type: string
  enum:
    - active
    - disabled
    - archived

UserSubscriptionStatus:
  type: string
  enum:
    - active
    - expired
    - cancelled
    - suspended
  x-enum-varnames:
    - UserSubscriptionStatusActive
    - UserSubscriptionStatusExpired
    - UserSubscriptionStatusCancelled
    - UserSubscriptionStatusSuspended

SubscriptionPlan:
  type: object
  required:
    - id
    - name
    - price
    - currency
    - validity_days
    - entitlements
    - for_sale
    - sort_order
    - status
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    name:
      type: string
    description:
      type: string
    price:
      type: string
      description: Decimal string amount for the plan purchase price.
      example: "19.99000000"
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    validity_days:
      type: integer
      minimum: 1
    entitlements:
      $ref: "common.yaml#/JsonObject"
    for_sale:
      type: boolean
    sort_order:
      type: integer
    status:
      $ref: "#/SubscriptionPlanStatus"
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreateSubscriptionPlanRequest:
  type: object
  required:
    - name
    - price
    - currency
    - validity_days
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 160
    description:
      type: string
    price:
      type: string
      description: Decimal string amount. Float values are not accepted by the service.
      example: "19.99000000"
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    validity_days:
      type: integer
      minimum: 1
    entitlements:
      $ref: "common.yaml#/JsonObject"
    for_sale:
      type: boolean
    sort_order:
      type: integer
    status:
      $ref: "#/SubscriptionPlanStatus"

UpdateSubscriptionPlanRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 160
    description:
      type: string
    price:
      type: string
      description: Decimal string amount. Float values are not accepted by the service.
      example: "19.99000000"
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    validity_days:
      type: integer
      minimum: 1
    entitlements:
      $ref: "common.yaml#/JsonObject"
    for_sale:
      type: boolean
    sort_order:
      type: integer
    status:
      $ref: "#/SubscriptionPlanStatus"

SubscriptionPlanResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/SubscriptionPlan"
    request_id:
      $ref: "common.yaml#/RequestId"

SubscriptionPlanListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/SubscriptionPlan"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

UserSubscription:
  type: object
  required:
    - id
    - user_id
    - plan_id
    - status
    - starts_at
    - expires_at
    - entitlements_snapshot
    - daily_usage_usd
    - daily_usage_window_start
    - weekly_usage_usd
    - weekly_usage_window_start
    - monthly_usage_usd
    - monthly_usage_window_start
    - source_type
    - source_id
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    user_id:
      $ref: "common.yaml#/Id"
    plan_id:
      $ref: "common.yaml#/Id"
    status:
      $ref: "#/UserSubscriptionStatus"
    starts_at:
      $ref: "common.yaml#/Timestamp"
    expires_at:
      $ref: "common.yaml#/Timestamp"
    entitlements_snapshot:
      $ref: "common.yaml#/JsonObject"
    daily_usage_usd:
      type: string
      description: Materialized billable USD usage in the current UTC day window.
      example: "0.25000000"
    daily_usage_window_start:
      type: string
      format: date-time
      nullable: true
      description: UTC start timestamp for the materialized daily usage window.
    weekly_usage_usd:
      type: string
      description: Materialized billable USD usage in the current UTC week window.
      example: "1.50000000"
    weekly_usage_window_start:
      type: string
      format: date-time
      nullable: true
      description: UTC start timestamp for the materialized weekly usage window.
    monthly_usage_usd:
      type: string
      description: Materialized billable USD usage in the current UTC month window.
      example: "5.00000000"
    monthly_usage_window_start:
      type: string
      format: date-time
      nullable: true
      description: UTC start timestamp for the materialized monthly usage window.
    source_type:
      type: string
    source_id:
      type: string
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

UserSubscriptionResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/UserSubscription"
    request_id:
      $ref: "common.yaml#/RequestId"

UserSubscriptionListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/UserSubscription"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

PricingRule:
  type: object
  required:
    - id
    - model_id
    - provider_id
    - billing_mode
    - input_price_per_million_tokens
    - output_price_per_million_tokens
    - cache_read_price_per_million_tokens
    - cache_write_price_per_million_tokens
    - per_request_price
    - intervals
    - currency
    - created_at
    - updated_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    model_id:
      $ref: "common.yaml#/Id"
    model_family:
      type: string
      description: Family-level rule key used when model_id is "0".
      example: gpt-5.4
    provider_id:
      $ref: "common.yaml#/Id"
    billing_mode:
      $ref: "#/BillingMode"
    input_price_per_million_tokens:
      type: string
      example: "1.25000000"
    output_price_per_million_tokens:
      type: string
      example: "2.50000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.10000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_5m_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_1h_price_per_million_tokens:
      type: string
      example: "0.40000000"
    image_output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    per_request_price:
      type: string
      example: "0.05000000"
    service_tier_multipliers:
      type: object
      additionalProperties:
        type: string
      example:
        priority: "2.00000000"
        flex: "0.50000000"
    long_context_threshold_tokens:
      type: integer
      nullable: true
      minimum: 1
    long_context_multiplier:
      type: string
      example: "2.00000000"
    intervals:
      type: array
      items:
        $ref: "#/PricingInterval"
      default: []
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    effective_from:
      type: string
      format: date-time
      nullable: true
    effective_to:
      type: string
      format: date-time
      nullable: true
    created_at:
      $ref: "common.yaml#/Timestamp"
    updated_at:
      $ref: "common.yaml#/Timestamp"

CreatePricingRuleRequest:
  type: object
  required:
    - model_id
    - provider_id
    - input_price_per_million_tokens
    - output_price_per_million_tokens
    - cache_read_price_per_million_tokens
    - cache_write_price_per_million_tokens
    - currency
  properties:
    model_id:
      $ref: "common.yaml#/Id"
    model_family:
      type: string
      description: Family-level rule key. Required when model_id is "0".
      example: gpt-5.4
    provider_id:
      $ref: "common.yaml#/Id"
    billing_mode:
      $ref: "#/BillingMode"
    input_price_per_million_tokens:
      type: string
      example: "1.25000000"
    output_price_per_million_tokens:
      type: string
      example: "2.50000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.10000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_5m_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_1h_price_per_million_tokens:
      type: string
      example: "0.40000000"
    image_output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    per_request_price:
      type: string
      example: "0.05000000"
    service_tier_multipliers:
      type: object
      additionalProperties:
        type: string
    long_context_threshold_tokens:
      type: integer
      nullable: true
      minimum: 1
    long_context_multiplier:
      type: string
      example: "2.00000000"
    intervals:
      type: array
      items:
        $ref: "#/PricingIntervalInput"
      default: []
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    effective_from:
      type: string
      format: date-time
      nullable: true
    effective_to:
      type: string
      format: date-time
      nullable: true

UpdatePricingRuleRequest:
  type: object
  properties:
    billing_mode:
      $ref: "#/BillingMode"
    input_price_per_million_tokens:
      type: string
      example: "1.25000000"
    output_price_per_million_tokens:
      type: string
      example: "2.50000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.10000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_5m_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_1h_price_per_million_tokens:
      type: string
      example: "0.40000000"
    image_output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    per_request_price:
      type: string
      example: "0.05000000"
    service_tier_multipliers:
      type: object
      additionalProperties:
        type: string
    long_context_threshold_tokens:
      type: integer
      nullable: true
      minimum: 1
    long_context_multiplier:
      type: string
      example: "2.00000000"
    intervals:
      type: array
      items:
        $ref: "#/PricingIntervalInput"
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    effective_from:
      type: string
      format: date-time
      nullable: true
    effective_to:
      type: string
      format: date-time
      nullable: true

BillingMode:
  type: string
  enum:
    - token
    - per_request
    - image

PricingInterval:
  type: object
  required:
    - min_tokens
    - tier_label
    - image_size
    - input_price_per_million_tokens
    - output_price_per_million_tokens
    - cache_read_price_per_million_tokens
    - cache_write_price_per_million_tokens
    - per_image_price
  properties:
    id:
      $ref: "common.yaml#/Id"
    min_tokens:
      type: integer
      minimum: 0
    max_tokens:
      type: integer
      minimum: 0
      nullable: true
    tier_label:
      type: string
    image_size:
      type: string
      example: "1024x1024"
    input_price_per_million_tokens:
      type: string
      example: "2.50000000"
    output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.50000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "2.50000000"
    per_image_price:
      type: string
      example: "0.04000000"

PricingIntervalInput:
  type: object
  properties:
    min_tokens:
      type: integer
      minimum: 0
      default: 0
    max_tokens:
      type: integer
      minimum: 0
      nullable: true
    tier_label:
      type: string
    image_size:
      type: string
      example: "1024x1024"
    input_price_per_million_tokens:
      type: string
      example: "2.50000000"
    output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.50000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "2.50000000"
    per_image_price:
      type: string
      example: "0.04000000"

PricingRuleResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/PricingRule"
    request_id:
      $ref: "common.yaml#/RequestId"

PricingRuleListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PricingRule"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"

BulkPricingRuleImportRequest:
  type: object
  required:
    - items
  properties:
    dry_run:
      type: boolean
      default: false
    items:
      type: array
      minItems: 1
      maxItems: 500
      items:
        $ref: "#/CreatePricingRuleRequest"

BulkPricingRuleImportError:
  type: object
  required:
    - index
    - message
  properties:
    index:
      type: integer
      minimum: 0
    message:
      type: string

BulkPricingRuleImportResult:
  type: object
  required:
    - dry_run
    - requested
    - validated
    - created
    - errors
    - rules
  properties:
    dry_run:
      type: boolean
    requested:
      type: integer
      minimum: 0
    validated:
      type: integer
      minimum: 0
    created:
      type: integer
      minimum: 0
    errors:
      type: array
      items:
        $ref: "#/BulkPricingRuleImportError"
    rules:
      type: array
      items:
        $ref: "#/PricingRule"

BulkPricingRuleImportResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BulkPricingRuleImportResult"
    request_id:
      $ref: "common.yaml#/RequestId"

PricingRulePreset:
  type: object
  required:
    - model_family
    - billing_mode
    - input_price_per_million_tokens
    - output_price_per_million_tokens
    - cache_read_price_per_million_tokens
    - cache_write_price_per_million_tokens
    - currency
  properties:
    model_family:
      type: string
      example: gpt-5.4
    billing_mode:
      $ref: "#/BillingMode"
    input_price_per_million_tokens:
      type: string
      example: "1.25000000"
    output_price_per_million_tokens:
      type: string
      example: "2.50000000"
    cache_read_price_per_million_tokens:
      type: string
      example: "0.10000000"
    cache_write_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_5m_price_per_million_tokens:
      type: string
      example: "0.20000000"
    cache_write_1h_price_per_million_tokens:
      type: string
      example: "0.40000000"
    image_output_price_per_million_tokens:
      type: string
      example: "5.00000000"
    per_request_price:
      type: string
      example: "0.05000000"
    currency:
      type: string
      minLength: 3
      maxLength: 12
      example: USD
    source:
      type: string
      example: litellm-fallback

PricingRulePresetListResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PricingRulePreset"
    request_id:
      $ref: "common.yaml#/RequestId"

InstallPricingRulePresetsRequest:
  type: object
  properties:
    dry_run:
      type: boolean
      default: false
    families:
      type: array
      items:
        type: string
      description: Optional subset of model families to install. Empty installs all built-in presets.

PricingRulePresetInstallResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      $ref: "#/BulkPricingRuleImportResult"
    request_id:
      $ref: "common.yaml#/RequestId"

BillingLedgerEntry:
  type: object
  required:
    - id
    - user_id
    - type
    - amount
    - currency
    - balance_before
    - balance_after
    - reference_type
    - reference_id
    - metadata
    - created_at
  properties:
    id:
      $ref: "common.yaml#/Id"
    user_id:
      $ref: "common.yaml#/Id"
    type:
      type: string
      enum:
        - usage_charge
        - payment_credit
        - refund
        - adjustment
        - compensation
        - affiliate_transfer
        - redeem_code_credit
    amount:
      type: string
    currency:
      type: string
    balance_before:
      type: string
    balance_after:
      type: string
    reference_type:
      type: string
    reference_id:
      type: string
    metadata:
      $ref: "common.yaml#/JsonObject"
    created_at:
      $ref: "common.yaml#/Timestamp"

BillingLedgerListResponse:
  type: object
  required:
    - data
    - pagination
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/BillingLedgerEntry"
    pagination:
      $ref: "common.yaml#/Pagination"
    request_id:
      $ref: "common.yaml#/RequestId"
