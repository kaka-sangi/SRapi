      type: array
      minItems: 1
      items:
        $ref: "#/GeminiContent"
    systemInstruction:
      $ref: "#/GeminiContent"
    generationConfig:
      $ref: "#/GeminiGenerationConfig"
    safetySettings:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    tools:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    toolConfig:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

GeminiCountTokensRequest:
  type: object
  properties:
    contents:
      type: array
      minItems: 1
      items:
        $ref: "#/GeminiContent"
    systemInstruction:
      $ref: "#/GeminiContent"
    generationConfig:
      $ref: "#/GeminiGenerationConfig"
    safetySettings:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    tools:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    toolConfig:
      $ref: "common.yaml#/JsonObject"
    generateContentRequest:
      $ref: "#/GeminiGenerateContentRequest"
  additionalProperties: true

GeminiSafetyRating:
  type: object
  properties:
    category:
      type: string
    probability:
      type: string
