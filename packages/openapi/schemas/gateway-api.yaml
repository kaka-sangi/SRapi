# OpenAI, Anthropic, Gemini wire-format request/response schemas and gateway usage
PlaygroundImage:
  type: object
  required:
    - mime_type
    - data
  properties:
    mime_type:
      type: string
    data:
      type: string
      description: "Base64-encoded image bytes (no data URL prefix)."

PlaygroundMessage:
  type: object
  required:
    - role
  properties:
    role:
      type: string
      enum:
        - user
        - assistant
    content:
      type: string
      default: ""
    images:
      type: array
      items:
        $ref: "#/PlaygroundImage"
      default: []

PlaygroundChatRequest:
  type: object
  required:
    - messages
    - model
  properties:
    messages:
      type: array
      items:
        $ref: "#/PlaygroundMessage"
    model:
      type: string
    reasoning_effort:
      type: string
      enum:
        - "off"
        - low
        - medium
        - high
    system:
      type: string
      description: Optional system prompt prepended to the conversation.
    temperature:
      type: number
      format: double
      minimum: 0
      maximum: 2
    max_tokens:
      type: integer
      minimum: 1

PlaygroundModel:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: string
    name:
      type: string

PlaygroundModelsResponse:
  type: object
  required:
    - data
    - request_id
  properties:
    data:
      type: array
      items:
        $ref: "#/PlaygroundModel"
      default: []
    request_id:
      $ref: "common.yaml#/RequestId"

OpenAIModel:
  type: object
  required:
    - id
    - object
    - owned_by
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - model
    created:
      type: integer
      nullable: true
    owned_by:
      type: string

OpenAIModelList:
  type: object
  required:
    - object
    - data
  properties:
    object:
      type: string
      enum:
        - list
    data:
      type: array
      items:
        $ref: "#/OpenAIModel"

CodexClientModel:
  type: object
  required:
    - slug
    - display_name
    - description
    - visibility
    - supported_in_api
  properties:
    slug:
      type: string
    display_name:
      type: string
    description:
      type: string
    visibility:
      type: string
      description: Codex client visibility value such as `list` or `hide`.
    minimal_client_version:
      type: string
    supported_in_api:
      type: boolean
    prefer_websockets:
      type: boolean
    support_verbosity:
      type: boolean
    default_verbosity:
      type: string
    apply_patch_tool_type:
      type: string
    web_search_tool_type:
      type: string
    input_modalities:
      type: array
      items:
        type: string
    supports_image_detail_original:
      type: boolean
    truncation_policy:
      type: object
      properties:
        mode:
          type: string
        limit:
          type: integer
    supports_parallel_tool_calls:
      type: boolean
    context_window:
      type: integer
    max_context_window:
      type: integer
    auto_compact_token_limit:
      type: integer
      nullable: true
    reasoning_summary_format:
      type: string
    default_reasoning_summary:
      type: string
    default_reasoning_level:
      type: string
    supported_reasoning_levels:
      type: array
      items:
        type: object
        properties:
          effort:
            type: string
          description:
            type: string
    shell_type:
      type: string
    base_instructions:
      type: string
    available_in_plans:
      type: array
      items:
        type: string
    service_tiers:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          description:
            type: string
    availability_nux:
      type: object
      nullable: true
      properties:
        message:
          type: string
    upgrade:
      type: object
      nullable: true
    priority:
      type: integer

CodexClientModelList:
  type: object
  required:
    - models
  properties:
    models:
      type: array
      items:
        $ref: "#/CodexClientModel"

GatewayUsageResponse:
  type: object
  required:
    - object
    - mode
    - isValid
    - status
    - remaining
    - unit
    - balance
    - api_key_id
    - api_key_name
    - generated_at
    - window_days
    - usage
    - today
    - daily_usage
    - model_stats
    - recent_requests
  properties:
    object:
      type: string
      enum:
        - usage
    mode:
      type: string
      enum:
        - unrestricted
        - quota_limited
    isValid:
      type: boolean
    status:
      type: string
    planName:
      type: string
    remaining:
      type: string
    unit:
      type: string
    balance:
      type: string
    api_key_id:
      $ref: "common.yaml#/Id"
    api_key_name:
      type: string
    generated_at:
      $ref: "common.yaml#/Timestamp"
    window_days:
      type: integer
      minimum: 1
      maximum: 90
    expires_at:
      $ref: "common.yaml#/Timestamp"
    days_until_expiry:
      type: integer
      minimum: 0
    limits:
      type: object
      additionalProperties: true
    allowed_models:
      type: array
      items:
        type: string
    usage:
      $ref: "#/GatewayUsageTotals"
    today:
      $ref: "#/GatewayUsageWindow"
    daily_usage:
      type: array
      items:
        $ref: "#/GatewayUsageWindow"
    model_stats:
      type: array
      items:
        $ref: "#/GatewayUsageModel"
    recent_requests:
      type: array
      items:
        $ref: "#/GatewayUsageRequest"

GatewayUsageTotals:
  type: object
  required:
    - requests
    - success_count
    - error_count
    - input_tokens
    - output_tokens
    - cached_tokens
    - total_tokens
    - cost
    - currency
  properties:
    requests:
      type: integer
      minimum: 0
    success_count:
      type: integer
      minimum: 0
    error_count:
      type: integer
      minimum: 0
    input_tokens:
      type: integer
      minimum: 0
    output_tokens:
      type: integer
      minimum: 0
    cached_tokens:
      type: integer
      minimum: 0
    total_tokens:
      type: integer
      minimum: 0
    cost:
      type: string
    input_cost:
      type: string
    output_cost:
      type: string
    cache_read_cost:
      type: string
    cache_write_cost:
      type: string
    currency:
      type: string

GatewayUsageWindow:
  allOf:
    - $ref: "#/GatewayUsageTotals"
    - type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date

GatewayUsageModel:
  allOf:
    - $ref: "#/GatewayUsageTotals"
    - type: object
      required:
        - model
      properties:
        model:
          type: string

GatewayUsageRequest:
  type: object
  required:
    - request_id
    - attempt_no
    - source_protocol
    - source_endpoint
    - model
    - input_tokens
    - output_tokens
    - cached_tokens
    - total_tokens
    - usage_estimated
    - latency_ms
    - success
    - cost
    - currency
    - created_at
  properties:
    request_id:
      $ref: "common.yaml#/RequestId"
    attempt_no:
      type: integer
      minimum: 1
    source_protocol:
      type: string
    source_endpoint:
      type: string
    target_protocol:
      type: string
    model:
      type: string
    input_tokens:
      type: integer
      minimum: 0
    output_tokens:
      type: integer
      minimum: 0
    cached_tokens:
      type: integer
      minimum: 0
    cache_creation_tokens:
      type: integer
      minimum: 0
      description: Prompt-cache write (creation) tokens, billed at the cache-write rate.
    total_tokens:
      type: integer
      minimum: 0
    usage_estimated:
      type: boolean
    latency_ms:
      type: integer
      minimum: 0
    success:
      type: boolean
    error_class:
      type: string
      nullable: true
    cost:
      type: string
    currency:
      type: string
    created_at:
      $ref: "common.yaml#/Timestamp"

TokenUsage:
  type: object
  properties:
    prompt_tokens:
      type: integer
      minimum: 0
    completion_tokens:
      type: integer
      minimum: 0
    total_tokens:
      type: integer
      minimum: 0
    input_tokens:
      type: integer
      minimum: 0
    output_tokens:
      type: integer
      minimum: 0
    cached_tokens:
      type: integer
      minimum: 0

EmbeddingRequest:
  type: object
  required:
    - model
    - input
  properties:
    model:
      type: string
    input:
      oneOf:
        - type: string
        - type: array
          minItems: 1
          items:
            type: string
    encoding_format:
      type: string
      enum:
        - float
        - base64
      default: float
    dimensions:
      type: integer
      minimum: 1
    user:
      type: string
  additionalProperties: true

EmbeddingVector:
  oneOf:
    - type: array
      items:
        type: number
        format: float
    - type: string

EmbeddingObject:
  type: object
  required:
    - object
    - embedding
    - index
  properties:
    object:
      type: string
      enum:
        - embedding
    embedding:
      $ref: "#/EmbeddingVector"
    index:
      type: integer
      minimum: 0

EmbeddingResponse:
  type: object
  required:
    - object
    - data
    - model
    - usage
  properties:
    object:
      type: string
      enum:
        - list
    data:
      type: array
      items:
        $ref: "#/EmbeddingObject"
    model:
      type: string
    usage:
      $ref: "#/TokenUsage"

ImageGenerationRequest:
  type: object
  required:
    - model
    - prompt
  properties:
    model:
      type: string
    prompt:
      type: string
      minLength: 1
    n:
      type: integer
      minimum: 1
      maximum: 10
      default: 1
    size:
      type: string
      enum:
        - 256x256
        - 512x512
        - 1024x1024
        - 1024x1536
        - 1536x1024
        - auto
      x-enum-varnames:
        - ImageGenerationRequestSize256x256
        - ImageGenerationRequestSize512x512
        - ImageGenerationRequestSize1024x1024
        - ImageGenerationRequestSize1024x1536
        - ImageGenerationRequestSize1536x1024
        - ImageGenerationRequestSizeAuto
    quality:
      type: string
      enum:
        - standard
        - hd
        - low
        - medium
        - high
        - auto
      x-enum-varnames:
        - ImageGenerationRequestQualityStandard
        - ImageGenerationRequestQualityHD
        - ImageGenerationRequestQualityLow
        - ImageGenerationRequestQualityMedium
        - ImageGenerationRequestQualityHigh
        - ImageGenerationRequestQualityAuto
    style:
      type: string
      enum:
        - vivid
        - natural
        - auto
      x-enum-varnames:
        - ImageGenerationRequestStyleVivid
        - ImageGenerationRequestStyleNatural
        - ImageGenerationRequestStyleAuto
    response_format:
      type: string
      enum:
        - url
        - b64_json
      x-enum-varnames:
        - ImageGenerationRequestResponseFormatURL
        - ImageGenerationRequestResponseFormatB64JSON
      default: url
    user:
      type: string
  additionalProperties: true

ImageEditRequest:
  type: object
  required:
    - image
    - model
    - prompt
  properties:
    image:
      type: array
      minItems: 1
      items:
        type: string
        format: binary
      description: One or more source images to edit or use as references. SRapi accepts both `image` and OpenAI SDK style `image[]` multipart field names at runtime.
    mask:
      type: string
      format: binary
      description: Optional mask image. When multiple source images are provided, OpenAI-compatible providers apply the mask to the first image.
    model:
      type: string
    prompt:
      type: string
      minLength: 1
    n:
      type: integer
      minimum: 1
      maximum: 10
      default: 1
    size:
      type: string
      description: Provider-specific output size such as `1024x1024`, `1024x1536`, `1536x1024`, or `auto`.
    quality:
      type: string
      description: Provider-specific image quality such as `low`, `medium`, `high`, `standard`, `hd`, or `auto`.
    response_format:
      type: string
      enum:
        - url
        - b64_json
      x-enum-varnames:
        - ImageEditRequestResponseFormatURL
        - ImageEditRequestResponseFormatB64JSON
      default: url
    output_format:
      type: string
      description: Provider-specific encoded output format such as `png`, `jpeg`, or `webp`.
    output_compression:
      type: integer
      minimum: 0
      maximum: 100
    background:
      type: string
    moderation:
      type: string
    input_fidelity:
      type: string
    stream:
      type: boolean
      default: false
      description: When true, returns text/event-stream. Codex reverse-proxy image edits can relay progressive image_generation events; other providers return a final image.generation.result event.
    partial_images:
      type: integer
      minimum: 0
      maximum: 3
      description: Forwarded to upstream when provided. Codex reverse-proxy image edits can use it for progressive image_generation partial events.
    user:
      type: string
  additionalProperties: true

ImageEditJsonRequest:
  type: object
  required:
    - model
    - prompt
  properties:
    image:
      $ref: "#/ImageJsonReference"
      description: Single local image reference. Prefer `images` for multiple references.
    images:
      type: array
      minItems: 1
      items:
        $ref: "#/ImageJsonReference"
      description: One or more local image references to edit. SRapi accepts data URLs and base64 JSON payloads; remote URLs and file IDs are rejected until a dedicated secure fetch/files boundary exists.
    mask:
      $ref: "#/ImageJsonReference"
      description: Optional local mask image reference. SRapi accepts data URLs and base64 JSON payloads; remote URLs and file IDs are rejected until a dedicated secure fetch/files boundary exists.
    model:
      type: string
    prompt:
      type: string
      minLength: 1
    n:
      type: integer
      minimum: 1
      maximum: 10
      default: 1
    size:
      type: string
      description: Provider-specific output size such as `1024x1024`, `1024x1536`, `1536x1024`, or `auto`.
    quality:
      type: string
      description: Provider-specific image quality such as `low`, `medium`, `high`, `standard`, `hd`, or `auto`.
    response_format:
      type: string
      enum:
        - url
        - b64_json
      x-enum-varnames:
        - ImageEditJsonRequestResponseFormatURL
        - ImageEditJsonRequestResponseFormatB64JSON
      default: url
    output_format:
      type: string
      description: Provider-specific encoded output format such as `png`, `jpeg`, or `webp`.
    output_compression:
      type: integer
      minimum: 0
      maximum: 100
    background:
      type: string
    moderation:
      type: string
    input_fidelity:
      type: string
    stream:
      type: boolean
      default: false
      description: When true, returns text/event-stream. Codex reverse-proxy image edits can relay progressive image_generation events; other providers return a final image.generation.result event.
    partial_images:
      type: integer
      minimum: 0
      maximum: 3
      description: Forwarded to upstream when provided. Codex reverse-proxy image edits can use it for progressive image_generation partial events.
    user:
      type: string
  additionalProperties: true

ImageJsonReference:
  oneOf:
    - type: string
      description: Data URL containing a base64-encoded image.
    - type: object
      additionalProperties: true
      properties:
        image_url:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
              properties:
                url:
                  type: string
        b64_json:
          type: string
        mime_type:
          type: string
        filename:
          type: string
        file_id:
          type: string
      description: Local image reference object. `file_id` and remote URLs are explicitly rejected by the runtime until a dedicated secure fetch/files boundary exists.

ImageVariationRequest:
  type: object
  required:
    - image
    - model
  properties:
    image:
      type: string
      format: binary
      description: Source image to use for variation generation. OpenAI currently supports this endpoint for `dall-e-2`.
    model:
      type: string
    n:
      type: integer
      minimum: 1
      maximum: 10
      default: 1
    size:
      type: string
      enum:
        - 256x256
        - 512x512
        - 1024x1024
      x-enum-varnames:
        - ImageVariationRequestSize256x256
        - ImageVariationRequestSize512x512
        - ImageVariationRequestSize1024x1024
    response_format:
      type: string
      enum:
        - url
        - b64_json
      x-enum-varnames:
        - ImageVariationRequestResponseFormatURL
        - ImageVariationRequestResponseFormatB64JSON
      default: url
    user:
      type: string
  additionalProperties: true

ImageVariationJsonRequest:
  type: object
  required:
    - model
  properties:
    image:
      $ref: "#/ImageJsonReference"
      description: Single local source image reference for variation generation. SRapi accepts data URLs and base64 JSON payloads; remote URLs, file IDs, and multiple images are rejected until a dedicated secure fetch/files boundary exists.
    images:
      type: array
      minItems: 1
      maxItems: 1
      items:
        $ref: "#/ImageJsonReference"
      description: Optional OpenAI SDK style wrapper for exactly one local source image reference.
    model:
      type: string
    n:
      type: integer
      minimum: 1
      maximum: 10
      default: 1
    size:
      type: string
      enum:
        - 256x256
        - 512x512
        - 1024x1024
      x-enum-varnames:
        - ImageVariationJsonRequestSize256x256
        - ImageVariationJsonRequestSize512x512
        - ImageVariationJsonRequestSize1024x1024
    response_format:
      type: string
      enum:
        - url
        - b64_json
      x-enum-varnames:
        - ImageVariationJsonRequestResponseFormatURL
        - ImageVariationJsonRequestResponseFormatB64JSON
      default: url
    user:
      type: string
  additionalProperties: true

ImageGenerationObject:
  type: object
  properties:
    url:
      type: string
      format: uri
    b64_json:
      type: string
    revised_prompt:
      type: string
  additionalProperties: true

ImageGenerationResponse:
  type: object
  required:
    - created
    - data
  properties:
    created:
      type: integer
      format: int64
    data:
      type: array
      items:
        $ref: "#/ImageGenerationObject"

VideoCreateRequest:
  type: object
  required:
    - model
    - prompt
  properties:
    model:
      type: string
    prompt:
      type: string
      minLength: 1
    seconds:
      type: integer
      minimum: 1
      maximum: 15
      default: 4
    duration:
      type: integer
      minimum: 1
      maximum: 15
      description: Provider-compatible alias for `seconds`.
    size:
      type: string
      description: OpenAI-style output size such as `720x1280`, `1280x720`, `1024x1024`, or `auto`.
    aspect_ratio:
      type: string
      description: Provider-specific aspect ratio override, for example `16:9`, `9:16`, or `1:1`.
    resolution:
      type: string
      description: Provider-specific resolution override, for example `720p` or `1080p`.
    input_reference:
      $ref: "#/VideoReference"
      description: Optional source image reference used as the first frame or visual guide.
    image:
      $ref: "#/VideoReference"
      description: Alias for `input_reference`.
    image_url:
      type: string
      description: Alias for an image URL input reference.
    reference_images:
      type: array
      maxItems: 7
      items:
        $ref: "#/VideoReference"
      description: Optional reference images. SRapi rejects requests that combine `input_reference`/`image` with reference images.
    reference_image_urls:
      type: array
      maxItems: 7
      items:
        type: string
      description: Optional reference image URLs.
    user:
      type: string
  additionalProperties: true

VideoReference:
  oneOf:
    - type: string
    - type: object
      additionalProperties: true
      properties:
        image_url:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
              properties:
                url:
                  type: string
        url:
          type: string
        file_id:
          type: string

VideoError:
  type: object
  properties:
    code:
      type: string
    message:
      type: string
  additionalProperties: true

VideoObject:
  type: object
  required:
    - id
    - object
    - model
    - status
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - video
    model:
      type: string
    status:
      type: string
      enum:
        - queued
        - in_progress
        - completed
        - failed
    progress:
      type: integer
      minimum: 0
      maximum: 100
    prompt:
      type: string
    seconds:
      type: integer
    size:
      type: string
    created_at:
      type: integer
      format: int64
    completed_at:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
    error:
      $ref: "#/VideoError"
  additionalProperties: true

ImageGenerationStreamEvent:
  type: object
  required:
    - object
    - created
    - model
    - index
    - total
    - data
  properties:
    object:
      type: string
      enum:
        - image.generation.result
    created:
      type: integer
      format: int64
    model:
      type: string
    index:
      type: integer
    total:
      type: integer
    data:
      type: array
      items:
        $ref: "#/ImageGenerationObject"

ModerationRequest:
  type: object
  required:
    - model
    - input
  properties:
    model:
      type: string
    input:
      oneOf:
        - type: string
        - type: array
          minItems: 1
          items:
            type: string
    user:
      type: string
  additionalProperties: true

ModerationResult:
  type: object
  required:
    - flagged
    - categories
    - category_scores
  properties:
    flagged:
      type: boolean
    categories:
      type: object
      additionalProperties:
        type: boolean
    category_scores:
      type: object
      additionalProperties:
        type: number
        format: float
    category_applied_input_types:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
  additionalProperties: true

ModerationResponse:
  type: object
  required:
    - id
    - model
    - results
  properties:
    id:
      type: string
    model:
      type: string
    results:
      type: array
      items:
        $ref: "#/ModerationResult"
  additionalProperties: true

AudioTranscriptionRequest:
  type: object
  required:
    - file
    - model
  properties:
    file:
      type: string
      format: binary
      description: Audio file to transcribe.
    model:
      type: string
    language:
      type: string
      description: Optional ISO-639-1 input language hint.
    prompt:
      type: string
      description: Optional style or continuation prompt. SRapi does not persist full prompt text in logs.
    response_format:
      type: string
      enum:
        - json
        - text
        - srt
        - verbose_json
        - vtt
        - diarized_json
      default: json
    temperature:
      type: number
      format: float
      minimum: 0
      maximum: 1
    user:
      type: string
  additionalProperties: true

AudioTranscriptionSegment:
  type: object
  properties:
    id:
      type: integer
    seek:
      type: integer
    start:
      type: number
      format: float
    end:
      type: number
      format: float
    text:
      type: string
    tokens:
      type: array
      items:
        type: integer
    temperature:
      type: number
      format: float
    avg_logprob:
      type: number
      format: float
    compression_ratio:
      type: number
      format: float
    no_speech_prob:
      type: number
      format: float
  additionalProperties: true

AudioTranscriptionResponse:
  type: object
  required:
    - text
  properties:
    text:
      type: string
    task:
      type: string
    language:
      type: string
    duration:
      type: number
      format: float
    segments:
      type: array
      items:
        $ref: "#/AudioTranscriptionSegment"
    usage:
      $ref: "#/TokenUsage"
  additionalProperties: true

AudioSpeechRequest:
  type: object
  required:
    - model
    - input
    - voice
  properties:
    model:
      type: string
    input:
      type: string
      minLength: 1
      description: Text to synthesize. SRapi does not persist full input text in logs.
    voice:
      type: string
      minLength: 1
    response_format:
      type: string
      enum:
        - mp3
        - opus
        - aac
        - flac
        - wav
        - pcm
      default: mp3
    speed:
      type: number
      format: float
      minimum: 0.25
      maximum: 4
      default: 1
    instructions:
      type: string
      description: Optional voice style instructions. SRapi does not persist full instruction text in logs.
    user:
      type: string
  additionalProperties: true

RerankDocument:
  oneOf:
    - type: string
    - $ref: "common.yaml#/JsonObject"

RerankRequest:
  type: object
  required:
    - model
    - query
    - documents
  properties:
    model:
      type: string
    query:
      type: string
      minLength: 1
    documents:
      type: array
      minItems: 1
      items:
        $ref: "#/RerankDocument"
    top_n:
      type: integer
      minimum: 1
    return_documents:
      type: boolean
      default: false
    user:
      type: string
  additionalProperties: true

RerankResult:
  type: object
  required:
    - index
    - relevance_score
  properties:
    index:
      type: integer
      minimum: 0
    relevance_score:
      type: number
      format: float
    document:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

RerankResponse:
  type: object
  required:
    - id
    - model
    - results
  properties:
    id:
      type: string
    model:
      type: string
    results:
      type: array
      items:
        $ref: "#/RerankResult"
    usage:
      $ref: "#/TokenUsage"
  additionalProperties: true

ChatMessage:
  type: object
  required:
    - role
    - content
  properties:
    role:
      type: string
      enum:
        - system
        - developer
        - user
        - assistant
        - tool
    content:
      oneOf:
        - type: string
        - type: array
          items:
            $ref: "#/ContentBlock"
    reasoning_content:
      type: string
      description: OpenAI-compatible reasoning text used by providers such as DeepSeek reasoner models.
    name:
      type: string
    tool_call_id:
      type: string
    tool_calls:
      type: array
      items:
        $ref: "#/ChatToolCall"

ChatToolCall:
  type: object
  required:
    - id
    - type
    - function
  properties:
    id:
      type: string
    type:
      type: string
    function:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

ContentBlock:
  type: object
  required:
    - type
  properties:
    type:
      type: string
      enum:
        - text
        - image_url
        - input_text
        - input_image
        - tool_call
        - tool_result
      x-enum-varnames:
        - ContentBlockTypeText
        - ContentBlockTypeImageUrl
        - ContentBlockTypeInputText
        - ContentBlockTypeInputImage
        - ContentBlockTypeToolCall
        - ContentBlockTypeToolResult
    text:
      type: string
    image_url:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

ToolDefinition:
  type: object
  required:
    - type
  properties:
    type:
      type: string
    function:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

ChatCompletionRequest:
  type: object
  required:
    - model
    - messages
  properties:
    model:
      type: string
    messages:
      type: array
      minItems: 1
      items:
        $ref: "#/ChatMessage"
    stream:
      type: boolean
      default: false
    temperature:
      type: number
      minimum: 0
      maximum: 2
    top_p:
      type: number
      minimum: 0
      maximum: 1
    max_tokens:
      type: integer
      minimum: 1
    tools:
      type: array
      items:
        $ref: "#/ToolDefinition"
    tool_choice:
      oneOf:
        - type: string
        - $ref: "common.yaml#/JsonObject"
    response_format:
      $ref: "common.yaml#/JsonObject"
    stop:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
  additionalProperties: true

ChatCompletionChoice:
  type: object
  required:
    - index
    - message
    - finish_reason
  properties:
    index:
      type: integer
      minimum: 0
    message:
      $ref: "#/ChatMessage"
    finish_reason:
      type: string
      nullable: true

ChatCompletionResponse:
  type: object
  required:
    - id
    - object
    - created
    - model
    - choices
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - chat.completion
    created:
      type: integer
    model:
      type: string
    choices:
      type: array
      items:
        $ref: "#/ChatCompletionChoice"
    usage:
      $ref: "#/TokenUsage"
    system_fingerprint:
      type: string
      nullable: true

ResponsesRequest:
  type: object
  required:
    - model
    - input
  properties:
    model:
      type: string
    input:
      oneOf:
        - type: string
        - type: array
          items:
            $ref: "#/ContentBlock"
    instructions:
      type: string
    stream:
      type: boolean
      default: false
    tools:
      type: array
      items:
        $ref: "#/ToolDefinition"
    tool_choice:
      oneOf:
        - type: string
        - $ref: "common.yaml#/JsonObject"
    temperature:
      type: number
      minimum: 0
      maximum: 2
    top_p:
      type: number
      minimum: 0
      maximum: 1
    max_output_tokens:
      type: integer
      minimum: 1
    text:
      $ref: "common.yaml#/JsonObject"
    reasoning:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

ResponsesOutputItem:
  type: object
  required:
    - type
  properties:
    type:
      type: string
    role:
      type: string
    content:
      type: array
      items:
        $ref: "#/ContentBlock"
  additionalProperties: true

ResponsesIncompleteDetails:
  type: object
  required:
    - reason
  properties:
    reason:
      type: string

ResponsesResponse:
  type: object
  required:
    - id
    - object
    - created_at
    - model
    - output
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - response
    created_at:
      type: integer
    model:
      type: string
    output:
      type: array
      items:
        $ref: "#/ResponsesOutputItem"
    usage:
      $ref: "#/TokenUsage"
    status:
      type: string
    incomplete_details:
      $ref: "#/ResponsesIncompleteDetails"
    compatibility_warnings:
      type: array
      items:
        type: string

ResponsesInputItemsList:
  type: object
  required:
    - object
    - data
  properties:
    object:
      type: string
      enum:
        - list
    data:
      type: array
      items:
        $ref: "#/ResponsesOutputItem"
    first_id:
      type: string
      nullable: true
    last_id:
      type: string
      nullable: true
    has_more:
      type: boolean
  additionalProperties: true

ResponsesCompactResponse:
  type: object
  required:
    - id
    - object
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - response.compaction
    input_tokens:
      type: integer
    output_tokens:
      type: integer
    usage:
      $ref: "#/TokenUsage"
  additionalProperties: true

AnthropicContentBlock:
  type: object
  required:
