    type:
      type: string
      enum:
        - text
        - image
        - thinking
        - redacted_thinking
        - tool_use
        - tool_result
    text:
      type: string
  additionalProperties: true

AnthropicMessage:
  type: object
  required:
    - role
    - content
  properties:
    role:
      type: string
      enum:
        - user
        - assistant
    content:
      oneOf:
        - type: string
        - type: array
          items:
            $ref: "#/AnthropicContentBlock"

AnthropicMessagesRequest:
  type: object
  required:
