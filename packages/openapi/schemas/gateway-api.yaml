      nullable: true
    usage:
      $ref: "#/AnthropicUsage"
    compatibility_warnings:
      type: array
      items:
        type: string

GeminiPart:
  type: object
  properties:
    text:
      type: string
    inline_data:
      $ref: "common.yaml#/JsonObject"
    file_data:
      $ref: "common.yaml#/JsonObject"
    function_call:
      $ref: "common.yaml#/JsonObject"
    function_response:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

GeminiContent:
  type: object
  required:
    - parts
  properties:
    role:
      type: string
      enum:
        - user
        - model
    parts:
      type: array
      minItems: 1
      items:
        $ref: "#/GeminiPart"
  additionalProperties: true

GeminiGenerationConfig:
  type: object
  properties:
    temperature:
      type: number
      minimum: 0
      maximum: 2
    topP:
      type: number
      minimum: 0
      maximum: 1
    topK:
      type: integer
      minimum: 1
    maxOutputTokens:
      type: integer
      minimum: 1
    stopSequences:
      type: array
      items:
        type: string
    responseMimeType:
      type: string
    responseSchema:
