        - type: string
        - type: array
          items:
            $ref: "#/AnthropicContentBlock"
    messages:
      type: array
      minItems: 1
      items:
        $ref: "#/AnthropicMessage"
    max_tokens:
      type: integer
      minimum: 1
    stream:
      type: boolean
      default: false
    tools:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    tool_choice:
      $ref: "common.yaml#/JsonObject"
    temperature:
      type: number
      minimum: 0
      maximum: 1
    top_p:
      type: number
      minimum: 0
      maximum: 1
    thinking:
      $ref: "common.yaml#/JsonObject"
  additionalProperties: true

AnthropicCountTokensRequest:
  type: object
  required:
    - model
    - messages
  properties:
    model:
      type: string
    system:
      oneOf:
        - type: string
        - type: array
          items:
            $ref: "#/AnthropicContentBlock"
    messages:
      type: array
      minItems: 1
      items:
        $ref: "#/AnthropicMessage"
    tools:
      type: array
      items:
        $ref: "common.yaml#/JsonObject"
    tool_choice:
      $ref: "common.yaml#/JsonObject"
    thinking:
      $ref: "common.yaml#/JsonObject"
