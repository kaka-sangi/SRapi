    finishReason:
      type: string
    index:
      type: integer
      minimum: 0
    safetyRatings:
      type: array
      items:
        $ref: "#/GeminiSafetyRating"
  additionalProperties: true

GeminiUsageMetadata:
  type: object
  properties:
    promptTokenCount:
      type: integer
      minimum: 0
    candidatesTokenCount:
      type: integer
      minimum: 0
    totalTokenCount:
      type: integer
      minimum: 0
    cachedContentTokenCount:
      type: integer
      minimum: 0

GeminiModalityTokenCount:
  type: object
  required:
    - modality
    - tokenCount
  properties:
    modality:
      type: string
    tokenCount:
      type: integer
      minimum: 0
  additionalProperties: true

GeminiCountTokensResponse:
  type: object
  required:
    - totalTokens
  properties:
    totalTokens:
      type: integer
      minimum: 0
    cachedContentTokenCount:
      type: integer
      minimum: 0
    promptTokensDetails:
      type: array
      items:
        $ref: "#/GeminiModalityTokenCount"
    cacheTokensDetails:
      type: array
      items:
        $ref: "#/GeminiModalityTokenCount"
  additionalProperties: true

GeminiGenerateContentResponse:
  type: object
  required:
    - candidates
  properties:
    candidates:
      type: array
      items:
        $ref: "#/GeminiCandidate"
    usageMetadata:
      $ref: "#/GeminiUsageMetadata"
    modelVersion:
      type: string
    responseId:
      type: string
    compatibilityWarnings:
      type: array
      items:
        type: string

GeminiModelInfo:
  type: object
  required:
    - name
    - baseModelId
    - version
    - displayName
    - inputTokenLimit
    - outputTokenLimit
    - supportedGenerationMethods
  properties:
    name:
      type: string
      description: Google-shaped resource name such as `models/gemini-1.5-pro`.
    baseModelId:
      type: string
      description: Base model id without the `models/` prefix.
    version:
      type: string
      description: SRapi model family, quality tier, or `srapi`.
    displayName:
      type: string
    description:
      type: string
    inputTokenLimit:
      type: integer
      minimum: 0
    outputTokenLimit:
      type: integer
      minimum: 0
    supportedGenerationMethods:
      type: array
      items:
        type: string
        enum:
          - generateContent
          - streamGenerateContent
          - countTokens
      minItems: 1
  additionalProperties: true

GeminiModelList:
  type: object
  required:
    - models
  properties:
    models:
      type: array
      items:
        $ref: "#/GeminiModelInfo"
    nextPageToken:
      type: string
