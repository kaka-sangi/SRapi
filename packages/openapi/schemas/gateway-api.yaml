    - type
    - role
    - model
    - content
    - stop_reason
  properties:
    id:
      type: string
    type:
      type: string
      enum:
        - message
    role:
      type: string
      enum:
        - assistant
    model:
      type: string
    content:
      type: array
      items:
        $ref: "#/AnthropicContentBlock"
    stop_reason:
      type: string
      nullable: true
    stop_sequence:
