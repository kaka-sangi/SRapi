AccountUsageWindow:
  type: object
  required:
    - window
    - requests
    - input_tokens
    - output_tokens
    - total_tokens
    - cost
    - currency
    - success_count
    - error_count
  properties:
    window:
      type: string
      example: "5h"
    requests:
      type: integer
      minimum: 0
    input_tokens:
      type: integer
      minimum: 0
    output_tokens:
      type: integer
      minimum: 0
    total_tokens:
      type: integer
      minimum: 0
    cost:
      type: string
    currency:
      type: string
    success_count:
      type: integer
      minimum: 0
    error_count:
      type: integer
      minimum: 0
    first_request_at:
      type: string
      format: date-time
      allOf:
        - $ref: "common.yaml#/Timestamp"
      nullable: true
      description: UTC timestamp of the oldest request included in this rolling window. Null when the window has no traffic.
    last_request_at:
      type: string
      format: date-time
      allOf:
        - $ref: "common.yaml#/Timestamp"
      nullable: true
      description: UTC timestamp of the newest request included in this rolling window. Null when the window has no traffic.

AccountUsageWindowsResult:
