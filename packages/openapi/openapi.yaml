      responses:
        "200":
          description: Backup dump file body.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="srapi-YYYYMMDDHHmmss.dump"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
