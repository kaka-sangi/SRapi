  /api/v1/admin/accounts:
    get:
      tags:
        - AdminAccounts
      operationId: listAdminAccounts
      summary: List provider accounts.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
        operator: read
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Status"
