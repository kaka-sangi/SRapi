        prompt:
          type: string
          minLength: 1
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
        size:
          type: string
          description: Provider-specific output size such as `1024x1024`, `1024x1536`, `1536x1024`, or `auto`.
        quality:
          type: string
          description: Provider-specific image quality such as `low`, `medium`, `high`, `standard`, `hd`, or `auto`.
        response_format:
          type: string
          enum:
            - url
            - b64_json
          x-enum-varnames:
            - ImageEditRequestResponseFormatURL
            - ImageEditRequestResponseFormatB64JSON
          default: url
