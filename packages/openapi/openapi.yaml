openapi: 3.0.3
info:
  title: SRapi API
  version: 0.1.0
  description: |
    This is the first executable OpenAPI contract for SRapi M1.
    It intentionally covers only the MVP bootstrap surface so the project can
    generate server types, TypeScript clients, contract tests, and mock servers
    before implementation starts.
  license:
    name: Proprietary
    url: https://srapi.local/license
servers:
  - url: /
    description: Relative API root. Local development usually serves this from http://localhost:8080.
tags:
  - name: Health
    description: Process and dependency health endpoints.
  - name: Auth
    description: Console authentication endpoints.
  - name: Notifications
    description: Public notification preference endpoints.
  - name: CurrentUser
    description: Current console user endpoints.
  - name: ApiKeys
    description: User-managed gateway API key endpoints.
  - name: AdminProviders
    description: Provider registry administration endpoints.
  - name: AdminModels
    description: Model registry administration endpoints.
  - name: AdminAccounts
    description: Provider account administration endpoints.
  - name: AdminProxies
    description: Encrypted egress proxy registry and account bindings.
  - name: AdminGatewayResources
    description: Aggregated gateway readiness resources for the admin console.
  - name: AdminAccountGroups
    description: Provider account pool and group administration endpoints.
  - name: AdminCapabilities
    description: Capability taxonomy administration endpoints.
  - name: AdminScheduler
    description: Scheduler strategy and diagnostic administration endpoints.
  - name: AdminAudit
    description: Audit log administration endpoints.
  - name: AdminBilling
    description: Billing ledger administration endpoints.
  - name: AdminAffiliates
    description: Affiliate invite, rebate, and transfer administration endpoints.
  - name: AdminSubscriptions
    description: Subscription plan, user subscription, and pricing rule administration endpoints.
  - name: AdminDashboard
    description: Administrator dashboard and console snapshot endpoints.
  - name: Payment
    description: Current-user payment methods and payment order endpoints.
  - name: AdminPayments
    description: Payment provider and order administration endpoints.
  - name: AdminOps
    description: Operational event administration endpoints.
  - name: AdminSettings
    description: System settings administration endpoints.
  - name: AdminCopilot
    description: Admin AI copilot configuration and chat endpoints.
  - name: AdminNotifications
    description: Notification template and preference administration endpoints.
  - name: AdminAnnouncements
    description: Announcement administration endpoints.
  - name: AdminPromotions
    description: Redeem code and promo code administration endpoints.
  - name: AdminRisk
    description: Risk-control administration endpoints.
  - name: AdminBackupSnapshots
    description: Database backup snapshot history (list / trigger / download / delete).
  - name: Gateway
    description: OpenAI and Anthropic compatible gateway endpoints.
x-srapi-contract-stage: m1-openapi-bootstrap
x-srapi-contract-harness:
  requiredChecks:
    - openapi-lint
    - openapi-bundle
    - go-server-types-codegen
    - typescript-client-codegen
  smokeOperations:
    - getHealth
    - login
    - getCurrentUser
    - createApiKey
    - listModels
    - createChatCompletion
paths:
  /api/v1/site-config:
    get:
      tags:
        - Auth
      operationId: getSiteConfig
      summary: Public site branding and agreement configuration.
      security: []
      responses:
        "200":
          description: Public site configuration.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfigResponse"
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check API health.
      security: []
      responses:
        "200":
          description: API and core dependencies are reachable.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    data:
                      status: ok
                      version: 0.1.0
                      dependencies:
                        database: ok
                        redis: ok
                    request_id: req_01HY0000000000000000000000
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Login to the console.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: HttpOnly console session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "202":
          description: Password accepted but two-factor verification is required.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginTwoFactorRequiredResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/register:
    post:
      tags:
        - Auth
      operationId: register
      summary: Register a console user account.
      description: Creates a regular user account when public registration is enabled and sets the console session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration succeeded and session cookie was set.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: HttpOnly console session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/registration-attributes:
    get:
      tags:
        - Auth
      operationId: listRegistrationAttributes
      summary: List enabled custom attributes required or accepted during public registration.
      security: []
      responses:
        "200":
          description: Registration attributes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAttributeValueListResponse"
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/setup/status:
    get:
      tags:
        - Setup
      operationId: getSetupStatus
      summary: Report whether first-run setup is required.
      description: Public endpoint. needs_setup is true until an owner/admin account exists.
      security: []
      responses:
        "200":
          description: First-run setup status.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/setup:
    post:
      tags:
        - Setup
      operationId: completeSetup
      summary: Create the initial owner account (first-run setup).
      description: Public endpoint, accepted only while needs_setup is true. Creates the first owner account; once an owner/admin exists the endpoint returns 409.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSetupRequest"
      responses:
        "201":
          description: Setup completed and the owner account was created.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/providers:
    get:
      tags:
        - Auth
      operationId: listEnabledOAuthProviders
      summary: List enabled OAuth/OIDC sign-in providers.
      description: Public and unauthenticated. Returns the non-secret identity of each console OAuth provider that is both enabled and fully configured to start an authorization flow, so the sign-in page can render the matching buttons. Returns an empty list when OAuth is disabled globally or no provider is startable. No secrets (client secret, token URL) are ever exposed.
      security: []
      responses:
        "200":
          description: Enabled, startable OAuth providers.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledOAuthProviderListResponse"
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/captcha:
    get:
      tags:
        - Auth
      operationId: getAuthCaptchaConfig
      summary: Public captcha configuration for the sign-in / sign-up widget.
      description: Public and unauthenticated. Reports whether human-verification is enforced on auth endpoints and, if so, the provider and non-secret site key the frontend widget needs to render. The secret key is never exposed. When disabled, enabled is false and the frontend renders no widget.
      security: []
      responses:
        "200":
          description: Public captcha configuration.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptchaConfigResponse"
        "429":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/{provider}/start:
    get:
      tags:
        - Auth
      operationId: startOAuthAuthorization
      summary: Start an OAuth/OIDC authorization-code flow.
      description: Redirects to the configured provider authorize URL after issuing an encrypted HttpOnly flow cookie that binds state, PKCE verifier, nonce, provider, intent, and local redirect metadata. Callback token exchange creates a short-lived pending OAuth session; final account adoption is handled by follow-up routes.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthIdentityProvider"
        - name: redirect
          in: query
          required: false
          description: Local console path to continue to after callback handling. Cross-site values are normalized by the server.
          schema:
            type: string
        - name: intent
          in: query
          required: false
          description: Flow intent. v1 public start accepts only login; bind-current-user will use a CSRF-protected follow-up route.
          schema:
            type: string
            enum:
              - login
              - bind_current_user
            default: login
        - name: provider_key
          in: query
          required: false
          description: Optional provider instance key when multiple configs exist for the same provider.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the upstream provider authorization endpoint.
          headers:
            Location:
              description: Upstream provider authorization URL with state, PKCE challenge, and optional nonce.
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: Encrypted HttpOnly OAuth flow cookie.
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/{provider}/callback:
    get:
      tags:
        - Auth
      operationId: completeOAuthAuthorization
      summary: Complete an OAuth/OIDC authorization-code callback.
      description: Validates the encrypted flow cookie and state, exchanges the authorization code at the configured token endpoint using PKCE public-client auth, fetches UserInfo with a bearer access token, creates a short-lived pending OAuth session with a hashed provider subject, sets an HttpOnly pending cookie, and redirects to the bound local console path.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthIdentityProvider"
        - name: code
          in: query
          required: false
          description: Authorization code returned by the upstream provider.
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: State returned by the upstream provider. Must match the encrypted flow cookie.
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Upstream OAuth error value. When present the server rejects and clears the flow cookie.
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          description: Upstream OAuth error description. It is not reflected verbatim in the error response.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the local console continuation path with HttpOnly OAuth pending cookie set.
          headers:
            Location:
              description: Local console continuation path.
              schema:
                type: string
            Set-Cookie:
              description: Clears the encrypted flow cookie and sets the short-lived HttpOnly pending OAuth cookie.
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending:
    get:
      tags:
        - Auth
      operationId: getPendingOAuthSession
      summary: Inspect a pending OAuth/OIDC decision session.
      description: Reads the short-lived HttpOnly `srapi_oauth_pending` cookie and returns a safe profile summary plus the next console action. This endpoint is read-only and does not consume the pending session token.
      security: []
      responses:
        "200":
          description: Pending OAuth decision session preview.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthPendingSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/bind-current-user:
    post:
      tags:
        - Auth
      operationId: bindPendingOAuthCurrentUser
      summary: Bind a pending OAuth/OIDC identity to the current console user.
      description: Uses the short-lived HttpOnly `srapi_oauth_pending` cookie plus the current console session and CSRF header to attach the verified external identity to the authenticated user. The pending session is consumed only after a successful bind, and the response never exposes raw upstream subjects, provider-subject hashes, authorization codes, provider tokens, session cookies, or CSRF tokens. An optional body may opt in to adopting the provider display name onto the account profile.
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PendingOAuthBindCurrentUserRequest"
      responses:
        "200":
          description: Current user sign-in identities after binding.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: Clears the consumed pending OAuth cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserAuthIdentityListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/send-verify-code:
    post:
      tags:
        - Auth
      operationId: sendPendingOAuthEmailCompletion
      summary: Send a pending OAuth/OIDC email-completion verification link.
      description: Uses the short-lived HttpOnly `srapi_oauth_pending` cookie to enqueue a high-entropy, single-use email-completion link when the provider profile did not include a usable verified email. The response is uniform and does not reveal whether the submitted email belongs to an existing console account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PendingOAuthEmailCompletionRequest"
      responses:
        "202":
          description: Email-completion request accepted for asynchronous delivery when the pending session is eligible.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingOAuthEmailCompletionAcceptedResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/email-completion/confirm:
    post:
      tags:
        - Auth
      operationId: confirmPendingOAuthEmailCompletion
      summary: Confirm a pending OAuth/OIDC email-completion link.
      description: Requires the same HttpOnly `srapi_oauth_pending` cookie that requested the verification link, consumes the high-entropy email-completion token, writes the verified email into the pending OAuth session, and returns a fresh safe pending-session preview. The pending OAuth session is not consumed by this route.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPendingOAuthEmailCompletionRequest"
      responses:
        "200":
          description: Pending OAuth email completion confirmed; inspect `next_step` to continue.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthPendingSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/create-account:
    post:
      tags:
        - Auth
      operationId: createPendingOAuthAccount
      summary: Create a console account from a pending OAuth/OIDC identity.
      description: Uses the short-lived HttpOnly `srapi_oauth_pending` cookie plus a pending-action token issued by `getPendingOAuthSession` to create a local account, bind the verified external identity, consume the pending session, clear the pending cookie, and issue a normal console session. The action token is bound to the pending OAuth cookie to avoid cross-site form posts against a SameSite-permitted top-level OAuth continuation.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PendingOAuthCreateAccountRequest"
      responses:
        "201":
          description: Account created, identity bound, pending cookie cleared, and session cookie set.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: HttpOnly console session cookie plus clearing cookie for the consumed pending OAuth session.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/bind-login:
    post:
      tags:
        - Auth
      operationId: bindPendingOAuthLogin
      summary: Bind a pending OAuth/OIDC identity to an existing console account and login.
      description: Uses the short-lived HttpOnly `srapi_oauth_pending` cookie plus local email/password credentials to authenticate the account owner, attach the verified external identity to that existing active account, consume the pending session, clear the pending cookie, and issue a normal console session. If the account requires two-factor verification, this endpoint returns a pending OAuth specific two-factor challenge and does not bind, consume, or issue a session until the follow-up two-factor route succeeds.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PendingOAuthBindLoginRequest"
      responses:
        "200":
          description: Existing account authenticated, identity bound, pending cookie cleared, and session cookie set.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: HttpOnly console session cookie plus clearing cookie for the consumed pending OAuth session.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "202":
          description: Password accepted but two-factor verification is required before binding and login.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginTwoFactorRequiredResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/oauth/pending/bind-login/2fa:
    post:
      tags:
        - Auth
      operationId: completePendingOAuthBindLoginTwoFactor
      summary: Complete pending OAuth/OIDC bind-login with two-factor verification.
      description: Uses the same HttpOnly `srapi_oauth_pending` cookie plus a pending-OAuth-specific two-factor challenge to finish binding an external identity to the authenticated existing account. The two-factor challenge is cryptographically bound to the pending OAuth token, so a normal login challenge or a challenge from another pending OAuth session cannot be reused here.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PendingOAuthBindLoginTwoFactorRequest"
      responses:
        "200":
          description: Two-factor verification succeeded, identity bound, pending cookie cleared, and session cookie set.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            Set-Cookie:
              description: HttpOnly console session cookie plus clearing cookie for the consumed pending OAuth session.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/password-reset/request:
    post:
      tags:
        - Auth
      operationId: requestPasswordReset
      summary: Request a console password reset token.
      description: Always returns an accepted response for syntactically valid email input. If the active user exists, SRapi stores only a hash of the single-use reset token and enqueues encrypted outbox delivery metadata.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
      responses:
        "202":
          description: Password reset request accepted without revealing whether the email exists.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetAcceptedResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/password-reset/confirm:
    post:
      tags:
        - Auth
      operationId: confirmPasswordReset
      summary: Confirm a console password reset.
      description: Consumes a single-use password reset token, replaces the user's password hash, and revokes active console sessions for that user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: Password reset succeeded.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetAcceptedResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/auth/email-verification/request:
    post:
      tags:
        - Auth
      operationId: requestEmailVerification
      summary: Request a console email verification token.
      description: Always returns an accepted response for syntactically valid email input. If an active unverified user exists, SRapi stores only a hash of the single-use verification token and enqueues encrypted outbox delivery metadata.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestEmailVerificationRequest"
      responses:
        "202":
          description: Email verification request accepted without revealing whether the email exists or is already verified.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
