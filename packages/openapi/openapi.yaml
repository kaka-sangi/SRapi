  /api/v1/admin/error-stream:
    get:
      tags:
        - AdminUsage
      operationId: getAdminErrorStream
      summary: Subscribe to live gateway error events.
      description: |
        Opens a text/event-stream feed of gateway upstream failure events.
        The stream emits `event: gateway_error` frames whose `data` payload is an
        admin error stream JSON object. Each payload includes request_id,
        trace_id, provider/account ids and names, canonical/requested/upstream
        model, source endpoint, source/target protocol, attempt number, upstream
        status, upstream request id, error class/phase/owner/source, message,
        and a redacted body excerpt. A leading SSE comment confirms
        connection establishment, and periodic comments keep idle connections
        alive.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
        operator: read
      parameters:
        - name: account_id
          in: query
          schema:
            type: integer
            minimum: 1
        - name: error_class
          in: query
          schema:
            type: string
        - name: min_status
          in: query
          schema:
            type: integer
            minimum: 1
        - name: max_status
          in: query
          schema:
            type: integer
            minimum: 1
        - name: since
          in: query
          description: Unix-millisecond cursor used to replay buffered events.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: SSE stream of gateway error events.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE frames. `event: gateway_error` frames carry an
                  admin error stream JSON payload in their `data` line,
                  including request_id, trace_id, provider/account evidence,
                  and the redacted upstream failure snapshot.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StandardError"
        default:
          $ref: "#/components/responses/StandardError"

