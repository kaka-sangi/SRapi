  /v1/responses/{response_id}/input_items:
    get:
      tags:
        - Gateway
      operationId: listResponseInputItems
      summary: List input items for an OpenAI Responses-compatible response.
      description: >
        Responses input_items subresource. SRapi uses the required `model`
        query parameter for API key model policy and Provider Account
        scheduling. The request requires `responses_input_items` capability;
        ordinary `responses` generation support is not enough. SRapi then calls
        the selected upstream `/responses/{response_id}/input_items` and
        replays the upstream JSON list. The `model` query parameter is not
        forwarded upstream.
      security:
        - gatewayBearerAuth: []
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
        - name: model
          in: query
          required: true
          schema:
            type: string
          description: Canonical model or model alias used for SRapi policy and scheduling.
        - name: after
          in: query
          schema:
            type: string
        - name: include
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Raw Responses input_items list from the selected upstream provider.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesInputItemsList"
        "400":
          $ref: "#/components/responses/GatewayBadRequest"
        "401":
          $ref: "#/components/responses/GatewayUnauthorized"
        "403":
          $ref: "#/components/responses/GatewayForbidden"
        "422":
          $ref: "#/components/responses/GatewayValidationError"
        "503":
          $ref: "#/components/responses/GatewayUnavailable"
        default:
          $ref: "#/components/responses/GatewayError"

  /v1/responses/compact:
    post:
      tags:
        - Gateway
      operationId: createResponseCompact
      summary: Compact an OpenAI Responses-compatible conversation context.
      description: >
        OpenAI Responses compact subresource. The request body reuses
        ResponsesRequest and executes through the standard Gateway auth,
        model policy, Scheduler, Provider Adapter, usage, and decision evidence
        chain. Same-protocol Codex/OpenAI compact responses are replayed as raw
        upstream JSON to preserve the `response.compaction` shape. Optional
        `Idempotency-Key` replay protection applies because compact is
        non-streaming by contract, even when a client sends `stream: true`.
      security:
        - gatewayBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GatewayIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
      responses:
        "200":
          description: Responses compact result, or SSE stream when stream is true.
