  /api/v1/admin/models/{id}/mappings:
    post:
      tags:
        - AdminModels
      operationId: createAdminModelMapping
      summary: Create a provider mapping for a model.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelProviderMappingRequest"
      responses:
