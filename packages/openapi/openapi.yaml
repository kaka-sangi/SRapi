        Issues an HTTPS GET routed through the named proxy at target_url
        (or a sensible default) and reports the outcome — used by the
        per-row "Test" action so an operator can verify connectivity
        without bouncing real traffic through the proxy. Always returns
        200 — the success/error fields live in the body.
