      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayForbidden:
      description: Gateway API key or user policy forbids this operation.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayIdempotencyConflict:
      description: A request with this Idempotency-Key is already being processed or already completed without a replayable response.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayValidationError:
      description: Request cannot be converted without semantic loss.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnavailable:
      description: No schedulable account is available.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
