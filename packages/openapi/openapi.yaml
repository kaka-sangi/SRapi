      operationId: listApiKeys
      summary: List API keys visible to the current user.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
