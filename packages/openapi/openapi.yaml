  /api/v1/users/{id}/avatar:
    get:
      tags:
        - CurrentUser
      operationId: getUserAvatar
      summary: Get a console user avatar image.
      description: Returns the normalized avatar image for an authenticated console user. Avatar bytes are served from SRapi-controlled storage with image/png and nosniff headers.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "200":
          description: Avatar image.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
            ETag:
              schema:
                type: string
            X-Content-Type-Options:
              schema:
                type: string
                enum:
                  - nosniff
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/StandardError"

