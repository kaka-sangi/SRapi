    post:
      tags:
        - AdminAccounts
      operationId: batchTestAdminProxies
      summary: Probe many proxies in one call.
      description: |
        Runs one HTTPS probe per listed proxy id in parallel (server-controlled
        concurrency cap) and returns one outcome row per input id, in input
        order. Same shape as the per-id Test action — failures categorise into
        error_class. Missing ids surface as rows with error_class="not_found"
        rather than failing the whole call, matching the per-row Test
        behaviour. Used by the /admin/proxies "Test selected" bulk action.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
