        Parses a pasted Codex/ChatGPT session JSON, raw access token, or NDJSON
        batch, decodes the embedded JWT to extract identity claims
        (chatgpt_account_id/user_id/plan_type/organization_id/email/expiry),
        deduplicates by identity, and creates or updates codex_cli accounts under
        the target provider. Accounts with a refresh token mint a fresh access
        token; refresh-token-less sessions require a valid (non-expired) access
        token and are recorded with auto-pause-on-expiry metadata.
