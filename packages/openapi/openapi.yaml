        default:
          $ref: "#/components/responses/StandardError"
    post:
      tags:
        - ApiKeys
      operationId: createApiKey
      summary: Create an API key and return its plaintext exactly once.
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created. The plaintext key is only returned in this response.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/api-keys/{id}:
    patch:
      tags:
        - ApiKeys
      operationId: updateApiKey
      summary: Update API key metadata and policy.
      security:
        - cookieAuth: []
          csrfHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiKeyRequest"
      responses:
        "200":
          description: API key updated.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
