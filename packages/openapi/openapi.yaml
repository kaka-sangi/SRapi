components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: srapi_session
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    gatewayBearerAuth:
      type: http
      scheme: bearer

  headers:
    RequestIdHeader:
      description: Request correlation id.
      schema:
        $ref: "#/components/schemas/RequestId"

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Status:
      name: status
      in: query
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 200
    StartTime:
      name: start
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive start time for read-model queries.
    EndTime:
      name: end
      in: query
      schema:
        type: string
        format: date-time
      description: Exclusive end time for read-model queries.
    Bucket:
      name: bucket
      in: query
      schema:
        type: string
        enum:
          - hour
          - day
        default: hour
      description: Time bucket used by trend endpoints.
    GeminiModel:
      name: model
      in: path
      required: true
      description: Gemini model id from the path. SRapi runtime accepts slash-qualified ids when the HTTP router passes them through.
      schema:
        type: string
        minLength: 1

  responses:
    StandardError:
      description: Standard SRapi error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              value:
                error:
                  code: VALIDATION_FAILED
                  message: validation failed
                  details: {}
                  trace_id: trace_01HY0000000000000000000000
                request_id: req_01HY0000000000000000000000
    Unauthorized:
      description: Authentication is missing or invalid.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The caller is not allowed to access the resource.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayError:
      description: OpenAI-compatible gateway error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayBadRequest:
      description: Invalid gateway request.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnauthorized:
      description: Missing or invalid gateway API key.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayForbidden:
      description: Gateway API key or user policy forbids this operation.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayValidationError:
      description: Request cannot be converted without semantic loss.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnavailable:
      description: No schedulable account is available.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GeminiGatewayError:
      description: Google-style Gemini gateway error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayBadRequest:
      description: Invalid Gemini gateway request.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayUnauthorized:
      description: Missing or invalid gateway API key.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayForbidden:
      description: Gateway API key or user policy forbids this operation.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayValidationError:
      description: Request cannot be converted without semantic loss.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"
    GeminiGatewayUnavailable:
      description: No schedulable account is available.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorResponse"

  schemas:
    Id:
      type: string
      minLength: 1
      maxLength: 64
      example: "10001"

    RequestId:
      type: string
      minLength: 8
      maxLength: 128
      pattern: "^req_[A-Za-z0-9_\\-]+$"
      example: req_01HY0000000000000000000000

    TraceId:
      type: string
      minLength: 8
      maxLength: 128
      example: trace_01HY0000000000000000000000

    Timestamp:
      type: string
      format: date-time
      example: "2026-05-21T00:00:00Z"

    JsonObject:
      type: object
      additionalProperties: true

    Pagination:
      type: object
      required:
        - page
        - page_size
        - total
        - has_next
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        has_next:
          type: boolean

    ErrorCode:
      type: string
      enum:
        - INVALID_REQUEST
        - UNAUTHORIZED
        - FORBIDDEN
        - RESOURCE_NOT_FOUND
        - RESOURCE_CONFLICT
        - VALIDATION_FAILED
        - RATE_LIMIT_EXCEEDED
        - USER_BALANCE_INSUFFICIENT
        - SUBSCRIPTION_EXPIRED
        - API_KEY_DISABLED
        - MODEL_NOT_ALLOWED
        - MODEL_NOT_FOUND
        - NO_AVAILABLE_ACCOUNT
        - SCHEDULER_REJECTED
        - PROVIDER_RATE_LIMITED
        - PROVIDER_AUTH_FAILED
        - PROVIDER_QUOTA_EXCEEDED
        - INTERNAL_ERROR

    ErrorObject:
      type: object
      required:
        - code
        - message
        - trace_id
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          $ref: "#/components/schemas/JsonObject"
        trace_id:
          $ref: "#/components/schemas/TraceId"

    ErrorResponse:
      type: object
      required:
        - error
        - request_id
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"
        request_id:
          $ref: "#/components/schemas/RequestId"

    GatewayErrorObject:
      type: object
      required:
        - message
        - type
      properties:
        message:
          type: string
        type:
          type: string
          enum:
            - invalid_request_error
            - authentication_error
            - permission_error
            - rate_limit_error
            - upstream_error
            - service_unavailable_error
            - internal_error
        param:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
          example: invalid_request

    GatewayErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/GatewayErrorObject"

    GeminiErrorObject:
      type: object
      required:
        - code
        - message
        - status
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
        status:
          type: string
          example: UNAVAILABLE
        details:
          type: array
          items:
            $ref: "#/components/schemas/JsonObject"

    GeminiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/GeminiErrorObject"

    HealthDependencyStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
        - not_configured

    HealthData:
      type: object
      required:
        - status
        - version
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
        dependencies:
          type: object
          required:
            - database
            - redis
          properties:
            database:
              $ref: "#/components/schemas/HealthDependencyStatus"
            redis:
              $ref: "#/components/schemas/HealthDependencyStatus"

    HealthResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/HealthData"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserRole:
      type: string
      enum:
        - owner
        - admin
        - operator
        - user

    UserStatus:
      type: string
      enum:
        - active
        - disabled
        - pending

    User:
      type: object
      required:
        - id
        - email
        - name
        - status
        - roles
        - balance
        - currency
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        email:
          type: string
          format: email
        name:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        balance:
          type: string
          description: Decimal string balance.
        currency:
          type: string
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"

    CreateAdminUserRequest:
      type: object
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
          default:
            - user
        status:
          $ref: "#/components/schemas/UserStatus"
        balance:
          type: string
          default: "0.00000000"
        currency:
          type: string
          default: USD
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    UpdateAdminUserRequest:
      type: object
      minProperties: 1
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    UpdateUserBalanceRequest:
      type: object
      required:
        - amount
        - operation
      properties:
        amount:
          type: string
          description: Decimal string amount.
        operation:
          type: string
          enum:
            - set
            - increment
            - decrement
        currency:
          type: string
        note:
          type: string

    UserBalance:
      type: object
      required:
        - user_id
        - balance
        - currency
      properties:
        user_id:
          $ref: "#/components/schemas/Id"
        balance:
          type: string
          description: Decimal string balance.
        currency:
          type: string

    UserBalanceResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/UserBalance"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UpdateUserRpmLimitRequest:
      type: object
      required:
        - rpm_limit
      properties:
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0

    BatchUpdateUsersRequest:
      type: object
      required:
        - user_ids
      minProperties: 2
      properties:
        user_ids:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Id"
        status:
          $ref: "#/components/schemas/UserStatus"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"

    BatchUpdateUsersResult:
      type: object
      required:
        - updated_count
        - updated_ids
        - errors
      properties:
        updated_count:
          type: integer
          minimum: 0
        updated_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
        errors:
          type: array
          items:
            type: string

    BatchUpdateUsersResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/BatchUpdateUsersResult"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    SessionData:
      type: object
      required:
        - user
        - csrf_token
        - expires_at
      properties:
        user:
          $ref: "#/components/schemas/User"
        csrf_token:
          type: string
          description: Token to send as X-CSRF-Token for console writes.
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    LoginResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/SessionData"
        request_id:
          $ref: "#/components/schemas/RequestId"

    UserResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/User"
        request_id:
          $ref: "#/components/schemas/RequestId"

    ResourceStatus:
      type: string
      enum:
        - active
        - disabled
        - pending
        - archived

    ApiKeyStatus:
      type: string
      enum:
        - active
        - disabled
        - expired

    ApiKey:
      type: object
      required:
        - id
        - name
        - prefix
        - status
        - scopes
        - allowed_models
        - group_ids
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        prefix:
          type: string
          description: Public key prefix for lookup, never sufficient for authentication.
          example: sk_live_abcd1234
        status:
          $ref: "#/components/schemas/ApiKeyStatus"
        scopes:
          type: array
          items:
            type: string
        allowed_models:
          type: array
          items:
            type: string
        group_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        tpm_limit:
          type: integer
          nullable: true
          minimum: 0
        concurrency_limit:
          type: integer
          nullable: true
          minimum: 0
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"

    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        scopes:
          type: array
          items:
            type: string
          default:
            - gateway:invoke
        allowed_models:
          type: array
          items:
            type: string
          default: []
        group_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"
          default: []
        rpm_limit:
          type: integer
          nullable: true
          minimum: 0
        tpm_limit:
          type: integer
          nullable: true
          minimum: 0
        concurrency_limit:
          type: integer
          nullable: true
          minimum: 0
        expires_at:
          type: string
          format: date-time
          nullable: true

    UpdateApiKeyRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        status:
          $ref: "#/components/schemas/ApiKeyStatus"
        scopes:
          type: array
          items:
            type: string
        allowed_models:
          type: array
          items:
            type: string
        group_ids:
          type: array
          items:
            $ref: "#/components/schemas/Id"

    ApiKeySecretData:
      type: object
      required:
        - api_key
        - plaintext_key
      properties:
        api_key:
          $ref: "#/components/schemas/ApiKey"
        plaintext_key:
          type: string
          description: Full plaintext API key. This value is never returned again.
          example: sk_live_abcd1234_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

    ApiKeyListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    CreateApiKeyResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/ApiKeySecretData"
        request_id:
          $ref: "#/components/schemas/RequestId"

    ApiKeyResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/ApiKey"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentProviderStatus:
      type: string
      enum:
        - active
        - disabled
        - archived

    PaymentOrderStatus:
      type: string
      enum:
        - pending
        - paid
        - fulfilled
        - partially_refunded
        - refunded
        - expired
        - canceled
        - failed

    PaymentProductType:
      type: string
      enum:
        - balance_credit
        - subscription_plan

    PaymentMethod:
      type: object
      required:
        - method
        - provider
        - provider_instance_id
        - name
        - metadata
      properties:
        method:
          type: string
        provider:
          type: string
        provider_instance_id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        metadata:
          $ref: "#/components/schemas/JsonObject"

    PaymentMethodListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentMethod"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentProviderInstance:
      type: object
      required:
        - id
        - provider
        - name
        - status
        - config_version
        - supported_methods
        - limits
        - sort_order
        - metadata
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        provider:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/PaymentProviderStatus"
        config_version:
          type: integer
          minimum: 1
        supported_methods:
          type: array
          items:
            type: string
        limits:
          $ref: "#/components/schemas/JsonObject"
        sort_order:
          type: integer
        metadata:
          $ref: "#/components/schemas/JsonObject"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreatePaymentProviderInstanceRequest:
      type: object
      required:
        - provider
        - name
        - config
      properties:
        provider:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/PaymentProviderStatus"
        config:
          $ref: "#/components/schemas/JsonObject"
        supported_methods:
          type: array
          items:
            type: string
        limits:
          $ref: "#/components/schemas/JsonObject"
        sort_order:
          type: integer
        metadata:
          $ref: "#/components/schemas/JsonObject"

    PaymentProviderInstanceResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/PaymentProviderInstance"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentProviderInstanceListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentProviderInstance"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentOrder:
      type: object
      required:
        - id
        - user_id
        - order_no
        - provider_instance_id
        - amount
        - currency
        - status
        - product_type
        - product_id
        - provider_snapshot
        - metadata
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/Id"
        user_id:
          $ref: "#/components/schemas/Id"
        order_no:
          type: string
        provider_instance_id:
          $ref: "#/components/schemas/Id"
        amount:
          type: string
          example: "10.00000000"
        currency:
          type: string
          example: USD
        status:
          $ref: "#/components/schemas/PaymentOrderStatus"
        product_type:
          $ref: "#/components/schemas/PaymentProductType"
        product_id:
          type: string
        provider_transaction_id:
          type: string
          nullable: true
        provider_snapshot:
          $ref: "#/components/schemas/JsonObject"
        expires_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          $ref: "#/components/schemas/JsonObject"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreatePaymentOrderRequest:
      type: object
      required:
        - method
        - amount
        - product_type
      properties:
        method:
          type: string
          minLength: 1
        amount:
          type: string
          example: "10.00"
        currency:
          type: string
          example: USD
        product_type:
          $ref: "#/components/schemas/PaymentProductType"
        product_id:
          type: string
        expires_at:
          type: string
          format: date-time
        metadata:
          $ref: "#/components/schemas/JsonObject"

    PaymentOrderResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/PaymentOrder"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentOrderListResponse:
      type: object
      required:
        - data
        - pagination
        - request_id
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrder"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestId"

    PaymentWebhookRequest:
      type: object
      additionalProperties: true

    PaymentWebhookResult:
      type: object
      required:
        - order
        - handled
      properties:
        order:
          $ref: "#/components/schemas/PaymentOrder"
        handled:
          type: boolean

    PaymentWebhookResponse:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: "#/components/schemas/PaymentWebhookResult"
        request_id:
          $ref: "#/components/schemas/RequestId"

    RefundPaymentOrderRequest:
      type: object
      properties:
