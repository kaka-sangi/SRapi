        - AdminAccounts
      operationId: batchUpdateAdminAccounts
      summary: Batch update provider account status.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateAccountsRequest"
      responses:
        "200":
          description: Batch update result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/bulk-update:
    post:
      tags:
        - AdminAccounts
      operationId: bulkUpdateAdminAccounts
      summary: Apply a superset bulk-edit to many provider accounts.
      description: |
        sub2api parity: a single endpoint that updates an arbitrary subset of
        the scheduler / routing fields across many provider accounts in one
        call. The caller picks the target either by explicit `account_ids`
        OR by `filters` (server-side resolution), so the UI can offer both
        "Edit Selected" and "Edit Filtered". Every field is optional —
        only fields present in the payload are written, mirroring sub2api's
        `BulkUpdateAccountsRequest` semantics. `max_concurrency` is merged
        into account metadata (the same key the scheduler reads at admission,
        identical to the per-row `batch-concurrency` endpoint). Per-row
        failures collect in `errors` without aborting the batch.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateProviderAccountsRequest"
      responses:
        "200":
          description: Bulk update result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/batch-quota-fetch:
    post:
      tags:
        - AdminAccounts
      operationId: batchQuotaFetchAdminAccounts
      summary: Refresh quota for many provider accounts in one call.
      description: |
        sub2api parity for `batch-refresh-tier`: fans out the per-account
        `quota-fetch` operation across the given account IDs. Best-effort —
        per-row failures (provider error, network, credential refresh
        failure) collect in the response without aborting the batch. Each
        successful row persists a fresh quota snapshot via the same path
        the per-account endpoint uses, so the rest of the admin UI sees
        the new numbers immediately.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchQuotaFetchRequest"
      responses:
        "200":
          description: Batch quota-fetch result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchQuotaFetchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/batch-action:
    post:
      tags:
        - AdminAccounts
      operationId: batchActionAdminAccounts
      summary: Run a bulk recovery action across provider accounts.
      description: >-
        Apply a per-account maintenance action to multiple provider accounts in
        one request. Supports clearing transient error/cooldown state
        (`clear_error`) and full recovery to active (`recover`).
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchAccountActionRequest"
      responses:
        "200":
          description: Batch action result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/batch-concurrency:
    post:
      tags:
        - AdminAccounts
      operationId: batchUpdateAdminAccountConcurrency
      summary: Bulk set per-account max_concurrency ceilings.
      description: |
        Sets `metadata.max_concurrency` on up to 1000 provider accounts in
        one call — the scheduler reads this at admission to cap concurrent
        in-flight requests per account. Verbatim port of sub2api's
        BatchUpdateConcurrency (`admin_service.go`); only difference is
        srapi stores the ceiling on the provider account (not the user)
        because that's where the cap lives in this codebase.

        Per-id failures surface in `errors[]` without aborting the call.
        NotFound is idempotent (the caller's intent for that id is moot if
        the row does not exist).
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateAccountConcurrencyRequest"
      responses:
        "200":
          description: Concurrency batch update result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAccountConcurrencyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/batch-refresh:
    post:
      tags:
        - AdminAccounts
      operationId: batchRefreshAdminAccounts
      summary: Bulk-trigger OAuth refresh on N accounts.
      description: |
        Triggers an OAuth access-token refresh against up to 1000 accounts in
        a single call — the same code path the single-account
        `POST /admin/accounts/{id}/refresh` endpoint uses, batched. Verbatim
        port of sub2api's `AccountHandler.BatchRefresh` (account_handler.go).

        Per-row outcome carries the structured RefreshOutcomeClass
        (`success` / `permanent_error` / `transient_error` /
        `threshold_exceeded`) so the admin UI can render mixed outcomes.
        NotFound is idempotent (the caller's intent of "refresh this id" is
        moot for a missing row). Non-OAuth runtime classes surface as a
        per-row error (not the whole batch).
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRefreshAdminAccountsRequest"
      responses:
        "200":
          description: Batch refresh result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRefreshAdminAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/batch-update-credentials:
    post:
      tags:
        - AdminAccounts
      operationId: batchUpdateAdminAccountCredentials
      summary: Bulk-rotate credential fields on N accounts.
      description: |
        Rotates per-row credential fields on up to 1000 accounts in one call.
        Each row carries a partial credential patch — only the fields present
        in `credential` are overwritten on top of the stored credential, so
        the caller can rotate just `refresh_token` on one account and just
        `api_key` on another in the same request.

        Verbatim port of sub2api's `AccountHandler.BatchUpdateCredentials`
        (account_handler.go); the only shape difference is sub2api accepted a
        single shared `{field, value}` for the whole batch, srapi accepts a
        per-row patch so a single call can rotate disjoint fields.

        NotFound is idempotent. Per-row failures (invalid id, empty patch,
        store error) surface in `errors[]`. The audit snapshot records
        requested/succeeded/failed counts only — credential bytes are NEVER
        included.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateAdminAccountCredentialsRequest"
      responses:
        "200":
          description: Batch credential rotation result.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAdminAccountCredentialsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"

  /api/v1/admin/accounts/health-summary:
    get:
      tags:
        - AdminAccounts
      operationId: getAdminAccountsHealthSummary
      summary: List provider account health snapshots.
      description: >-
        Returns the latest synthesized health snapshot for every provider
        account, including recent usage-derived health and stored health/quota
        overlays when available.
      security:
        - cookieAuth: []
      x-srapi-rbac:
        owner: read
        admin: read
        operator: read
      responses:
        "200":
          description: Provider account health summary.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
