        - AdminAccounts
      operationId: batchDeleteAdminAccounts
      summary: Bulk soft-delete provider accounts.
      description: |
        Soft-deletes the named accounts — same as the per-id DELETE handler,
        just in one call. Per-id outcome is returned: rows that succeed
        appear in `deleted_ids`, rows that fail (already gone, store error)
        appear in `errors`. NotFound is treated as success since the
        caller's "this id should not exist" intent is already true.
        Capped at 1000 ids per call.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDeleteProviderAccountsRequest"
      responses:
        "200":
          description: Accounts deleted — see counts + per-id outcome.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteProviderAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"
  /api/v1/admin/accounts/batch:
    post:
      tags:
        - AdminAccounts
      operationId: batchCreateAdminAccounts
      summary: Bulk-create provider accounts.
      description: |
        Operator onboarding shortcut: create many provider accounts in one
        call against a shared `defaults` (provider/runtime_class/etc.) so a
        fleet rollout or credential rotation does not require N single-create
        clicks. Dedupes by name within the batch AND against existing
        accounts. Per-row validation errors surface in `results[].error`
        without aborting the call — successful rows still apply.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateProviderAccountsRequest"
      responses:
        "200":
          description: Accounts created — see per-row outcome + counts.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateProviderAccountsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/StandardError"
    patch:
