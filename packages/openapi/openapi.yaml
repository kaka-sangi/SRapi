      operationId: createImageEdit
      summary: Create OpenAI-compatible image edits.
      description: OpenAI-compatible image edit route. SRapi validates the gateway API key, applies model policy and entitlement, schedules an eligible provider account with image_edits effective capability, and records media usage and Scheduler evidence. OpenAI-compatible API-key and ordinary reverse-proxy accounts use multipart `/images/edits`; reverse-proxy-codex-cli accounts convert edits to Codex `/responses` image_generation tool `action=edit` requests. JSON bodies may use local data URL or base64 source image and mask references; remote URLs and file IDs are rejected until a dedicated secure fetch/files boundary exists.
      security:
        - gatewayBearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImageEditRequest"
            encoding:
              image:
                contentType: image/*
              mask:
                contentType: image/*
            examples:
              basic:
                value:
                  model: gpt-image-1
                  image:
                    - source.png
                  prompt: Replace the background with a clean studio setting
                  size: 1024x1024
          application/json:
            schema:
              $ref: "#/components/schemas/ImageEditJsonRequest"
            examples:
              data_url:
                value:
                  model: gpt-image-1
                  prompt: Replace the background with a clean studio setting
                  images:
                    - image_url: data:image/png;base64,iVBORw0KGgo=
                  mask:
                    image_url: data:image/png;base64,iVBORw0KGgo=
                  response_format: b64_json
      responses:
        "200":
          description: OpenAI-compatible image edit response, or SSE stream when stream is true. Codex reverse-proxy image edits can relay progressive image_generation events; other providers return a final image.generation.result event.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ImageGenerationStreamEvent"
        "400":
          $ref: "#/components/responses/GatewayBadRequest"
        "401":
          $ref: "#/components/responses/GatewayUnauthorized"
        "403":
          $ref: "#/components/responses/GatewayForbidden"
        "422":
          $ref: "#/components/responses/GatewayValidationError"
        "503":
          $ref: "#/components/responses/GatewayUnavailable"
        default:
          $ref: "#/components/responses/GatewayError"

