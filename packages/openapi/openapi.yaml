components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: srapi_session
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    gatewayBearerAuth:
      type: http
      scheme: bearer

  headers:
    RequestIdHeader:
      description: Request correlation id.
      schema:
        $ref: "#/components/schemas/RequestId"

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
      description: Idempotency key for financial write operations.
    GatewayIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: >-
        Optional opt-in idempotency key. A retried non-streaming request that
        repeats the same key and body replays the original response instead of
        re-executing (and re-billing). Streaming requests are not replayed.
    Status:
      name: status
      in: query
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 200
    StartTime:
      name: start
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive start time for read-model queries.
    EndTime:
      name: end
      in: query
      schema:
        type: string
        format: date-time
      description: Exclusive end time for read-model queries.
    Bucket:
      name: bucket
      in: query
      schema:
        type: string
        enum:
          - hour
          - day
        default: hour
      description: Time bucket used by trend endpoints.
    GeminiModel:
      name: model
      in: path
      required: true
      description: Gemini model id from the path. SRapi runtime accepts slash-qualified ids when the HTTP router passes them through.
      schema:
        type: string
        minLength: 1

  responses:
    StandardError:
      description: Standard SRapi error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: |
        Generic 400 (the request was malformed or the resource state did
        not allow the operation). Lives next to ValidationError so the
        Ops error-log feed (and any other handler that prefers a typed
        bad-request alias) can $ref a real component instead of a dangling
        path — previously this component was referenced by
        /admin/ops/error-logs but never defined, which broke
        oapi-codegen / @hey-api/openapi-ts on every codegen run.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              value:
                error:
                  code: VALIDATION_FAILED
                  message: validation failed
                  details: {}
                  trace_id: trace_01HY0000000000000000000000
                request_id: req_01HY0000000000000000000000
    Unauthorized:
      description: Authentication is missing or invalid.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The caller is not allowed to access the resource.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayError:
      description: OpenAI-compatible gateway error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayBadRequest:
      description: Invalid gateway request.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestIdHeader"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorResponse"
    GatewayUnauthorized:
      description: Missing or invalid gateway API key.
