      summary: Bulk import decimal-safe pricing rules.
      security:
        - cookieAuth: []
          csrfHeader: []
      x-srapi-rbac:
        owner: write
        admin: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/BulkPricingRuleImportRequest"
                - type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: "#/components/schemas/CreatePricingRuleRequest"
          text/csv:
            schema:
              type: string
            examples:
              pricing_rules:
                value: |
                  model_id,provider_id,input_price_per_million_tokens,output_price_per_million_tokens,cache_read_price_per_million_tokens,cache_write_price_per_million_tokens,currency,effective_from,effective_to
                  1,0,1.25,2.50,0,0,USD,,
      parameters:
        - in: query
          name: dry_run
          required: false
          schema:
            type: boolean
          description: Dry-run mode for naked JSON array and CSV imports. Object JSON requests should prefer body.dry_run.
      responses:
        "200":
          description: Pricing rules validated or imported.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPricingRuleImportResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
