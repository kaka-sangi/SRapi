          type: integer
          minimum: 0
          maximum: 100
        background:
          type: string
        moderation:
          type: string
        input_fidelity:
          type: string
        stream:
          type: boolean
          default: false
          description: When true, returns text/event-stream with a final image.generation.result chunk.
        partial_images:
          type: integer
          minimum: 0
          maximum: 3
          description: Forwarded to upstream when provided; the current v1 renderer emits only the final image.generation.result chunk.
