name: srapi

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-srapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-srapi_dev_password_change_me}
      POSTGRES_DB: ${DATABASE_DBNAME:-srapi}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_MODE: ${SERVER_MODE:-local}
      SERVER_SHUTDOWN_TIMEOUT_SECONDS: ${SERVER_SHUTDOWN_TIMEOUT_SECONDS:-45}
      SRAPI_VERSION: ${SRAPI_VERSION:-0.1.0}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-srapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-srapi_dev_password_change_me}
      DATABASE_DBNAME: ${DATABASE_DBNAME:-srapi}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_32_bytes_minimum_change_me}
      SRAPI_MASTER_KEY: ${SRAPI_MASTER_KEY:-local_dev_master_key_32_bytes_minimum_change_me}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/srapi", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
  redis_data:
