global:
  resolve_timeout: 5m

route:
  receiver: srapi-local-webhook
  group_by:
    - service
    - severity
    - component
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: srapi-local-webhook
    webhook_configs:
      - url: http://host.docker.internal:19093/srapi/alerts
        send_resolved: true
