global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/prometheus-srapi-alerts.yaml

scrape_configs:
  - job_name: srapi-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
