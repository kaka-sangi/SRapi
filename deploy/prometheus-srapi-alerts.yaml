groups:
  - name: srapi.ops.rules
    labels:
      service: srapi
      team: platform
    rules:
      - alert: SRapiCriticalOpsAlertsFiring
        expr: sum by (severity, status) (srapi_ops_alert_events{severity="critical",status="firing"}) > 0
        for: 2m
        keep_firing_for: 5m
        labels:
          severity: critical
          component: ops
        annotations:
          summary: SRapi has firing critical Ops alerts
          description: >-
            One or more critical SRapi Ops alert events are firing. Open AdminOps
            alerts and inspect the matching alert event details, SLO evidence, and
            recent Gateway usage logs.
          runbook_url: docs/requirements/OPERATIONS.md#srapicriticalopsalertsfiring

      - alert: SRapiWarningOpsAlertsPersisting
        expr: sum by (severity, status) (srapi_ops_alert_events{severity="warning",status="firing"}) > 0
        for: 15m
        keep_firing_for: 10m
        labels:
          severity: warning
          component: ops
        annotations:
          summary: SRapi has persistent warning Ops alerts
          description: >-
            Warning-level SRapi Ops alert events have remained firing for at least
            15 minutes. Review AdminOps alert posture before the condition burns
            into a critical incident.
          runbook_url: docs/requirements/OPERATIONS.md#srapiwarningopsalertspersisting

      - alert: SRapiSchedulerNoAvailableAccounts
        expr: sum by (strategy, reason) (increase(srapi_scheduler_no_available_total[5m])) > 5
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: warning
          component: scheduler
        annotations:
          summary: SRapi scheduler cannot find usable provider accounts
          description: >-
            Scheduler no-available-account decisions are rising for a strategy
            and primary reject reason. Inspect AdminOps system logs, ops error
            logs, scheduler decisions, and recent account health to identify
            whether capability mapping, quota, credentials, cooldown, or group
            scope is blocking routing.
          runbook_url: docs/requirements/OPERATIONS.md#srapischedulernoavailableaccounts
