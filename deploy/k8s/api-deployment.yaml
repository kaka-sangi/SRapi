apiVersion: apps/v1
kind: Deployment
metadata:
  name: srapi-api
  labels:
    app.kubernetes.io/name: srapi
    app.kubernetes.io/component: api
spec:
  # Keep the deployment single-replica until the full production scale-up runbook
  # has verified process-local /metrics, worker leader-gate behavior, and DB/Redis
  # pool sizing under the target replica count.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: srapi
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: srapi
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/REPO/srapi-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_MODE
              value: "release"
            - name: STORAGE_BACKEND
              value: "postgres"
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: srapi-database
                  key: host
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: srapi-database
                  key: user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: srapi-database
                  key: password
            - name: DATABASE_DBNAME
              valueFrom:
                secretKeyRef:
                  name: srapi-database
                  key: database
            - name: DATABASE_MAX_OPEN_CONNS
              value: "25"
            - name: DATABASE_MAX_IDLE_CONNS
              value: "10"
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: srapi-redis
                  key: host
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: srapi-redis
                  key: password
            - name: REDIS_POOL_SIZE
              value: "32"
            - name: REDIS_MIN_IDLE_CONNS
              value: "4"
            - name: REDIS_DIAL_TIMEOUT_SECONDS
              value: "3"
            - name: REDIS_READ_TIMEOUT_SECONDS
              value: "2"
            - name: REDIS_WRITE_TIMEOUT_SECONDS
              value: "2"
            - name: REDIS_POOL_TIMEOUT_SECONDS
              value: "3"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: srapi-secrets
                  key: jwt-secret
            - name: SRAPI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: srapi-secrets
                  key: master-key
            - name: API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: srapi-secrets
                  key: api-key-pepper
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: srapi-secrets
                  key: bootstrap-admin-password
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
