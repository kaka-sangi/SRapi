apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: srapi-api
  labels:
    app.kubernetes.io/name: srapi
    app.kubernetes.io/component: api
spec:
  # Disabled for first production apply. Enable HPA only after the scale-up
  # runbook validates /metrics monotonicity, worker leader-gate skips, and
  # backing-service pool capacity at the requested replica count.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: srapi-api
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
