# SRapi reverse-proxy front door (example) — TLS termination + a single public origin.
#
# The Docker Compose stack exposes two HTTP services:
#   - web  (Next.js console)  on :3000  — also same-origin-proxies /api and /v1 to the api service
#   - api  (Go gateway)       on :8080
#
# IMPORTANT: the public front door must proxy to the WEB console on :3000, not
# the API on :8080. In the split frontend/backend layout the browser loads the
# console from :3000; the console forwards /api and /v1 to :8080 internally.
# Pointing nginx straight at :8080 serves no UI (this is the "old nginx points
# to 8080" trap).
#
# Two equally valid layouts:
#   (A) Everything -> web:3000. Simplest; the console proxies /api and /v1 onward.
#   (B) /v1 and /api -> api:8080 directly, everything else -> web:3000. One fewer
#       hop for raw gateway traffic and gives you streaming-safe buffering/timeout
#       control. This file uses (B); to use (A), delete the /v1|/api location.
#
# Replace srapi.example.com and the TLS paths before use.

upstream srapi_web { server web:3000; }
upstream srapi_api { server api:8080; }

server {
    listen 80;
    server_name srapi.example.com;
    return 301 https://$host$request_uri;   # force HTTPS
}

server {
    listen 443 ssl;
    http2 on;
    server_name srapi.example.com;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;

    # base64 image / audio uploads can be large.
    client_max_body_size 50m;

    # Raw gateway traffic straight to the API. SSE streaming needs buffering off
    # and a long read timeout, or responses stall / get truncated.
    location ~ ^/(v1|api)/ {
        proxy_pass http://srapi_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Console (and everything else) -> Next.js on :3000.
    location / {
        proxy_pass http://srapi_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
