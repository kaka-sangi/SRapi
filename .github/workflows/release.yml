name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  preflight:
    name: Deploy preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: npm ci

      - name: Generate preflight env
        run: make bootstrap-env

      - name: Run deploy preflight
        run: make deploy-preflight
        env:
          SRAPI_DEPLOY_PREFLIGHT_STRICT_TOOLS: "1"

  images:
    name: Build and scan images
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/${{ github.repository }}/srapi-api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: ghcr.io/${{ github.repository }}/srapi-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME}"
          sha_tag="sha-${GITHUB_SHA::12}"
          {
            echo "version=${version}"
            echo "sha_tag=${sha_tag}"
            echo "tags=${{ matrix.image }}:${version},${{ matrix.image }}:${sha_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.sha_tag }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload vulnerability scan
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
