name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: apps/api/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: |
          npm ci
          npm ci --prefix apps/web

      # The full gate: diff-check, OpenAPI lint + Go/TS codegen sync, ent + migration
      # checks, architecture + code-quality, the Go test suite (SQLite via cgo),
      # secret scan, and web lint/typecheck/build/test.
      - name: make check
        run: make check
        env:
          CGO_ENABLED: "1"
